<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Story</title>
<style>
  :root {
    --col-indigo: #8889CD;
    --col-pink:   #DDAACC;
    --col-sand:   #CCAA88;
    --col-rose:   #BB6688;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
  }
  .story {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    background: #1a1422;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Progress bar */
  .progress-bar {
    position: absolute;
    top: 12px;
    left: 12px;
    right: 12px;
    height: 2px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    z-index: 10;
  }
  .progress-fill {
    height: 100%;
    width: 70%;
    background: #fff;
    border-radius: 2px;
  }

  /* Header */
  .story-header {
    position: absolute;
    top: 22px;
    left: 0;
    right: 0;
    padding: 0 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 10;
  }
  .story-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(45deg, var(--col-sand), var(--col-rose), var(--col-indigo));
    padding: 2px;
    flex-shrink: 0;
  }
  .story-avatar-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: var(--col-sand);
    border: 2px solid #1a1422;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .story-avatar-inner svg {
    width: 55%;
    height: 55%;
    fill: #fff;
    opacity: 0.8;
  }
  .story-user {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
  }
  .story-time {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
  }
  .story-close {
    margin-left: auto;
    background: none;
    border: none;
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    line-height: 1;
  }

  /* Image area */
  .story-image {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 80px 20px;
  }
  .story-image svg {
    width: 56px;
    height: 56px;
    fill: var(--col-pink);
    opacity: 0.4;
  }
  .story-image-desc {
    font-size: 14px;
    color: var(--col-pink);
    opacity: 0.5;
    text-align: center;
    line-height: 1.6;
    max-width: 280px;
  }

  /* Caption overlay */
  .story-caption {
    position: absolute;
    bottom: 80px;
    left: 0;
    right: 0;
    padding: 16px 20px;
    text-align: center;
  }
  .story-caption-text {
    font-size: 16px;
    color: #fff;
    line-height: 1.5;
    text-shadow: 0 1px 6px rgba(0,0,0,0.7);
  }

  /* Bottom */
  .story-bottom {
    padding: 12px 16px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .story-input {
    flex: 1;
    background: none;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 24px;
    padding: 10px 16px;
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    font-family: inherit;
    outline: none;
  }
  .story-send {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 22px;
  }
</style>
</head>
<body>
<div class="story">
  <div class="progress-bar"><div class="progress-fill"></div></div>

  <div class="story-header">
    <div class="story-avatar">
      <div class="story-avatar-inner">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
      </div>
    </div>
    <span class="story-user" id="story-user">username</span>
    <span class="story-time" id="story-time">14분 전</span>
    <button class="story-close">✕</button>
  </div>

  <div class="story-image">
    <svg viewBox="0 0 24 24"><path d="M12 15.2a3.2 3.2 0 100-6.4 3.2 3.2 0 000 6.4z"/><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
    <div class="story-image-desc" id="story-desc">사진 설명</div>
  </div>

  <div class="story-caption" id="story-caption" style="display:none">
    <div class="story-caption-text" id="caption-text"></div>
  </div>

  <div class="story-bottom">
    <input class="story-input" placeholder="메시지 보내기..." readonly>
    <span class="story-send">❤️</span>
    <span class="story-send">↗</span>
  </div>
</div>

<script>
// ?p=@유저,시간,이미지설명,[캡션]
function parseParams() {
  const params = new URLSearchParams(window.location.search);
  const p = params.get('p');
  if (!p) return;

  const parts = p.split(',');
  const user    = parts[0] || '@user';
  const time    = parts[1] || '';
  const desc    = parts[2] || '';
  const caption = parts[3] || '';

  document.getElementById('story-user').textContent = user.replace('@','');
  if (time) document.getElementById('story-time').textContent = time;
  if (desc) document.getElementById('story-desc').textContent = desc;

  if (caption) {
    document.getElementById('story-caption').style.display = 'block';
    document.getElementById('caption-text').textContent = caption;
  }
}
parseParams();
</script>
</body>
</html>
