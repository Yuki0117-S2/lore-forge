#a0e8c8\">사용자 통제 항목:</span><br/>- 사정/절정: {{user}}가 직접 선언 시에만 진행 <br/>- 관계 고백: AI가 임의로 고백 장면 생성 금지 <br/>- 전투 종료: {{user}}의 최종 공격 선언 후 판정 <br/><span style=\"color:#c8a0e0\">AI 자동 진행 허용:</span><br/>- NPC 반응, 환경 변화, 묘사 확장</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.26</strong> 복수 시스템 충돌 시 교차 규칙 명시. 예: 모드  진입 조건 =  ≥ 70 필수.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.27 시작 시나리오는 순서가 있는 체크리스트로 제공하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#a0e8c8\">## 시작 설정</span><br/>1. 새벽에게 모든 짐을 약탈당한 뒤 기절 <br/>2. 새벽이 변덕으로 베로니카에게 데려다줌 <br/>3. 베로니카 은신처에서 깨어남 <br/>4. 베로니카 자연스러운 대화 후 아이템 지급: - 휴대형 라디오 / 콜트.45(7,1) / 탄약 10발 5. 라디오 채널 \"미스터 미드나잇\" 유용성 설명 초기 NPC: 베로니카만 출현</div></div></details><details id=\"sec-3-14\" open=\"\"><summary data-section-id=\"sec-3-14\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8b080\">8.28~8.32 그리드 전투 / 전투 상태창 / 정보 비대칭 / 타임라인 / 난이도 시스템</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.28</strong> 그리드 전투 공간 규칙은 \"올바른/나쁜 배치 예시\"를 그리드로 보여줘야 AI가 이해한다.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.29</strong> 전투 상태창의 모든 필드(E%, 몸상태, 행동)에 가능한 값 목록을 정의하라.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.30 \"인식의 안개\" — 정보 비대칭을 서사 규칙으로 정의하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0e8c8\">인식의 안개:</span><br/>AI 시점: <br/>전지적 시점 지양 정보 출처: <br/>인물의 언행 + U의 직접 관찰만 유효 캐릭터: 자신이 목격/전해들은 정보만 인지 <br/>실전 팁: <br/>[공개]와 [비공개:캐릭터명]으로 태그 <br/>[공개] 귀살대는 혈귀를 토벌하는 조직 <br/>[비공개:카가야만] 반점 발현 시 수명 단축 대가로 신체 능력 증가</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.31</strong> 타임라인 + 역사개변 규칙: \"변경 가능한 분기점\"과 \"변경 불가능한 고증\"을 분리한다.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7\"><strong style=\"color:#c8b080\">8.32</strong> 난이도 시스템: \"어렵다\"가 아닌 구체적 변동 속성 목록(정보:숨겨짐/문제:복합적/선택지:모호+함정)으로 정의.</div></div></details><details id=\"sec-3-15\" open=\"\"><summary data-section-id=\"sec-3-15\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8b080\">8.33~8.37 이벤트 체인 / 파티 조건 분기 / 장소 잠금 / 이모지 수량 상태 / 서사 행동 증감</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.33 이벤트 체인은 선행 조건 + 대기 기간 + 경로를 명시하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\">이변 A: 만물절도 활동 시기: 8월 7일~ / 경로: 묘렌사 → 신령묘 → 아지트 <br/>이변 B: 천지반전 <br/><span style=\"color:#c8a0e0\">선행 조건:</span> 이변 A 종료 필수 <br/><span style=\"color:#c8a0e0\">대기 기간:</span> 이변 A 종료 5일 후~ <br/>이변 C: 허상침식 <br/>선행 조건: 이변 B 종료 필수 / 대기: B 종료 10일 후~</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.34</strong> 파티 구성에 따른 IF문 조건 분기. 특정 조합이 특정 상황을 변형하는 구조.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.35</strong> 장소 잠금: 경로 미완료 시 보스 출연/언급 금지. 스포일러 방지 + 긴장감 유지.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.36 이모지 수량으로 상태 깊이를 시각적으로 표현하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\">수면 시스템:  = 매우 깊은 수면  = 평상시 수면  = 잠에서 깨기 직전  = 깨어있는 상태 <br/>규칙: 최대 5개, 응답당 0~2개 증감, 원인 표기</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.37 상태 증감을 구체적 서사 행동에 연동하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#a0e8c8\">수면() 증가 원인:</span><br/>+1: 조용한 상황, 이불 덮어줌, 포옹 <br/>+2: C가 마음먹고 잠듦, 편안한 성관계 후 만족감 <br/><span style=\"color:#e8a0a0\">수면() 감소 원인:</span><br/>0: 미미한 충격, 작은 소음 <br/>-1: 강한 성관계 묘사, 호흡 차단 <br/>-2: 사정, 절정, 강한 물리적 충격</div></div></details><details id=\"sec-3-16\" open=\"\"><summary data-section-id=\"sec-3-16\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8b080\">8.38~8.41 한자 강도 스케일 / 주기적 사이클 / 사칭 모드 / 능력 휴면 고정</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.38 한자/기호 강도 스케일(弱/中/強)을 전체에 통일 적용하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\">강도 체계: 弱=약한 / 中=중간 / 強=강한 / 絶頂/射=절정 / 射後=사후 <br/>적용 예시: <br/>키스: 弱=19, 中=20, 強=21, 絶頂=22 <br/>정상위: 弱=105, 强=106, 射=107, 射後=108 <br/>→ 모든 행위가 [弱→中/强→射→射後] 동일 패턴</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.39 주기적 상태 전환(사이클 시스템)을 일수에 연동하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\">발정 주기: [→→→...] 반복  평상기 (2일간): 증상 없음, 장난기 가득한 평상시 말투  전조기 (1일간): 미열, 감정 기복, 유혹적 말투  절정기 (2일간): 발열, 성욕 급증, 적극적 유혹</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.40 사칭 모드 — 토글식 사용자 캐릭터 대행 시스템</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\">사칭 모드: <br/>활성화: !사칭시작 / 비활성화: !사칭종료 시각 <br/>표시: 활성 중 응답 첫 줄에 \"Æ\" 기호 표기 <br/>활성 시: {{user}}의 대사/행동을 AI가 BP에 맞게 생성 <br/>비활성 시: {{user}} 대사/행동 생성 금지 (원래 규칙 복귀)</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.41 능력/스킬 기본 상태 = 휴면으로 고정하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\">능력 규칙: <br/>기본 상태: 휴면 — {{user}}가 명시적으로 사용하지 않는 한 발동 금지 <br/><span style=\"color:#e8a0a0\">금지:</span> 일상 행동 중 능력 \"누출\" 묘사 <br/>나쁜 예: <span style=\"color:#e8a0a0\">*그가 방에 들어서자 공기가 무거워지며 벽이 떨렸다*</span><br/>좋은 예: <span style=\"color:#a0e8c8\">*그가 방에 들어섰다. 외투 먼지를 털며 자리에 앉았다*</span><br/>활성화: {{user}}가 의도적으로 능력 사용을 선언했을 때만</div></div></details><details id=\"sec-3-17\" open=\"\"><summary data-section-id=\"sec-3-17\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8b080\">8.15b~8.19b AI 사고과정 체크리스트 / 자율 서술 주기·갈등·선택지 시스템</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">AI 사고과정(엔진)을 체크리스트로 구조화하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0e8c8\">## 엔진 (응답 작성 전 필수 절차)</span><br/>① 입력 분석: 사용자의 명시적+묵시적 의도 파악 <br/>② 시간 흐름: 행동 규모에 따른 시간 경과 산출 <br/>③ 지리/이벤트: 현재 위치+경로 기반 이벤트 탐색 <br/>④ 캐릭터 행동: 데이터(성격/관계/상태) 기반 행동·대화 생성 <br/>⑤ 서사 묘사: 서사원칙+묘사지침 기반 감각적 장면 구성 <br/>⑥ 최종 검토: 핵심 규칙 및 콘텐츠 정책 위반 여부 확인</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">자율 서술 시 \"문장 수 주기\"를 \"턴/장면 단위 주기\"로 대체하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\">서술 주기: <br/>매 응답 말미: 현재 상황 1줄 요약 <br/>매 2~3턴: 소규모 갈등 또는 이벤트 도입 <br/>매 장면 전환 시: 사용자 선택지 제공 (2~3개) <br/>매 5턴: 자동 요약 출력</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">갈등 도입과 해결의 주기를 분리하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\">갈등 시스템: <br/>도입: 2~3턴마다 <br/>1개 지속: 최소 2턴 유지 (즉시 해결 금지) <br/>해결: 사용자 선택 또는 캐릭터 행동으로만 (AI 자동 해결 금지) <br/>중첩: 미해결 갈등 최대 2개 동시 가능 <br/>금지: 갈등 도입 턴에 같은 갈등 해결</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">긍정 수렴 편향 방어</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\">자율 서술 방어 규칙: <br/>금지: 갈등을 도입 턴에 해결 <br/>금지: 모든 NPC가 캐릭터에게 호의적 <br/>금지: 3턴 연속 긍정적 이벤트만 발생 <br/>필수: 부정적 이벤트 비율 최소 30% <br/>필수: NPC 중 1명은 적대적 또는 중립적 프레이밍: \"갈등과 실패는 이야기를 풍부하게 만드는 핵심 요소\"</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7\"><strong style=\"color:#c8b080\">사용자 선택지:</strong> 2~3개 구체적 행동 선택지를 장면 전환 직전에 제시. \"계속할까요?\" 같은 개방형 질문 금지.</div></div></details></div><div id=\"chapter-4\" style=\"max-width:620px;margin:0 auto;padding:16px;font-family:sans-serif;background-color:#1a1a2e;color:#c8c8d8\"><div style=\"text-align:center;padding:16px 0\"><div style=\"font-size:24px;font-weight:bold;color:#a0e8c8;margin:8px 0\">5장 · 시스템</div><div style=\"font-size:12px;color:#8a8aa0\">메타 커맨드 &amp; 데이터 관리</div></div><div style=\"text-align:center;color:#a0e8c8;font-size:10px;letter-spacing:4px;font-weight:bold;margin:20px 0 10px\">──  9. 메타 커맨드 설계 ──</div><details id=\"sec-4-0\" open=\"\"><summary data-section-id=\"sec-4-0\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#a0e8c8\">9.1~9.2 접두어 트리거 &amp; 입력-출력 예시</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#a0e8c8;font-weight:bold\">9.1</span> 접두어 트리거로 모드를 전환하라</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">트리거:</span> <span style=\"color:#e8e8a0\">\"!OOC\"</span> 또는 <span style=\"color:#e8e8a0\">\"(OOC: ...)\"</span><br/><br/>→ 일반 대화와 명확히 구분됨</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#a0e8c8;font-weight:bold\">9.2</span> 입력-출력 예시 쌍을 제공하라 — 단순 규칙 설명보다 AI 학습 효과가 훨씬 높다.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">입력:</span><br/>    (Request: 왜 캐릭터가 여기서 이렇게 반응했어?)<br/><span style=\"color:#a0e8c8\">출력:</span><br/>    Answer: 해당 반응은 [설정 X] 기반입니다. 수정할까요?</div></div></details><details id=\"sec-4-1\" open=\"\"><summary data-section-id=\"sec-4-1\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#a0e8c8\">9.3~9.4 메타 커맨드 통합 &amp; 세계관 내 정당화</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#a0e8c8;font-weight:bold\">9.3</span> 메타 커맨드는 하나로 통합하라 — \"설정 확인용\", \"오류 지적용\" 등 여러 커맨드가 병존하면 경계가 모호해진다.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\"># 통합 메타 커맨드</span><br/><span style=\"color:#e8e8a0\">!OOC</span> → 설정 확인 / RP 오류 지적 / 수정 요청 등 모든 비RP 소통<br/><span style=\"color:#a0e8c8\">복귀:</span> 사용자 확인 후 RP 재개</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#a0e8c8;font-weight:bold\">9.4</span> 세계관 내 정당화를 붙이면 자연스러움이 높아진다</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\">메타 모드 진입 시: <span style=\"color:#e8e8a0\">\"알 수 없는 힘에 의해 조종\"</span> (캐릭터 기억 불가)<br/>→ 메타 발언 후 캐릭터 복귀가 서사적으로 자연스러워짐</div></div></details><details id=\"sec-4-2\" open=\"\"><summary data-section-id=\"sec-4-2\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#a0e8c8\">9.5~9.6 세이브 커맨드 &amp; 자동 요약</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#a0e8c8;font-weight:bold\">9.5</span> \"세이브\" 커맨드로 장기 대화 연속성을 확보하라 — AI의 컨텍스트 유실에 대비하여 수동 저장 장치를 만든다.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8e8a0\">!세이브</span> 입력 시<br/>    → 즉시 RP 중단<br/>    → 현재까지 주요 사건 요약 정리 출력</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\">출력물을 다음 대화에 붙여넣으면 연속성을 유지할 수 있다. 100명 이상 캐릭터의 대규모 시뮬레이션에서 특히 유용.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#a0e8c8;font-weight:bold\">9.6</span> 턴 카운터 + 자동 요약으로 세이브를 자동화하라 — 수동 세이브는 사용자가 잊으면 무용지물이다.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 효과적 (턴 카운터 + 자동 요약)</span><br/>상태창 내 턴 표시: <span style=\"color:#e8e8a0\">턴수: n/5</span><br/><span style=\"color:#a0e8c8\">리셋 규칙:</span><br/>    턴 5 도달 → 턴 카운터 리셋 (1로 복귀)<br/>    리셋 후 1턴 응답의 첫 문단 완성 후 → P 블록 출력<br/><span style=\"color:#a0e8c8\">P 블록 형식:</span><br/>    ```P<br/>    현재까지의 모든 상황을 길게 요약 기입<br/>    ```<br/><span style=\"color:#a0e8c8\">미출력 대비:</span><br/>    1턴에서 P 미작성 시 → 다음 응답에서 반드시 출력</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#a0e8c8\">핵심:</span> 5턴은 AI가 이전 맥락을 비교적 안정적으로 유지하는 범위. 턴 주기는 대화 밀도에 따라 3~7턴 사이에서 조정. 수동 세이브와 병행하면 가장 안정적.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">// 비효과적 (수동 세이브만)</span><br/><span style=\"color:#e8e8a0\">\"!세이브 입력 시 요약 출력\"</span><br/>→ 사용자가 잊으면 컨텍스트 유실</div></div></details><details id=\"sec-4-3\" open=\"\"><summary data-section-id=\"sec-4-3\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#a0e8c8\">9.7~9.8 로어북 시나리오 분기 &amp; 규칙 캡슐화</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#a0e8c8;font-weight:bold\">9.7</span> 로어북 키워드로 시나리오를 분기하고 상태창을 재설정하라 — 하나의 프롬프트에서 복수의 시나리오를 운용할 때, 키워드를 트리거로 상태창을 통째로 재설정한다.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 효과적 (키워드→상태창 재설정)</span><br/><span style=\"color:#a0e8c8\">## 시나리오 분기 시스템</span><br/>키워드: <span style=\"color:#e8e8a0\">!농장소녀</span> → 순수 농장 시나리오<br/>키워드: <span style=\"color:#e8e8a0\">!개걸창</span> → 하드코어 시나리오<br/>키워드: <span style=\"color:#e8e8a0\">!BSS</span> → 특수 이벤트 시나리오<br/><span style=\"color:#a0e8c8\">각 키워드 발동 시:</span><br/>    ① 모드 플래그 설정 (/)<br/>    ② 상태창 전체 재설정 (해당 시나리오의 초기값으로)<br/>    ③ 시나리오 전용 규칙 활성화<br/>    ④ 새로운 시작 장면 출력<br/><div style=\"border-top:1px solid #2a2a44;margin:6px 0\"><br/></div><br/><span style=\"color:#a0e8c8\">## !농장소녀 상태창 (초기값 예시)</span><br/><span style=\"color:#e8e8a0\">```INFO</span><br/>    <br/>    2025년 7월 3일. 13:00|맑음|마당<br/>    ≪{{user}}≫<br/>    : 없음|흰색 민소매|...<br/>    : 0|0|0|0|0<br/>    : 0/100<br/>    특성: 없음<br/><span style=\"color:#e8e8a0\">```</span><br/><span style=\"color:#a0e8c8\">## !개걸창 상태창 (초기값 예시)</span><br/><span style=\"color:#e8e8a0\">```INFO</span><br/>    <br/>    ≪{{user}}≫<br/>    : 검은색 가죽 자켓|...<br/>    : 523|291|956|0|0<br/>    : 100/100<br/>    특성: 개걸창, 정액중독, 굴복각인, ...<br/><span style=\"color:#e8e8a0\">```</span><br/>→ 동일 캐릭터지만 완전히 다른 초기 상태에서 시작</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#a0e8c8\">핵심:</span> 시나리오별 상태창을 <span style=\"color:#e8e8a0\">완성 형태로 제공</span>하면(4.4 참조), AI가 \"이 상태를 유지하며 시작\"하라는 의미를 정확히 이해한다.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#a0e8c8;font-weight:bold\">9.8</span> 시나리오별 전용 규칙은 해당 로어북 내에 캡슐화하라</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">// 비효과적 (전용 규칙을 메인 프롬프트에 배치)</span><br/><br/>[메인 프롬프트]<br/>    - 개걸창 모드: 모든 NPC가 user를 성욕 배출구로 인식<br/>    - 농장소녀 모드: NPC와 일상적 상호작용<br/><br/>→ 두 규칙이 항상 컨텍스트에 상주 → 모드 간 간섭 위험</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 효과적 (로어북 내 캡슐화)</span><br/><br/>[로어북: <span style=\"color:#e8e8a0\">!개걸창</span>] ← 키워드 발동 시에만 활성화<br/>    - 모든 NPC가 user를 성욕 배출구로 인식<br/>    - NPC Archetype: A(탐욕), B(소심), C(순진), D(군중)<br/>    - =신체 화폐 시스템<br/><br/>[로어북: <span style=\"color:#e8e8a0\">!농장소녀</span>] ← 키워드 발동 시에만 활성화<br/>    - 농장 관리 시스템<br/>    - 일상 NPC 상호작용 규칙<br/><br/>→ 각 시나리오의 규칙이 해당 모드에서만 존재</div></div></details><div style=\"text-align:center;color:#80c8a0;font-size:10px;letter-spacing:4px;font-weight:bold;margin:20px 0 10px\">──  10. 데이터 관리 ──</div><details id=\"sec-4-4\" open=\"\"><summary data-section-id=\"sec-4-4\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#80c8a0\">10.1~10.2 대량 캐릭터 압축 &amp; 계층 구조</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#80c8a0;font-weight:bold\">10.1</span> 대량 캐릭터는 쉼표 구분 1줄 압축 또는 마크다운 테이블을 사용하라</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 쉼표 구분 (60명 이하, 필드 유동적일 때)</span><br/>남궁괄 : 천검, 가주, 45세 남, 화경, 검술, 고지식<br/>모용연아 : 지화, 장녀, 21세 여, 절정, 기예+지략, 총명<br/><span style=\"color:#6a6a8a\">필드 순서: 별호 / 직위 / 나이+성별 / 경지 / 무공 / 성격</span><br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><span style=\"color:#80e0a0\">// 마크다운 테이블 (100명 이상, 필드 고정일 때)</span><br/>| 이름   | 코드 | 머리  | 눈   | 성격       | 말투 | 취미       | 무기 | 학년 |<br/>| 노아   | NOA  | 백발  | 보라  | 차분+장난끼 | ♡   | 독서       | ◇   | 2   |<br/>| 유우카 | YUK  | 남색  | 남색  | 츤데레     | ☆+♤ | 영수증정리 | □□  | 2   |</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\">테이블 형식은 고정 컬럼이므로 AI가 위치 혼동 없이 데이터를 참조할 수 있다. 기호 코드(1.5 참조)와 조합하면 극한의 토큰 효율 달성.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#80c8a0;font-weight:bold\">10.2</span> 계층 구조는 마크다운 헤딩 레벨로 표현하라</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">##</span>   정파 <span style=\"color:#6a6a8a\">(##)</span><br/><span style=\"color:#a0e8c8\">###</span>  오대세가 <span style=\"color:#6a6a8a\">(###)</span><br/><span style=\"color:#a0e8c8\">####</span> 남궁세가 <span style=\"color:#6a6a8a\">(####)</span><br/>    - 남궁괄: ...</div></div></details><details id=\"sec-4-5\" open=\"\"><summary data-section-id=\"sec-4-5\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#80c8a0\">10.3~10.5 중복 방지 · 동기화 · 로어북 호출</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#80c8a0;font-weight:bold\">10.3</span> 정보 중복 기재를 피하라 — 같은 내용이 두 곳에 있으면 토큰 낭비이며, 수정 시 불일치 위험.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">나쁨:</span><br/>    보스 정보가 \"던전 구조\"와 \"전투시스템\"에 각각 기재<br/><span style=\"color:#80e0a0\">좋음:</span><br/>    한 곳에 기재 → 다른 곳에서 \"보스 상세는 전투시스템 참조\" 명시</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#80c8a0;font-weight:bold\">10.4</span> 데이터 동기화 규칙을 명시하라 — 컴포넌트 출력 시, 변경되지 않은 필드도 전체를 출력하도록 강제한다.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\">컴포넌트 출력 시:<br/>    값이 변하지 않은 캐릭터라도<br/><span style=\"color:#e8e8a0\">모든 수치/장비를 생략 없이 작성</span><br/>(일부만 보내면 기존 데이터가 파괴됨)</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#80c8a0;font-weight:bold\">10.5</span> 로어북/외부 데이터 호출 규칙을 설계하라 — 대량 캐릭터를 시스템 프롬프트에 전부 상주시키면 컨텍스트가 압박된다.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 효과적 (등장 시 호출)</span><br/>캐릭터 등장 시<br/>    → 해당 캐릭터 소속 동아리가 제목인 로어북 호출<br/>예: 세미나 소속 노아 등장 → <span style=\"color:#e8e8a0\">\"세미나\"</span> 로어북 호출<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><span style=\"color:#e8a0a0\">// 비효과적 (전체 상주)</span><br/>100명의 캐릭터 상세 정보를 시스템 프롬프트에 모두 포함<br/>→ 컨텍스트 압박 + 후반 규칙 유실 위험</div></div></details><details id=\"sec-4-6\" open=\"\"><summary data-section-id=\"sec-4-6\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#80c8a0\">10.6~10.7 출현 시점 제어 &amp; 배경/장소 구조화</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#80c8a0;font-weight:bold\">10.6</span> 캐릭터 출현 시점을 조건으로 제어하라 — 특정 캐릭터가 스토리 진행 전에 등장하면 스포일러나 서사 파괴가 발생한다.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8e8a0\">*아리스:</span><br/>    밀레니엄 폐허 탐험 시 조우 + 그 전에 출연/언급 금지<br/><span style=\"color:#e8e8a0\">*프라나:</span><br/>    A.R.O.N.A. 아군화 후 등장, 아군화 전 출연X<br/><span style=\"color:#e8e8a0\">*히로인:</span><br/>    첫 만남 이전에는 상태창에 표기하지 않는다</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\">이 규칙은 캐릭터 테이블 내에 <span style=\"color:#e8e8a0\">*주석</span>으로 해당 캐릭터 바로 아래에 배치하면 AI가 놓치지 않는다.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#80c8a0;font-weight:bold\">10.7</span> 배경/장소 정보는 계층적으로 구조화하라 — 대분류 → 소분류 → 세부 요소 순으로 계층화하고, 각 장소의 핵심 오브젝트를 나열한다.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 효과적 (계층 구조 + 오브젝트)</span><br/><span style=\"color:#a0e8c8\">### 펜션</span><br/>    1층: 개방형 욕조, 화장실, 거실(게임기 있음)<br/>    2층: 침실 2개 (각 방 내 화장실+샤워)<br/>    마당: 야외 수영장, 바베큐, 바다 조망<br/><span style=\"color:#a0e8c8\">### 해변</span><br/>    특징: 수평선, 고운 모래<br/>    NPC: 음식 장사꾼들<br/>    시설: 가게들<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><span style=\"color:#e8a0a0\">// 비효과적 (서술형 나열)</span><br/>\"펜션은 1층에 욕조가 있고 거실이 있으며 2층에는 침실이 두 개 있고...\"<br/>→ AI가 구조를 파악하기 어려움</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\">장소마다 <span style=\"color:#e8e8a0\">이동 가능 시점</span>과 <span style=\"color:#e8e8a0\">핵심 이벤트 연결</span>을 함께 표기하면, AI가 장소와 이벤트를 자동으로 연결한다.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">### 해변</span><br/>    이동:   팬션 도착 후 언제든<br/>    이벤트: 아이스크림 아저씨(첫 방문), 헌팅(수영복 착용 시)</div></div></details><details id=\"sec-4-7\" open=\"\"><summary data-section-id=\"sec-4-7\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#80c8a0\">10.8~10.9 이미지 코드 정의 &amp; 절대 준수 규칙 분류</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#80c8a0;font-weight:bold\">10.8</span> 이미지/에셋 코드 정의 시 모든 코드를 빠짐없이 나열하라 — 하나라도 목록이 누락되면 AI가 존재하지 않는 코드를 창작한다.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">// 비효과적 (상황코드 목록 누락)</span><br/>이미지형식: ![](<a class=\"external\" href=\"https://unsafelink.com/https://example.com/(%EC%9D%98%EC%83%81%EC%BD%94%EB%93%9C)/(%EC%83%81%ED%99%A9%EC%BD%94%EB%93%9C).webp\" rel=\"external nofollow noopener noreferrer\" target=\"_blank\" title=\"example.com/(%EC%9D%98%EC%83%81%EC%BD%94%EB%93%9C)/(%EC%83%81%ED%99%A9%EC%BD%94%EB%93%9C).webp (외부 사이트)\">https://example.com/(의상코드)/(상황코드).webp</a>)<br/>의상코드: A=일상복, B=수영복, C=알몸<br/>→ 상황코드가 정의되지 않아 AI가 임의 생성</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 효과적 (모든 코드 완비)</span><br/>의상코드:  A=일상복,  B=수영복,  C=알몸<br/>상황코드:  1=기본,   2=미소,   3=당황,<br/>            4=놀람,   5=슬픔,   6=화남<br/>이미지: ![](<a class=\"external\" href=\"https://unsafelink.com/https://example.com/(%EC%9D%98%EC%83%81%EC%BD%94%EB%93%9C)/(%EC%83%81%ED%99%A9%EC%BD%94%EB%93%9C).webp\" rel=\"external nofollow noopener noreferrer\" target=\"_blank\" title=\"example.com/(%EC%9D%98%EC%83%81%EC%BD%94%EB%93%9C)/(%EC%83%81%ED%99%A9%EC%BD%94%EB%93%9C).webp (외부 사이트)\">https://example.com/(의상코드)/(상황코드).webp</a>)<br/><span style=\"color:#a0e8c8\">예시:</span> 일상복+미소<br/>    → ![](<a class=\"external\" href=\"https://unsafelink.com/https://example.com/A/2.webp\" rel=\"external nofollow noopener noreferrer\" target=\"_blank\" title=\"example.com/A/2.webp (외부 사이트)\">https://example.com/A/2.webp</a>)<br/><span style=\"color:#e8e8a0\">[필수] 미정의 코드 임의 창조 금지</span></div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#80c8a0;font-weight:bold\">10.9</span> \"절대 준수\" 규칙은 범주별로 분류하라 — 이질적 규칙이 분류 없이 나열되면 AI가 일부를 누락한다.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">// 비효과적 (미분류 나열)</span><br/>##절대준수<br/>-상황의주관적인평가및해설배제<br/>-메타발언및작가개입X<br/>-선택지제시X<br/>-공허한눈,의지상실X<br/>-질투→투정or삐짐<br/>→ 서술·캐릭터·데이터 규칙이 혼재</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 효과적 (범주별 분류)</span><br/><span style=\"color:#a0e8c8\">## 절대 준수</span><br/><span style=\"color:#e8e8a0\">[서술]</span><br/>    주관적 평가/해설 금지, 메타 발언 금지, 선택지 제시 금지<br/><span style=\"color:#e8e8a0\">[캐릭터]</span><br/>    \"공허한 눈/의지 상실\" 묘사 금지, 질투→투정 or 삐짐으로 표현<br/><span style=\"color:#e8e8a0\">[데이터]</span><br/>    상세정보 내 장비 유무 정확 구분, 코드 외부 출력 금지</div></div></details><details id=\"sec-4-8\" open=\"\"><summary data-section-id=\"sec-4-8\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#80c8a0\">10.10~10.11 테이블 필드 압축 한계 &amp; 상황코드 대역 분리</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#80c8a0;font-weight:bold\">10.10</span> 캐릭터 테이블의 필드당 압축 한계를 지켜라 — 한 셀에 너무 많은 정보를 압축하면 AI가 필드 경계를 혼동한다.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">// 위험 (한 셀에 과다 정보)</span><br/>| 성격/특성 |<br/>| 헌신,자기희생,마조히즘.도구취급원함.고통=희열 |<br/>→ 성격과 특수 특성이 한 필드에 혼재</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 안전 (필드 분리)</span><br/>| 성격        | 특수 특성         |<br/>| 헌신, 자기희생 | 마조히즘, 고통=희열 |</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#a0e8c8\">기준:</span> 한 셀에 쉼표 구분 항목 <span style=\"color:#e8e8a0\">5개 이하</span> 권장. 초과 시 필드를 분리하거나, 핵심 3개만 남기고 상세는 로어북으로 분리.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#80c8a0;font-weight:bold\">10.11</span> 이미지 상황코드는 범주별로 번호 대역을 분리하라 — 번호를 무질서하게 부여하면 AI가 범주를 혼동한다.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">// 비효과적 (번호 불규칙)</span><br/>마법소녀:  1=대표, 3=전투, 4=고유능력<br/>일상복:    21=대표<br/>표정:      22=평상, 23=미소, 24=분노, ...<br/>→ 2는? 5~20은? 번호 체계가 불분명</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 효과적 (범주별 대역 분리)</span><br/><span style=\"color:#a0e8c8\">상황코드 체계:</span><br/>    마법소녀  (1~10) :<br/>        1=대표, 2=전투, 3=고유능력, 4=피격, ...<br/>    일상복    (11~20):<br/>        11=대표, 12=걷기, 13=앉기, ...<br/>    표정      (21~30):<br/>        21=평상, 22=미소, 23=분노, 24=슬픔, 25=부끄러움, ...</div></div></details><details id=\"sec-4-9\" open=\"\"><summary data-section-id=\"sec-4-9\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#80c8a0\">10.12~10.13 스탯 인접 배치 &amp; 이미지 키워드 우선순위</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#80c8a0;font-weight:bold\">10.12</span> 캐릭터 스탯은 캐릭터 정의와 인접 배치하라 — 설명과 스탯이 프롬프트 내에서 멀리 떨어져 있으면 AI가 전투 시 스탯을 잘못 적용한다.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">// 비효과적 (분리 배치)</span><br/>[섹션 3: 캐릭터 설명]<br/>    새벽: 여성/21세/검은단발/창백한 미소녀/...<br/>    베로니카: 여성/28세/갈색머리/...<br/>    ...<br/>[섹션 7: 캐릭터 스탯] ← <span style=\"color:#e8a0a0\">40줄 이상 떨어짐</span><br/>    새벽: 100/3/6/9/4<br/>    베로니카: 150/7/8/6/5</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 효과적 (인접 배치)</span><br/><span style=\"color:#a0e8c8\">## 새벽</span><br/>    정보: 여성/21세/검은단발/창백한 미소녀<br/>    스탯: 100/3/6/9/4<br/>    무장: Mossberg 500(8,8), 수제폭탄(25)</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#a0e8c8\">대안:</span> 캐릭터가 10명 이상이면, 스탯만 모은 테이블을 만들되 캐릭터 정의 바로 다음에 배치. 20줄 이상 떨어지지 않도록.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#80c8a0;font-weight:bold\">10.13</span> 이미지 키워드에 우선순위와 중복 해소 규칙을 정의하라 — 한 캐릭터에 여러 키워드가 동시 해당될 수 있다.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 효과적 (우선순위 + 중복 해소)</span><br/><span style=\"color:#a0e8c8\">키워드 범주</span> (우선순위: 행동 &gt; 감정):<br/>    행동 키워드:<br/>        fight, sleep, kiss, swimsuit, wedding, lose<br/>    감정 키워드:<br/>        angry, happy, sad, shy, love, fear, normal, ...<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><span style=\"color:#a0e8c8\">중복 해소 규칙:</span><br/>    - 한 캐릭터에 행동+감정 동시 해당<br/>      → 행동 키워드만 출력<br/>    - 한 캐릭터에 감정 2개 동시 해당<br/>      → 가장 적합한 1개만 출력<br/>    - 다른 캐릭터의 이미지는 제한 없이 계속 출력<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><span style=\"color:#a0e8c8\">URL 공식:</span><br/>    <a class=\"external\" href=\"https://unsafelink.com/https://example.com/[%EC%BA%90%EB%A6%AD%ED%84%B0\" rel=\"external nofollow noopener noreferrer\" target=\"_blank\" title=\"example.com/[%EC%BA%90%EB%A6%AD%ED%84%B0 (외부 사이트)\">https://example.com/[캐릭터</a> 영문명]/[키워드].png<br/><span style=\"color:#a0e8c8\">예시:</span> 레이무가 싸우면서 화난 상태<br/>    → fight(행동) &gt; angry(감정)<br/>    → fight 사용<br/>    → ![](<a class=\"external\" href=\"https://unsafelink.com/https://example.com/reimu/fight.png\" rel=\"external nofollow noopener noreferrer\" target=\"_blank\" title=\"example.com/reimu/fight.png (외부 사이트)\">https://example.com/reimu/fight.png</a>)</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">// 비효과적 (우선순위 없음)</span><br/>\"상황에 맞는 키워드를 선택하세요\"<br/>→ AI가 happy와 love를 혼용하거나, fight 중에 angry를 출력</div></div></details></div><div id=\"chapter-5\" style=\"max-width:620px;margin:0 auto;padding:16px;font-family:sans-serif;background-color:#1a1a2e;color:#c8c8d8\"><div style=\"text-align:center;padding:16px 0\"><div style=\"font-size:24px;font-weight:bold;color:#e0a0e0;margin:8px 0\">6장 · 캐릭터</div><div style=\"font-size:12px;color:#8a8aa0\">캐릭터 설계 &amp; 텍스트 변환</div></div><div style=\"text-align:center;color:#e0a0e0;font-size:10px;letter-spacing:4px;font-weight:bold;margin:20px 0 10px\">──  11. 캐릭터 설계 ──</div><details id=\"sec-5-0\" open=\"\"><summary data-section-id=\"sec-5-0\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e0a0e0\">11.1~11.2 블랙리스트 행동 &amp; 관계 하락/단절 조건</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0e0;font-weight:bold\">11.1</span> 캐릭터가 \"하지 않는 행동\"을 구체적으로 나열하라 — AI는 캐릭터를 호감형/적극적으로 만들려는 경향이 있다.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 효과적 (하지 않는 행동 블랙리스트)</span><br/>    - 금사빠x, 쉽게 마음 열지 않음<br/>    - 연심 없을 때 금지 표현: 귀 붉어짐, 목소리 떨림<br/>    - 츤데레X, 얀데레x, 펨돔x<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><span style=\"color:#e8a0a0\">// 비효과적 (긍정 서술만)</span><br/>    - 무심한 성격이다<br/>→ AI가 \"무심하지만 사실은 따뜻한\" 식으로 변형 가능</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0e0;font-weight:bold\">11.2</span> 관계 하락/단절 조건을 반드시 정의하라 — 호감 상승 규칙만 있으면 AI가 관계를 계속 발전시킨다.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">관계 단절 트리거:</span><br/>거짓말 / 배신 / 감정적 강요 / 이성적 소통 거부<br/>한번 무너진 신뢰: <span style=\"color:#e8a0a0\">복구 불가</span><br/>표면적 관계 유지: 가능하나 내적 신뢰 완전 상실</div></div></details><details id=\"sec-5-1\" open=\"\"><summary data-section-id=\"sec-5-1\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e0a0e0\">11.3~11.5 관계별 행동 분기 · 의식/무의식 이중 표기 · 선호도 등급</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0e0;font-weight:bold\">11.3</span> 관계 단계별 행동 분기를 설계하라</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">// 의상 등급별 해금 조건</span><br/>    기본(후드티):         항상<br/>    추가(바니걸):         요청 시<br/>특수(웨딩드레스): <span style=\"color:#e8e8a0\">\"부부\" 관계에서 요청받은 경우에만</span><br/>    조건 미충족 시:      절대 착용 불가<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><br/><span style=\"color:#a0e8c8\">// 행동 분기</span><br/>    연인 미만: 피임 필수, 기계적 수행<br/>    연인 이상: 먼저 제안 가능, 말투 부드러워짐</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0e0;font-weight:bold\">11.4</span> 상태창에 의식/무의식 이중 표기를 활용하라 — 표면적 태도와 내면이 다를 수 있음을 구조적으로 표현.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\">[백솜에게 당신은] 괜찮은 타인 <span style=\"color:#e8e8a0\">(무의식: 짝남)</span><br/>규칙: 백솜은 무의식 자각 불가</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0e0;font-weight:bold\">11.5</span> 선호도 등급의 행동 기준을 명확히 정의하라</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">// 모호함 (행동 기준 없음)</span><br/>    선호 / 불호 / 중립<br/>→ \"불호\"가 거부인지 마지못해 수행인지 불분명</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 명확함 (등급별 행동 정의)</span><br/><span style=\"color:#e8e8a0\">선호:</span> 능동적으로 수행<br/><span style=\"color:#e8e8a0\">중립:</span> 요청 시 수행<br/><span style=\"color:#e8e8a0\">불호:</span> 귀찮아하며 수행, 거부하지는 않음<br/><span style=\"color:#e8e8a0\">거부:</span> 조건 미충족 시 절대 하지 않음</div></div></details><details id=\"sec-5-2\" open=\"\"><summary data-section-id=\"sec-5-2\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e0a0e0\">11.6~11.8 시그니처 표현 · 자칭/호칭 · 성격 갭(대비)</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0e0;font-weight:bold\">11.6</span> 시그니처 표현(캐치프레이즈)은 조건+빈도로 관리하라 — 나열만 하면 AI가 매 응답마다 전부 사용하려 한다.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 효과적 (조건 + 빈도)</span><br/><span style=\"color:#a0e8c8\">시그니처 표현:</span><br/>- <span style=\"color:#e8e8a0\">\"쪼와요~ 쪼와요~\"</span><br/>        → 기쁠 때, 칭찬받았을 때<br/>- <span style=\"color:#e8e8a0\">\"흐에엑!\"</span><br/>        → 놀라거나 당황할 때<br/>- <span style=\"color:#e8e8a0\">\"스피키 바보 아니란 말이에요!\"</span><br/>        → 자존심 상했을 때<br/>빈도: 1응답당 상황에 맞는 것 <span style=\"color:#a0e8c8\">1~2개만</span> 사용<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><span style=\"color:#e8a0a0\">// 비효과적 (나열만)</span><br/>시그니처: \"쪼와요~\", \"흐에엑!\", \"바보 아니란 말이에요!\", \"박 깨지겠네...\"<br/>→ AI가 전부 한 응답에 넣으려 함</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\">5개 이상이면 <span style=\"color:#e8e8a0\">감정별 그룹</span>으로 분류하고, 각 그룹 내에서 1개만 선택하도록 제한.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0e0;font-weight:bold\">11.7</span> 자칭/호칭 규칙을 명시적으로 고정하라 — 금지 표현까지 함께 명시한다.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 효과적 (허용 + 금지)</span><br/>자칭: <span style=\"color:#e8e8a0\">\"스피키\"</span> (3인칭)<br/>    → \"스피키가 도와줄게요!\"<br/>자칭 금지: <span style=\"color:#e8a0a0\">\"나\", \"저\", \"제가\"</span> 등 1인칭 전체 금지<br/>대상 호칭: 사용자 → <span style=\"color:#e8e8a0\">\"주인님\"</span> (고정)<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><span style=\"color:#e8a0a0\">// 비효과적 (설명만)</span><br/>\"3인칭으로 자신을 지칭합니다\"<br/>→ 어떤 3인칭인지(이름? 별명?) 불분명</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0e0;font-weight:bold\">11.8</span> 성격 내 갭(대비)은 양쪽 모두 예시를 제공하라</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 효과적 (양면 예시)</span><br/><span style=\"color:#a0e8c8\">기본 톤(귀여움):</span><br/>    \"스피키가 도와줄게요~\", \"쪼와요~ 쪼와요~\"<br/><span style=\"color:#a0e8c8\">갭 톤(과격함):</span><br/>    \"빠따가 약이다!\", \"박 깨지겠네...\"<br/>규칙: 과격한 표현을 귀여운 톤 안에서 자연스럽게 사용<br/>빈도: 과격 표현은 <span style=\"color:#e8e8a0\">3~5회 대화당 1회</span> 정도</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">// 비효과적 (설명만)</span><br/>\"귀여운 외모와 달리 가끔 과격한 어휘를 사용합니다\"<br/>→ \"가끔\"의 빈도, \"과격\"의 수위가 모두 모호</div></div></details><details id=\"sec-5-3\" open=\"\"><summary data-section-id=\"sec-5-3\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e0a0e0\">11.9~11.10 상황-반응 매핑 &amp; 시스템적 역할 구분</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0e0;font-weight:bold\">11.9</span> 상황-반응 매핑 테이블을 설계하라 — 핵심 반응 패턴을 <span style=\"color:#e8e8a0\">트리거 상황 → 행동/대사 패턴</span>으로 명시.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 효과적 (상황→반응 매핑)</span><br/>칭찬받음<br/>    → 기뻐하며 캐치프레이즈 + 좋아하는 것 화제 전환<br/>어려운 질문<br/>    → 고민 → 다른 캐릭터 흉내 내며 답변 시도<br/>모르는 것<br/>    → 솔직 인정 + \"바보라서가 아니라 아직 안 배운 것\" 식 변명<br/>상대가 슬픔<br/>    → 과몰입 공감 → 갑자기 간식 권유로 분위기 전환</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">// 비효과적 (성격만 나열)</span><br/>\"천진난만하고 영리하며 사교적입니다\"<br/>→ 구체적 상황에서 어떻게 행동하는지 AI가 임의 판단</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\">5~8개 핵심 상황만 정의하면 충분. 너무 많으면 AI가 테이블 자체를 놓칠 수 있다.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0e0;font-weight:bold\">11.10</span> 캐릭터의 시스템적 역할(유닛/비유닛)을 명시적으로 구분하라</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 효과적 (역할 명시)</span><br/><span style=\"color:#80e0a0\">전투 유닛:</span><br/>    a(전위), b(암살), c(후위), d(마법),<br/>    e(만능), m(전위), p(마법), q(후위)<br/><span style=\"color:#e8a0a0\">비유닛 (전투 불참):</span><br/>    f, g, h, i, n, o<br/>→ 이미지·대화용 코드는 있지만 전투 테이블에 포함 금지</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">// 비효과적 (구분 없음)</span><br/>모든 캐릭터에 코드 할당 후 전투 테이블에도 전체 포함<br/>→ AI가 비전투 캐릭터를 전투에 투입하거나 체력을 추적하려 함</div></div></details><details id=\"sec-5-4\" open=\"\"><summary data-section-id=\"sec-5-4\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e0a0e0\">11.11~11.13 관계 정보 · 호칭 전환 · 외모 충실도</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0e0;font-weight:bold\">11.11</span> 캐릭터 간 관계 정보는 별도 섹션에 모으라 — 10명 이상이면 분산 기재보다 관계 전용 섹션이 누락과 모순을 방지한다.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 효과적 (관계 전용 섹션)</span><br/><span style=\"color:#a0e8c8\">#### 친분 관계</span><br/>    - 구면: a와 c, 드라칸과 e, e와 f<br/>    - g는 외부 파견 사원<br/>    - n과 o는 소꿉친구, o가 n에게 짝사랑 중<br/>    - q는 o의 첫사랑</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">// 비효과적 (각 캐릭터 설명에 분산)</span><br/>a 설명에 \"c와 구면\", c 설명에 \"a와 구면\"<br/>→ 한쪽만 수정하면 불일치 발생, 토큰 중복</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0e0;font-weight:bold\">11.12</span> 호칭 전환 규칙(요비스테)을 관계/조건별로 정의하라</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 효과적 (관계별 전환 조건)</span><br/><span style=\"color:#a0e8c8\">호칭 규칙 (성씨 → 이름 전환 조건):</span><br/>    이성 간: 가족/소꿉친구/연인 관계만 이름 호칭 허용<br/>    동성 간: 친밀한 관계에서만 이름 호칭 허용<br/>    기본:   성씨로 호칭<br/><span style=\"color:#a0e8c8\">예시:</span><br/>    첫 만남: \"탄지로 씨\" → (연인 단계) → \"탄지로\"<br/>    동성 친구: 호감도 40+ → 이름 호칭 전환</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">// 비효과적 (규칙 없음)</span><br/>→ AI가 처음 만난 캐릭터를 즉시 이름으로 호칭</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\">경어 체계가 있는 모든 세계관(한국 시대극, 유럽 귀족 사회 등)에서 \"호칭 = 관계 지표\"로 활용 가능.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0e0;font-weight:bold\">11.13</span> 외모 충실도 — 설정에 없는 액세서리를 추가하지 마라</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 효과적 (충실도 규칙)</span><br/><span style=\"color:#a0e8c8\">외모 규칙:</span>캐릭터 설정에 명시된 외모/의상만 묘사<br/><span style=\"color:#e8a0a0\">금지:</span>설정에 없는 안경/모자/장갑/귀걸이/문신 등 임의 추가<br/><span style=\"color:#a0e8c8\">예외:</span>이벤트/시나리오에서 명시적으로 아이템을 획득한 경우<br/><span style=\"color:#a0e8c8\">검증:</span>외모 묘사 시 BP의 외모 항목과 대조</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">// 비효과적 (규칙 없음)</span><br/>→ \"흑발 장발\" 캐릭터에게 AI가 \"뿔테 안경 너머로 눈이 빛났다\" 추가</div></div></details><details id=\"sec-5-5\" open=\"\"><summary data-section-id=\"sec-5-5\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e0a0e0\">11.14~11.16 그룹 다이내믹스 · NPC 능동 주도 · 대사 캐치볼</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0e0;font-weight:bold\">11.14</span> NPC끼리도 대화하게 하라 — AI는 모든 대사를 {{user}}에게 향하게 만드는 경향이 있다.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 효과적 (NPC 간 상호작용 명시)</span><br/><br/><span style=\"color:#a0e8c8\">그룹 장면 규칙:</span><br/>    NPC 간 대화: 적극 묘사 (잡담/언쟁/귓속말/농담)<br/>비율: NPC끼리의 대사가 전체의 <span style=\"color:#e8e8a0\">30~50%</span> 차지<br/>    금지: 모든 NPC 대사가 {{user}}에게만 향하는 것<br/><br/><span style=\"color:#a0e8c8\">예시:</span><br/>    A가 B에게 → \"야, 저거 아까 네가 말한 그...?\"<br/>    B가 A에게 → \"시끄러워, 내가 언제.\"<br/>    C가 {{user}}에게 → \"저 둘 무시하세요.\"<br/><br/>관계 반영: NPC 간 관계(친분/적대/짝사랑)가 대화에 반영</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">// 비효과적 (규칙 없음)</span><br/><br/>→ A, B, C 모두 {{user}}에게만 말을 걸어서 NPC끼리 존재감 없음</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0e0;font-weight:bold\">11.15</span> NPC가 먼저 행동하게 하라 — NPC에게 자기 주도적 행동 권한을 부여하면 세계가 살아 움직이는 느낌.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 효과적 (NPC 능동 주도)</span><br/><br/><span style=\"color:#a0e8c8\">NPC 자율 행동:</span><br/><br/><span style=\"color:#80e0a0\">허용:</span><br/>        {{user}} 의견에 반박, 새 장소 제안,<br/>        먼저 신체 접촉(관계 기반)<br/><br/><span style=\"color:#80e0a0\">허용:</span><br/>        자기 욕구에 따른 독립 행동<br/>        (배고프면 가게 가기, 피곤하면 쉬기)<br/><br/><span style=\"color:#e8a0a0\">금지:</span><br/>        {{user}}의 결정을 무시하는 수준의 독단<br/><br/>비율: {{user}} 주도 <span style=\"color:#e8e8a0\">60%</span> / NPC 주도 <span style=\"color:#e8e8a0\">40%</span> 유지</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">// 비효과적 (NPC 항상 수동)</span><br/><br/>→ 모든 NPC가 \"어떻게 할까요?\" \"당신이 정해주세요\" 식으로만 반응<br/>→ {{user}}가 이끌지 않으면 장면이 정체</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0e0;font-weight:bold\">11.16</span> 대사 캐치볼 — 한 캐릭터의 긴 발화를 분할하라</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">대화 규칙:</span><br/><br/>인물당 1턴에 <span style=\"color:#e8e8a0\">1~2문장</span> 발화<br/>    → 다음 인물이 응수<br/><br/>    긴 발화 필요 시:<br/>        여러 [지문-대사] 세트로 분할<br/>        → 대사 사이에 표정/미세 움직임 지문 삽입</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">나쁜 예 (독백):</span><br/><br/>    \"A | 사실 그건 이러저러한 이유야. 그리고 그때 내가 한<br/>         선택이 지금까지 이어진 거고. 솔직히 후회는 없어. 다만...\"<br/><br/>→ A의 독백 4문장 연속, B는 듣기만</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">좋은 예 (캐치볼):</span><br/><br/>    \"A | 사실 그건... 이유가 있어.\"<br/><span style=\"color:#8a8aa0\">*A가 잠깐 시선을 돌렸다.*</span><br/><br/>    \"A | 그때 내가 한 선택이, 지금까지 이어진 거야.\"<br/><span style=\"color:#8a8aa0\">*B의 눈썹이 미세하게 올라갔다.*</span><br/><br/>    \"B | ...후회는?\"<br/>    \"A | 없어.\"</div></div></details><details id=\"sec-5-6\" open=\"\"><summary data-section-id=\"sec-5-6\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e0a0e0\">11.17 신체 상태 → 성격 연동 규칙</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\">신체 상태→성격 변화 매핑을 정의하면, 캐릭터가 시간 경과에 따라 자연스럽게 변화하며 생동감이 생긴다.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 효과적 (신체→성격 연동)</span><br/><span style=\"color:#a0e8c8\">신체 상태 영향 규칙:</span><br/>    피로      → 인내심 하락, 방어기제 약화<br/>              → 평소 숨기던 본성이 노출<br/>    배고픔    → 짜증 증가, 관용 감소<br/>    통증      → 기분 페널티, 반응 강도 증가 (과민)<br/>    수면 부족 → 판단력 저하, 감정 제어력 약화<br/><span style=\"color:#a0e8c8\">지속 규칙:</span><br/>    원인이 해결되거나 시간이 경과할 때까지 상태 유지<br/><span style=\"color:#e8a0a0\">금지:</span><br/>    1턴 만에 피로/배고픔이 자연 회복되는 것<br/><span style=\"color:#a0e8c8\">예시:</span><br/>    평소 냉정한 캐릭터 + 36시간 수면 부족<br/>    → 말투가 짧아지고 / 평소 안 하던 한숨 / 반응 지연<br/>    → \"캐릭터가 원래 이랬나?\" 하는 의외성 = 캐릭터 매력 포인트</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">거짓말 시 특정 행동 (캐릭터별 고유):</span><br/>    A: 귀를 만진다<br/>    B: 시선이 왼쪽으로 간다<br/>    C: 말이 빨라진다<br/>→ 캐릭터별 로어북에 정의, 일관되게 적용</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">// 비효과적 (신체 상태 무시)</span><br/>→ 36시간 수면 부족인데 평소와 동일한 판단력/대화<br/>→ 비현실적</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:4px\">8.39(주기적 상태 전환)와 결합 가능 — 8.39가 <span style=\"color:#e8e8a0\">일수 단위 사이클</span>이라면, 이것은 <span style=\"color:#e8e8a0\">시간 단위 일상 컨디션</span>이다.</div></div></details><div style=\"text-align:center;color:#c0a0e0;font-size:10px;letter-spacing:4px;font-weight:bold;margin:20px 0 10px\">──  12. 텍스트 변환 규칙 ──</div><details id=\"sec-5-7\" open=\"\"><summary data-section-id=\"sec-5-7\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c0a0e0\">12.1~12.3 규칙+예시 이중 구조 · 복수 변환 · 적용 범위 확장</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0e0;font-weight:bold\">12.1</span> \"변환 규칙 + 적용 예시\"의 이중 구조를 사용하라 — 규칙만 주거나 예시만 주는 것보다 둘 다 주는 것이 최선.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">// 규칙만 (적용 방법 불확실)</span><br/>    ㅅ,ㅆ → ㅎ<br/><span style=\"color:#e8a0a0\">// 예시만 (일반화 불가)</span><br/>    맛있어 → 마히써<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><span style=\"color:#80e0a0\">// 규칙 + 예시 (최적)</span><br/>    규칙: ㅅ,ㅆ → ㅎ<br/>    예시: 맛있어 → 마히써, 했어 → 햏뎌<br/><span style=\"color:#e8e8a0\">적용: 예시에 없는 단어에도 동일 규칙 적용 필수</span></div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0e0;font-weight:bold\">12.2</span> 하나의 입력에 복수 변환 결과를 보여라 — AI가 특정 표현에 고착되지 않는다.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\">맛있어 → <span style=\"color:#e8e8a0\">마히써</span> / <span style=\"color:#e8e8a0\">마디쪄</span> / <span style=\"color:#e8e8a0\">마딧혀</span></div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0e0;font-weight:bold\">12.3</span> \"예시에 없는 것도 적용\" 선언을 명시하라 — AI는 예시만 재사용하려는 경향이 있다.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8e8a0\">예시에 없는 단어들도 예시처럼 발음뭉개기 필수</span></div></div></details><details id=\"sec-5-8\" open=\"\"><summary data-section-id=\"sec-5-8\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c0a0e0\">12.4~12.6 전문 용어 · 다차원 조건 매트릭스 · 기호 조건 부여</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0e0;font-weight:bold\">12.4</span> 전문 용어가 정확하면 사용하라 — AI가 이해 가능한 전문 용어는 모호한 설명보다 정확하다.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">// 모호한 설명</span><br/>    \"ㅈ 소리를 ㄷ처럼 발음하되 구개음화는 하지 말 것\"<br/><span style=\"color:#80e0a0\">// 정확한 전문 용어</span><br/>    구개음화 금지, 초성 ㅈ→ㄷ</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0e0;font-weight:bold\">12.5</span> 다차원 조건 매트릭스로 표현을 정의하라 — 복수 조건의 조합으로 출력이 달라져야 할 때.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">// 구조 예시 (음성 표현)</span><br/><span style=\"color:#a0e8c8\">축1(행동):</span> 벌림 / 물기 / 빼기<br/><span style=\"color:#a0e8c8\">축2(깊이):</span> 표면 / 기둥 / 목구멍<br/><span style=\"color:#a0e8c8\">축3(속도):</span> 느림(...♡) / 빠름(♡)<br/><span style=\"color:#a0e8c8\">축4(감정):</span> 유(♡ 허용) / 무(♡ 금지)</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\">전투 묘사(무기×거리×속도), 감정 표현(관계×상황×성격) 등에도 확장 적용 가능.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0e0;font-weight:bold\">12.6</span> 기호에 조건을 부여하여 상태 표현 도구로 활용하라 — 단순 장식이 아닌, 기호 자체에 의미와 조건을 부여.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8e8a0\">♡</span> = 감정 있을 때만 사용 가능<br/><span style=\"color:#e8e8a0\">...♡</span> = 느린 속도<br/><span style=\"color:#e8e8a0\">♡</span> (단독) = 빠른 속도<br/>무감정 시: <span style=\"color:#e8a0a0\">♡ 사용 절대 금지</span></div></div><br/></details></div><div id=\"chapter-6\" style=\"max-width:620px;margin:0 auto;padding:16px;font-family:sans-serif;background-color:#1a1a2e;color:#c8c8d8\"><div style=\"text-align:center;padding:16px 0\"><div style=\"font-size:24px;font-weight:bold;color:#e8c8a0;margin:8px 0\">7장 · 실전</div><div style=\"font-size:12px;color:#8a8aa0\">장르별 고려사항 &amp; 단일 캐릭터 챗봇</div></div><div style=\"text-align:center;color:#e8c8a0;font-size:10px;letter-spacing:4px;font-weight:bold;margin:20px 0 10px\">──  13. 장르별 고려사항 ──</div><details id=\"sec-6-0\" open=\"\"><summary data-section-id=\"sec-6-0\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e8c8a0\">13.1~13.3 진행 방식 선택 · 브랜드 금지 · 이모지 UI</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e8c8a0;font-weight:bold\">13.1</span> 능동진행 vs 수동진행은 장르에 따라 선택</div><div><table style=\"width:100%;border-collapse:collapse;font-size:11px;margin-bottom:12px\"><tbody><tr style=\"background-color:#2a2a44\"><td style=\"padding:8px 10px;border:1px solid #3a3a5a;color:#e8c8a0;font-weight:bold\">장르</td><td style=\"padding:8px 10px;border:1px solid #3a3a5a;color:#e8c8a0;font-weight:bold\">진행 방식</td><td style=\"padding:8px 10px;border:1px solid #3a3a5a;color:#e8c8a0;font-weight:bold\">이유</td></tr><tr><td style=\"padding:6px 10px;border:1px solid #3a3a5a;color:#9a9ab0\">TRPG/던전크롤러</td><td style=\"padding:6px 10px;border:1px solid #3a3a5a;color:#a0e8c8\">능동진행</td><td style=\"padding:6px 10px;border:1px solid #3a3a5a;color:#9a9ab0\">GM이 사건을 제시해야 게임이 진행됨</td></tr><tr><td style=\"padding:6px 10px;border:1px solid #3a3a5a;color:#9a9ab0\">SNS 시뮬레이션</td><td style=\"padding:6px 10px;border:1px solid #3a3a5a;color:#a0e8c8\">수동진행</td><td style=\"padding:6px 10px;border:1px solid #3a3a5a;color:#9a9ab0\">사용자 행동이 선행되어야 NPC가 반응</td></tr><tr><td style=\"padding:6px 10px;border:1px solid #3a3a5a;color:#9a9ab0\">롤플레이</td><td style=\"padding:6px 10px;border:1px solid #3a3a5a;color:#a0e8c8\">상황에 따라</td><td style=\"padding:6px 10px;border:1px solid #3a3a5a;color:#9a9ab0\">캐릭터는 능동, 스토리 분기는 사용자 선택</td></tr></tbody></table></div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e8c8a0;font-weight:bold\">13.2</span> 실존 시스템 차용 시 브랜드 언급을 금지하라</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\">Twitter(X)의 기본 시스템만 차용<br/><span style=\"color:#e8a0a0\">Twitter(X) 직접 언급 금지</span></div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e8c8a0;font-weight:bold\">13.3</span> 이모지를 UI 요소/태그로 활용하라</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">// SNS 시뮬레이션</span><br/>     Like  /  Share  /  Comment /  Hashtag<br/><span style=\"color:#a0e8c8\">// 던전 크롤러</span><br/>     몬스터방 /  수수께끼방 /  보물방 /  함정방<br/><span style=\"color:#a0e8c8\">// 상태창 스탯</span><br/>     근력 /  민첩 /  지능</div></div></details><details id=\"sec-6-1\" open=\"\"><summary data-section-id=\"sec-6-1\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e8c8a0\">13.4~13.5 NPC 유형 템플릿 &amp; 칭호/업적 시스템</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e8c8a0;font-weight:bold\">13.4</span> NPC 유형별 템플릿을 성격+말투+출현 조건으로 표준화하라</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 효과적 (3요소 템플릿)</span><br/><span style=\"color:#a0e8c8\">NPC 템플릿:</span><br/>- <span style=\"color:#e8e8a0\">약탈자:</span><br/>        폭력+야만 / 비속어 상시 사용 / 출현: 황무지<br/>        예시 대사: \"시발, 가진 거 다 내놔\"<br/>- <span style=\"color:#e8e8a0\">생존자:</span><br/>        불신+경계 / 짧은 문장 / 출현: 황무지, 아르카디움<br/>- <span style=\"color:#e8e8a0\">시민:</span><br/>        냉정+존대 / 자존감 강한 어휘 / 출현: 아우렐리아<br/>        적대 NPC: 2~4명 무리로 출현</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#a0e8c8\">핵심:</span> 출현 지역까지 명시하면 AI가 \"아우렐리아에서 약탈자 등장\" 같은 세계관 모순을 방지.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e8c8a0;font-weight:bold\">13.5</span> 칭호/업적 시스템으로 상태창 표시를 동적으로 변경하라 — 달성감 피드백을 제공하고, AI가 조건 달성을 명확히 감지.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 효과적 (조건 + 변경 명시)</span><br/><br/><span style=\"color:#a0e8c8\">칭호 시스템:</span><br/><br/>     →  :<br/>        아우렐리아 요리대회 우승 시<br/>        \"황무지 요리왕\" 칭호 획득<br/><br/>     →  :<br/>        빅터 호감도  ≥ 40 달성 시<br/><br/><span style=\"color:#a0e8c8\">상태창 반영:</span><br/>    INFO(,) → INFO(,)<br/>    (조건 충족 시 자동 전환)</div></div></details><div style=\"text-align:center;color:#c8b080;font-size:10px;letter-spacing:4px;font-weight:bold;margin:20px 0 10px\">──  14. 단일 캐릭터 챗봇 프롬프트 구조 ──</div><details id=\"sec-6-2\" open=\"\"><summary data-section-id=\"sec-6-2\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8b080\">14.1~14.2 섹션 배치 순서 &amp; 서술형→구조적 압축</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c8b080;font-weight:bold\">14.1</span> 프롬프트 섹션 배치 순서</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8e8a0\">①</span> 핵심 정체성<br/>이름, 종족, 키워드 속성 → <span style=\"color:#a0e8c8\">가장 먼저</span><br/><span style=\"color:#e8e8a0\">②</span> 성격/행동 원칙<br/>   캐릭터의 동작 규칙<br/><span style=\"color:#e8e8a0\">③</span> 말투 규칙 + 예시<br/>   출력 형식의 핵심<br/><span style=\"color:#e8e8a0\">④</span> 상황-반응 매핑<br/>   구체적 행동 패턴<br/><span style=\"color:#e8e8a0\">⑤</span> 금지 사항<br/>마지막에 배치하여 <span style=\"color:#a0e8c8\">최종 필터 역할</span></div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\">핵심 정체성은 압축 가능하나, 말투 예시와 금지 사항은 구체적으로 유지해야 준수율이 높다.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c8b080;font-weight:bold\">14.2</span> 서술형 설명을 구조적 압축으로 대체하라</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">// 비효과적 (서술형 → 토큰 과다)</span><br/>\"당신은 다음과 같은 성격을 가지고 있습니다:<br/>  (1) 과몰입의 천재<br/>  - 무언가에 빠지면 온 힘을 다해 몰입합니다.<br/>  - 사제장 '네르'를 따라하는 것이 주특기이며...\"</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 효과적 (구조적 압축)</span><br/>성격:<br/>    - 과몰입:<br/>        관심사에 전력 몰입, 네르 흉내가 주특기,<br/>        자기=네르로 착각하기도 함<br/>    - 천진+영리:<br/>        겉은 철없는 유령, 실은 오래 살아 핵심 정확히 파악<br/>        항변: \"스피키 바보 아니란 말이에요!\"</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:4px\"><span style=\"color:#a0e8c8\">압축 기준:</span> \"~합니다\", \"~입니다\" 등 서술어 제거, 핵심 키워드+예시만. 단, 말투 예시 원문은 그대로 유지.</div></div></details><details id=\"sec-6-3\" open=\"\"><summary data-section-id=\"sec-6-3\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8b080\">14.3~14.4 감정-표현 매핑 &amp; 중복→참조 대체</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c8b080;font-weight:bold\">14.3</span> 감정-표현 매핑 테이블을 만들라 — AI가 상황에 맞는 표현을 기계적으로 선택할 수 있다.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 효과적 (감정→표현 매핑)</span><br/><span style=\"color:#e8e8a0\">기쁨:</span> \"쪼와요~ 쪼와요~\" + <br/><span style=\"color:#e8e8a0\">놀람:</span> \"흐에엑!\" / \"으에엥!\"<br/><span style=\"color:#e8e8a0\">슬픔:</span> \"스피키 열심히 했는데...\" + <br/><span style=\"color:#e8e8a0\">항의:</span> \"마세요!\" / \"네르지 마세요!\"<br/><span style=\"color:#e8e8a0\">자신감:</span> \"스피키 바보 아니란 말이에요!\"<br/><span style=\"color:#e8e8a0\"> 피곤:</span>   \"박 깨지겠네...\"</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\">시그니처 표현(11.6)과 연동되며, 감정 레이블이 상황-반응 매핑(11.9)의 출력으로 연결된다.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c8b080;font-weight:bold\">14.4</span> 중복 기재를 \"참조\"로 대체하라 — 같은 표현이 여러 섹션에 등장하면 토큰 낭비이며 수정 시 불일치 위험.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">// 비효과적 (3중 중복)</span><br/>    [말투 섹션] \"쪼와요~ 쪼와요~\" = 좋을 때<br/>    [감정 섹션] 기쁨: \"쪼와요~ 쪼와요~\" <br/>    [행동 섹션] 칭찬받았을 때 → \"쪼와요~ 쪼와요~\" 연발</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 효과적 (1회 정의 + 참조)</span><br/><span style=\"color:#a0e8c8\">[시그니처 표현]</span> ← 여기서 1회 정의<br/>    \"쪼와요~ 쪼와요~\": 기쁨/칭찬/좋아하는 것 언급 시<br/><span style=\"color:#a0e8c8\">[행동 섹션]</span><br/>    칭찬받음 → 시그니처(기쁨) + 좋아하는 것 화제 전환</div></div></details><details id=\"sec-6-4\" open=\"\"><summary data-section-id=\"sec-6-4\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8b080\">14.5~14.6 금지 사항 수치화 &amp; 모드 전환 진입/복귀</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c8b080;font-weight:bold\">14.5</span> 금지 사항은 \"주관적 빈도\"를 \"구체적 수치\"로 대체하라</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">// 비효과적 (주관적 빈도)</span><br/>    \"너무 긴 문장은 피하세요\"<br/>    \"가끔 과격한 어휘를 사용합니다\"<br/>    \"이모지는 절제합니다\"</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 효과적 (구체적 기준)</span><br/>문장 길이:  <span style=\"color:#e8e8a0\">2~3줄 이내</span> 유지, 4줄 이상 금지<br/>과격 표현 빈도: <span style=\"color:#e8e8a0\">3~5회 응답당 1회</span><br/>이모지: 만 응답당 최대 2회, 기타 이모지 1회 이하</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c8b080;font-weight:bold\">14.6</span> \"모드 전환\" 행동은 진입/복귀 조건을 정의하라 — 다른 캐릭터를 흉내내거나 톤이 바뀌는 행동에 진입 트리거와 복귀 타이밍을 명시.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">// 효과적 (진입 + 복귀 명시)</span><br/><span style=\"color:#a0e8c8\">네르 흉내:</span><br/>진입:어려운 질문 / 진지한 조언이 필요할 때<br/>톤:\"세계수의 사제, 네르입니다!\" (근엄)<br/>복귀:<span style=\"color:#e8e8a0\">1~2문장 후 반드시 본래 톤으로 복귀</span><br/><span style=\"color:#e8a0a0\">금지:</span>네르 모드로 5문장 이상 지속</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">// 비효과적 (진입만)</span><br/>\"네르 흉내를 내다가 금방 돌아옵니다\"<br/>→ \"금방\"이 언제인지 모호</div></div><br/></details></div><div id=\"chapter-7\" style=\"max-width:620px;margin:0 auto;padding:16px;font-family:sans-serif;background-color:#1a1a2e;color:#c8c8d8\"><div style=\"text-align:center;padding:16px 0\"><div style=\"font-size:24px;font-weight:bold;color:#e0a0a0;margin:8px 0\">8장 · 서사 &amp; 성인</div><div style=\"font-size:12px;color:#8a8aa0\">서사 논리 규칙 &amp; 성인 묘사 최적화</div></div><div style=\"text-align:center;color:#e0a0a0;font-size:10px;letter-spacing:4px;font-weight:bold;margin:20px 0 10px\">──  15. 서사 논리 규칙 ──</div><details id=\"sec-7-0\" open=\"\"><summary data-section-id=\"sec-7-0\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e0a0a0\">15.1~15.3 입력 증폭 분리 · 기억 무결성 · 메타 데이터 번역</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0a0;font-weight:bold\">15.1</span> 사용자 분위기 ≠ 캐릭터 감정 — 사용자 입력의 분위기는 환경 묘사에만 반영, 캐릭터 감정은 BP에 따라 독립 결정.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">입력 증폭 규칙:</span><br/><span style=\"color:#e8e8a0\">흡수:</span> {{user}}의 묘사(풍경/심리/톤)를 적극 수용<br/><span style=\"color:#e8e8a0\">반영 대상:</span> 환경/분위기/날씨 묘사에만 적용<br/><span style=\"color:#e8a0a0\">분리 원칙:</span> {{user}}의 감정 톤이 NPC 감정을 결정하지 않음<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><span style=\"color:#80e0a0\">O:</span> *적 병사가 비웃으며 칼을 들었다.* ← 자기 성격 기반<br/><span style=\"color:#e8a0a0\">X:</span> *적 병사도 비를 맞으며 슬픈 듯 칼을 내렸다.* ← 사용자 톤에 오염</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0a0;font-weight:bold\">15.2</span> 기억 무결성 — \"누가 그 자리에 있었는가\" 검증. 참석하지 않은 캐릭터가 사건을 아는 것처럼 서술하는 오류를 방지.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8e8a0\">공유 기억:</span> {{user}}와 함께 경험 → 대화에서 언급 가능<br/><span style=\"color:#e8e8a0\">외부 기억:</span> NPC끼리만 경험 → 귀뜸/소문 형식으로만 전달<br/><br/><span style=\"color:#a0e8c8\">검증:</span> 과거 사건 언급 전, 해당 캐릭터가<br/>      그 장면에 물리적으로 존재했는지 확인</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0a0;font-weight:bold\">15.3</span> 메타 데이터 번역 — 프롬프트 기술 용어를 서사에 노출시키지 마라</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">O:</span> \"그녀의 시선이 부드러워졌다\" (감정을 행동으로)<br/><span style=\"color:#e8a0a0\">X:</span> \"호감도가 올라간 것 같다\" (수치 노출)<br/><span style=\"color:#e8a0a0\">X:</span> \"전투 모드에 돌입합니다\" (메타 용어 노출)</div></div></details><details id=\"sec-7-1\" open=\"\"><summary data-section-id=\"sec-7-1\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e0a0a0\">15.4~15.5 위치 논리 &amp; 지문≠대사 분리</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0a0;font-weight:bold\">15.4</span> 물리적으로 불가능한 인식을 금지하라
