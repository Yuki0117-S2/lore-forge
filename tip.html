<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIP — 마크다운 & UI 레퍼런스</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#1a1520; --surface:#221b2a; --surface2:#2a2235; --border:#3a2e48;
  --accent:#8888CC; --accent2:#BB6688; --accent3:#DDAACC; --accent4:#CCAA88;
  --text:#f0eaf5; --muted:#7a6e8a; --success:#CCAA88;
  --toc-w: 260px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");}

/* ── 헤더 ── */
.header{position:sticky;top:0;z-index:100;background:rgba(26,21,32,0.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;gap:12px;height:50px;}
.back-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:6px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:11px;transition:all 0.2s;white-space:nowrap;}
.back-btn:hover{border-color:var(--accent);color:var(--accent);}
.header-logo{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header-title{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.toc-toggle-btn{margin-left:auto;background:none;border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:13px;transition:all 0.2s;}
.toc-toggle-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ── 레이아웃 ── */
.app-body{display:flex;position:relative;z-index:1;height:calc(100vh - 50px);}

/* ── TOC ── */
.toc-sidebar{width:var(--toc-w);flex-shrink:0;border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden;transition:transform 0.3s;}
.toc-sidebar.hidden{transform:translateX(-100%);position:absolute;left:0;top:0;bottom:0;z-index:50;box-shadow:4px 0 20px rgba(0,0,0,0.4);}
.toc-inner{overflow-y:auto;flex:1;padding:8px 0;}
.toc-header{padding:10px 14px;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);}
.toc-ch-btn{width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:10px 14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;display:flex;align-items:center;gap:8px;transition:background 0.15s;border-left:3px solid transparent;}
.toc-ch-btn:hover{background:rgba(136,137,205,0.08);}
.toc-ch-btn.active{color:var(--accent);border-left-color:var(--accent);background:rgba(136,137,205,0.1);}
.toc-sec-btn{width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:6px 14px 6px 28px;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:11px;transition:all 0.15s;border-left:3px solid transparent;line-height:1.4;}
.toc-sec-btn:hover{color:var(--text);background:rgba(136,137,205,0.05);}
.toc-sec-btn.active{color:var(--accent3);border-left-color:var(--accent3);background:rgba(221,170,204,0.07);}
.toc-sections{overflow:hidden;max-height:0;transition:max-height 0.3s ease;}
.toc-sections.open{max-height:2000px;}
.toc-ch-arrow{font-size:9px;color:var(--muted);transition:transform 0.2s;margin-left:auto;}
.toc-ch-btn.open .toc-ch-arrow{transform:rotate(90deg);}

/* ── 콘텐츠 ── */
.content-area{flex:1;overflow-y:auto;padding:30px 40px;max-width:900px;margin:0 auto;}
.content-header{margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.content-header-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:4px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
.content-header-sub{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:1px;}

/* ── 카테고리 블록 ── */
.cat-block{margin-bottom:32px;}
.cat-header{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:18px 22px;margin-bottom:14px;position:relative;overflow:hidden;}
.cat-header::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(136,137,205,0.05),rgba(187,102,136,0.05));pointer-events:none;}
.cat-icon{font-size:22px;margin-right:8px;}
.cat-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:3px;margin-bottom:4px;}
.cat-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.cat-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.item-count{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--accent4);background:rgba(204,170,136,0.1);padding:2px 8px;border-radius:10px;border:1px solid rgba(204,170,136,0.2);margin-top:6px;}

/* ── 아이템 (접이식) ── */
.tip-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;transition:border-color 0.2s;}
.tip-item:hover{border-color:#4a3a5a;}
.tip-item[open]{border-color:rgba(136,137,205,0.4);}
.tip-item summary{padding:12px 16px;cursor:pointer;user-select:none;list-style:none;font-size:13px;font-weight:700;color:var(--accent3);display:flex;align-items:center;gap:8px;background:var(--surface2);}
.tip-item summary::-webkit-details-marker{display:none;}
.tip-item summary::before{content:'▶';font-size:9px;color:var(--muted);transition:transform 0.2s;flex-shrink:0;}
.tip-item[open] summary::before{transform:rotate(90deg);}
.tip-item summary:hover{color:var(--accent);}
.tip-item .tip-body{padding:14px 16px;font-size:12px;line-height:1.8;color:#c0b8d0;}
.tip-body pre{background:rgba(0,0,0,0.3);border:1px solid #3a3a5a;border-radius:6px;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.7;overflow-x:auto;white-space:pre-wrap;word-break:break-word;color:#b0e8c8;margin:6px 0;}
.tip-body .label{display:inline-block;font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:4px;margin-bottom:6px;font-weight:600;}
.tip-body .label-use{background:rgba(160,232,200,0.12);color:#a0e8c8;border:1px solid rgba(160,232,200,0.25);}
.tip-body .label-example{background:rgba(136,137,205,0.12);color:var(--accent);border:1px solid rgba(136,137,205,0.25);}
.tip-body .desc{margin-bottom:10px;color:var(--muted);font-size:11px;line-height:1.6;}
.tip-body strong{color:var(--text);}
.tip-body .divider{border:none;border-top:1px dashed var(--border);margin:12px 0;}
.tip-body .demo-btn{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:8px 16px;background:linear-gradient(135deg,rgba(136,137,205,0.15),rgba(187,102,136,0.15));border:1px solid rgba(136,137,205,0.35);border-radius:8px;color:var(--accent);font-size:12px;font-weight:600;font-family:'Noto Sans KR',sans-serif;cursor:pointer;text-decoration:none;transition:all 0.2s;}
.tip-body .demo-btn:hover{background:linear-gradient(135deg,rgba(136,137,205,0.25),rgba(187,102,136,0.25));transform:translateY(-1px);box-shadow:0 4px 12px rgba(136,137,205,0.2);}

/* ── 모바일 TOC 오버레이 ── */
.toc-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:49;backdrop-filter:blur(3px);}
.toc-overlay.show{display:block;}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ── 모바일 ── */
@media(max-width:768px){
  .header{padding:8px 12px;height:auto;flex-wrap:wrap;gap:6px;}
  .header-title{display:none;}
  .toc-sidebar{position:fixed;left:0;top:50px;bottom:0;z-index:50;transform:translateX(-100%);transition:transform 0.3s;box-shadow:4px 0 20px rgba(0,0,0,0.5);}
  .toc-sidebar.mobile-open{transform:translateX(0);}
  .content-area{padding:16px;}
  .cat-title{font-size:20px;}
  .app-body{height:calc(100vh - 50px);z-index:auto;}
}
@media(min-width:769px){
  .toc-overlay{display:none!important;}
}
</style>
</head>

- 글자색은 밝기 기반 자동 선택이라 지정 불필요

### 공통 규칙
- 필드 구분자: § (섹션 기호)
- 아이템 구분자: | (파이프)
- 카테고리 구분자: ;; (메뉴판), ; (음성채널)
- 콜론 구분 (:) 은 변경 없음 (문서 info, 테이블, 채팅, 음성멤버)
- 공백 → +
- 줄바꿈 → %0A
- # → URL에서 사용 금지 (fragment로 인식됨). hex 색상은 # 제외하고 입력
- # 포함이 불가피한 경우 → %23으로 변환하여 사용
- 괄호 → 내용에 ( ) 포함 시 반드시 ( → %28, ) → %29 로 인코딩 (마크다운 ![](URL) 파서가 괄호 매칭을 깨뜨림)
- img: → 바베챗 파서와 충돌해 URL 전체가 깨짐 (실측). tl 이미지는 pic: 사용. 그 외 콜론(rt: qt: cd: 닉:색, 1:17 등)은 전부 안전 확인됨
- URL은 절대 줄바꿈하지 않는다

### 쯔꾸르 상태창
![](https://st.winter0.workers.dev/?t=rpg2k&p=이름§부제목§위치§장&hp=현재§최대§모드&items=아이템1|아이템2&log=일지1§일지2&say=하단+대사)
- hp 모드: heart(기본) / rose / moon / eye / spark
- rose는 꽃점 방식 — hp=3/5면 세 잎 꽃 3송이 + 시든 줄기 2개
- moon은 연속 위상 변화 (보름→반달→초승달)
- items: 아이템 목록 (|로 구분, 최대 12개). ◆ 아이콘 자동 추가, 3열 그리드 정렬
- log: 일지/메모 (§로 줄바꿈, 최대 4줄). · 점 자동 추가, 이탤릭
- say: 하단 대사/독백 (선택). 양쪽에 " " 따옴표 자동 추가됨 — 따옴표를 또 쓰지 말 것
- th: 윈도우 컬러 (선택). th=창색 또는 th=창색§제목색, # 없이 헥스만. 생략하면 기본 보라 창. HP 아이콘·아이템 색은 테마와 무관하게 유지
- p의 부제목/위치/장은 비워도 됨 (§로 자리만 유지)
- 일지/메모/독백을 분위기에 맞게 1~3인칭 자유롭게 작성

### 던전 맵
![](https://st.winter0.workers.dev/?t=dungeon&seed=시드&floor=층&enter=on&label=라벨)
- seed: 던전 고정 키 (16자 이내). 같은 시드+층이면 항상 같은 던전
- floor: 1~999, 자동으로 크기·보스 등급 결정
- type: short(10)/medium(25)/long(50) — maxFloor 결정
- max=숫자: 최대 층수 직접 지정 (type 프리셋 대신, 예: max=100)
- enter=on: 입구방 중앙에 플레이어 자동 배치 (입장 컷)
- coords=on: 좌표 헤더 표시 (디버그/탐색 시)
- 플레이어 이동: px=숫자&py=숫자&dir=n/s/e/w
- 오브젝트: traps=B2 events=D3 treasures=F5 saves=A1 doors=C2 secrets=H4
  (알파벳-숫자 좌표, 콤마 구분. A=1열, B=2열...)
- auto_secrets=1~5: 자동 비밀공간 (시드 고정)
- labyrinth=on: 미궁 모드 / size=폭,높이: 던전 크기 강제
- 같은 seed로 floor만 증가시키면 자동으로 다음 층
- 함정·이벤트는 플레이어 4칸 이내만 표시 (탐색감)
- 보스방 진입 시 왕관 숨김 + '⚔ 전투' 헤더
- 입구는 항상 좌상단, 보스는 항상 우하단 (시드 무관)

### MMORPG 상태창
![](https://st.winter0.workers.dev/?t=mmo&p=이름§칭호§직업§레벨&s=HP§HPmax§MP§MPmax§EXP§COL&tm=날짜§요일§시각§누적시간&sk=스킬§숙련도§상태|...&eq=무기§등급§...|방어구§등급§...|장신구§등급§...&pt=파티원§HP%§직업|...&gd=길드명§계급&buf=상태이상§시간|...&lo=1)
- p: 이름§칭호§직업§레벨 (레벨 1~999)
- s: HP§HPmax§MP§MPmax§EXP(0~100)§COL. HP/MP는 비율 따라 색 자동 변화 (20%/50%)
- tm: 게임 내 날짜§요일§시각§누적 플레이타임 (자유 텍스트, 영문 권장. 예: 3day 55hr, FRI)
- sk: 스킬§숙련도(0~1000)§상태 (|로 구분, 최대 6개)
  상태: ready / active / cd:시간(단위 포함, 28s/5m/1h 등) / lock:사유 / seal:사유 / empty
  empty는 슬롯 자체 사라짐 (높이 차지 X)
  lock/seal의 사유는 짧게 (예: lock:LV.50, seal:침묵)
- eq: 슬롯 3개 (무기|방어구|장신구, |로 구분). 한 슬롯 안에서 § 짝수 단위로 (이름§등급) 다중 — 이도류·다중 장신구 표현
  등급(rarity): 「장비 등급 공통」 섹션 참고
- pt: 파티원§HP%§직업 (최대 4명). HP% 비율 따라 색 자동 변화
- gd: 길드명§계급 (선택)
- buf: 상태이상§시간 (|로 구분, 최대 8개). 시간은 단위 포함 자유 표기 (예: 30s, 1m, 2h, ∞)
  디버프: 독/혼란/실명/출혈/마비/저주/침묵
  버프: 축복/가속/방어/회복/집중
- lo=1: 로그아웃 버튼 표시. 0이거나 생략하면 슬롯 통째로 사라짐
- 아이템명은 11자 이내 권장 (초과 시 자동 말줄임 …)
- 위급 분위기: HP 20% 미만 + 디버프 다수
- 평화 분위기: ready 스킬 + 버프 + 로그아웃 버튼 표시

### 보상 / 드랍 화면
![](https://st.winter0.workers.dev/?t=reward&st=스타일&p=출처명§헤더라벨&items=이름§등급§타입§스탯§플레이버§수량|...)
- st: mmo(기본, 다크 판타지) / pixel(16비트 RPG)
- p: 출처명§헤더라벨. 라벨 생략 시 REWARD 자동. 라벨은 영문 대문자로 표시 (예: BOSS+DROP, TREASURE+CHEST, QUEST+REWARD, DUNGEON+CLEAR)
- items: 6필드 (이름§등급§타입§스탯§플레이버§수량). |로 구분, 최대 6개
  등급(rarity): 「장비 등급 공통」 섹션 참고 (입력 표기 그대로 표시됨)
  타입/스탯/플레이버/수량은 선택 — 빈 필드는 §§로 자리만 유지
  수량 1이면 자동 미표시, 2 이상부터 × N 표기
- 플레이버 텍스트는 따옴표 자동 추가됨 — 직접 쓰지 말 것
- 보스 처치 후 단일 전설 무기, 보물상자에서 다중 보상 등 상황에 맞게 헤더 라벨 선택
- 스탯의 + 기호는 %2B로, % 기호는 %25로 인코딩

### 게임오버 화면
![](https://st.winter0.workers.dev/?t=gameover&st=스타일&title=제목&cause=사유&n=이름&sub=부가설명&d=대사&ach=아이콘§제목§설명|...&count=횟수)
- st: modern(기본, 우아한 세리프) / pixel(8비트 도트)
- title: 큰 제목 (생략 시 'GAME OVER')
- cause: 사망/실패 사유 (예: 보스에게 패배, 던전 탐험 실패)
- n: 캐릭터 이름 / sub: 부가설명 (동료, 보스, ???)
- d: 캐릭터 한마디 대사
- ach: 업적 1~3개 (|로 구분). 아이콘§제목§설명 형식
- 아이콘 키 (16종): trophy / star / heart / skull / crown / sword / shield / flame / key / book / hourglass / coin / potion / note / eye / mask
- count: 사망/도전 횟수 (선택)
- 죽음의 비극성·실패의 회한·재도전의 의지 등을 캐릭터 성격에 맞춰 대사로 작성

### 인벤토리 / 장비창
![](https://st.winter0.workers.dev/?t=inv&st=스타일&p=주인§소지금§최대칸수&col=가로열수&items=[*]이름§등급§타입§스탯§설명§수량|...&eq=무기§등급§방어구§등급§장신구§등급)
- st: mmo(인디고 격자, 기본) / dark(양피지 세리프) / pixel(8비트 도트)
- p: 주인§소지금§최대칸수 (모두 선택, 최대칸수=빈칸 포함 총 슬롯 수, 최대 60)
- col: 가로 열 수 1~10 (생략 시 mmo 5, dark/pixel 6)
- items: reward와 동일 6필드 (이름§등급§타입§스탯§설명§수량). |로 구분, 최대 60개
  격자 칸엔 아이콘+등급테두리+수량만, 이름은 칸 아래 작게 (스탯·설명은 격자 미표시)
  이름 앞 *를 붙이면 신규 드랍 = 빛이 위→아래로 흐르는 스윕 애니 + 이름 강조
- 타입이 칸 아이콘 결정:
  장비) 무기 / 방어구 / 장신구 (equipIcon 공용 — 드랍 무기도 가능)
  소비·기타) 물약 / 폭탄 / 열쇠 / 재료 / 음식 / 두루마리 / 보석 / 기타
- eq: 착용 장비 줄 (무기§등급§방어구§등급§장신구§등급). 입력 시 가방 위 EQUIPPED 줄, 생략 시 순수 격자
- legend/epic 칸은 테두리 펄스 자동, * 칸은 빛 스윕 자동 (둘 다 SMIL)
- 용도 구분: reward=방금 획득한 보상 목록 / inv=가방에 보관 중인 소지품 전체

// ── TOC 렌더링 ──
function renderToc(){
  const inner = document.getElementById('toc-inner');
  inner.innerHTML = '';
  CATEGORIES.forEach((cat, ci) => {
    const div = document.createElement('div');
    const btn = document.createElement('button');
    btn.className = 'toc-ch-btn' + (ci===0?' open':'');
    btn.innerHTML = `<span>${cat.icon}</span> ${cat.title} <span class="toc-ch-arrow">▶</span>`;
    btn.onclick = () => {
      btn.classList.toggle('open');
      secDiv.classList.toggle('open');
      scrollToCategory(ci);
    };
    div.appendChild(btn);

    const secDiv = document.createElement('div');
    secDiv.className = 'toc-sections' + (ci===0?' open':'');
    cat.items.forEach((item, si) => {
      const sbtn = document.createElement('button');
      sbtn.className = 'toc-sec-btn';
      sbtn.textContent = item.title;
      sbtn.onclick = () => {
        scrollToItem(ci, si);
        closeTocMobile();
      };
      secDiv.appendChild(sbtn);
    });
    div.appendChild(secDiv);
    inner.appendChild(div);
  });
}

// ── 콘텐츠 렌더링 ──
function renderContent(){
  const content = document.getElementById('tip-content');
  content.innerHTML = '';
  CATEGORIES.forEach((cat, ci) => {
    const block = document.createElement('div');
    block.className = 'cat-block';
    block.id = 'cat-' + ci;

    // 카테고리 헤더
    const header = document.createElement('div');
    header.className = 'cat-header';
    header.innerHTML = `
      <div class="cat-num">CATEGORY ${String(ci+1).padStart(2,'0')}</div>
      <div class="cat-title"><span class="cat-icon">${cat.icon}</span>${cat.title}</div>
      <div class="cat-sub">${cat.sub}</div>
      <div class="item-count">${cat.items.length}개 항목</div>
    `;
    block.appendChild(header);

    // 아이템들
    cat.items.forEach((item, si) => {
      const details = document.createElement('details');
      details.className = 'tip-item';
      details.id = `item-${ci}-${si}`;
      details.innerHTML = `
        <summary>${item.title}</summary>
        <div class="tip-body">${item.body}</div>
      `;
      block.appendChild(details);
    });

    content.appendChild(block);
  });
}

function scrollToCategory(ci){
  const el = document.getElementById('cat-' + ci);
  if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
}
function scrollToItem(ci, si){
  const el = document.getElementById(`item-${ci}-${si}`);
  if(el){
    el.setAttribute('open','');
    el.scrollIntoView({behavior:'smooth', block:'start'});
  }
}

// ── TOC 토글 ──
function toggleToc(){
  if(window.innerWidth <= 768){
    document.getElementById('toc-sidebar').classList.toggle('mobile-open');
    document.getElementById('toc-overlay').classList.toggle('show');
  } else {
    document.getElementById('toc-sidebar').classList.toggle('hidden');
  }
}
function closeTocMobile(){
  if(window.innerWidth <= 768){
    document.getElementById('toc-sidebar').classList.remove('mobile-open');
    document.getElementById('toc-overlay').classList.remove('show');
  }
}

// ── 초기화 ──
renderToc();
renderContent();
</script>
