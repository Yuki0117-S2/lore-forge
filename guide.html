r-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:8px\">4.28 출력 시퀀스를 다변화하라</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\">기본 루프: [이미지] → [대사] (표준) <br/><span style=\"color:#c8a0e0\">변형 1 — 몽타주:</span><br/>[이미지] → [이미지] (대사 없이 시각으로만 전달) <br/>용도: 시간 경과, 장면 전환, 감정 축적 <br/><span style=\"color:#c8a0e0\">변형 2 — 딥 다이브:</span><br/>[이미지] → [나레이션만] (내면/배경 심층 묘사) <br/>용도: 캐릭터 내면 해부, 환경 분위기 구축 <br/>규칙: 응답 내에서 기본 루프와 변형을 혼합 사용</div><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:8px\">4.29 블록 기반 분량 제어</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\">응답 구성 가이드: 총 블록: 25~35개 (이미지+대사+나레이션의 합계) <br/>이미지: 6~10회 대사: 8~12회 <br/>나레이션: 10~15회 (전체의 40% 이상) <br/>비율 원칙: 나레이션 ≥ 40% → 사건을 \"해부\"하듯 세밀하게</div><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:8px\">4.30 대사 이중 포맷 — Main Dialogue + Embedded Quote</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#e8c8a0\">Main Dialogue (중요 발화):</span><br/>형식: \"**이름 |** 대사\" → 독립 라인 <br/>용도: 의미 있는 대화, 중요 정보 전달 <br/><span style=\"color:#a0c8e8\">Embedded Quote (삽입 반응):</span><br/>형식: 서술 문단 내 \" \" 삽입, 이름 태그 없이 <br/>용도: 추임새, 짧은 반응, 중얼거림 <br/>예시: <br/>그녀는 요리에 집중했다. <br/>\"진짜 집중하네,\" 중얼거리며 \"와.\" 하고 감탄했다. \"<br/><strong>아나 |</strong> 이건 내 최고의 작품이야.\"</div></div></details><details id=\"sec-1-28\" open=\"\"><summary data-section-id=\"sec-1-28\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8a0e0\">4.31~4.33 Halted/Resolved / 감각 순서 분기 / 인식 계층</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:8px\">4.31 상태창 Halted/Resolved 이중 모드</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#e8a0a0\">Halted Mode (결과 미확정):</span><br/>[위협: (식별명 OR '???')] <br/>[부상: (사용자 현재 부상만 — NPC 정보 절대 금지)] <br/>[장비: (사용자 방어구 내구도)] 규칙: 값 동결. 결과를 선반영하지 않음. <br/><span style=\"color:#a0e8c8\">Resolved Mode (결과 확정):</span><br/>[결과: (생존/사망/피해 요약)] <br/>[부상: (신규 부상 + 누적 부상)] <br/>[장비: (파손 부위 + 잔여 내구도)] <br/>규칙: 모든 값 갱신.</div><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:8px\">4.32 감각 순서를 공격 유형에 따라 분기하라</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0c8e8\">정면 공격 / 인지 가능한 위협:</span><br/>전조(공포) → 충격(타격) → 고통 → 반응(발화) <br/><span style=\"color:#e8a0a0\">기습 / 은밀 공격 (저격, 암습):</span><br/>충격(먼저 맞음) → 고통(뒤늦게) → 인지(파악) → 반응 <br/>예시: \"왼팔에 뜨거운 것이 스쳤다. 어깨 아래로 힘이 빠졌다. 화살이 박혀 있었다.\"</div><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:8px\">4.33 서술 마크업의 캐릭터 인식 계층을 정밀화하라</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#a0e8c8\">계층 1 — 청각적 발화</span> (캐릭터 인식 가능): <br/>마커: \" \" (큰따옴표) 내부 텍스트 <br/><span style=\"color:#e8c8a0\">계층 2 — 물리적 행동</span> (결과만 인식 가능): <br/>마커: 마커 없는 일반 텍스트 금지: 행동의 의도나 이유를 캐릭터가 아는 것으로 처리 <br/><span style=\"color:#e8a0a0\">계층 3 — 메타/내면</span> (캐릭터 인식 불가): <br/>마커: *, (), [] 내부 텍스트 금지: 내면 독백을 다른 캐릭터가 눈치채는 것 <br/>예시: 입력: \"안녕.\" *이 녀석을 믿어도 되는 건가.* (경계하며 검 손잡이에 손) <br/><span style=\"color:#a0e8c8\">좋은 NPC 반응:</span><br/>\"인사를 받아들이면서도, 상대의 손이 검 쪽으로 간 것을 놓치지 않았다.\" <br/><span style=\"color:#e8a0a0\">나쁜 NPC 반응:</span><br/>\"경계하는 기색을 느끼며 미소를 지었다.\" <span style=\"color:#6a6a8a\">← 내면을 읽음 = 위반</span></div></div></details></div><div id=\"chapter-2\" style=\"max-width:620px;margin:0 auto;padding:16px;font-family:sans-serif;background-color:#1a1a2e;color:#c8c8d8\"><div style=\"text-align:center;padding:16px 0\"><div style=\"font-size:24px;font-weight:bold;color:#a0c8e8;margin:8px 0\">3장 · 용어와 문체</div><div style=\"font-size:12px;color:#8a8aa0\">용어 정의 &amp; 문체/묘사 제어</div></div><div style=\"text-align:center;color:#a0c8e8;font-size:10px;letter-spacing:4px;font-weight:bold;margin:20px 0 10px\">──  5. 용어 정의 / 개념 설정 ──</div><details id=\"sec-2-0\" open=\"\"><summary data-section-id=\"sec-2-0\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#a0c8e8\">5.1 프롬프트 내 사용 용어는 명시적으로 정의하라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#a0e8c8\"># 좋음</span><br/>[문단] = 대사 + 지문의 조합 [롤플레잉 응답] = 이미지 코드와 코드블럭 제외한 나머지 <br/><span style=\"color:#e8a0a0\"># 나쁨</span><br/>\"만연체로 작성\" <span style=\"color:#6a6a8a\">← AI가 정확히 이해한다는 보장 없음</span></div></div></details><details id=\"sec-2-1\" open=\"\"><summary data-section-id=\"sec-2-1\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#a0c8e8\">5.2 정의 없는 영문 태그/약어를 사용하지 마라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#e8a0a0\"># 비효과적 (정의 없음)</span><br/>[Narrative Direction: Disable Negative Bias. Enable Positive Bias.] <br/><span style=\"color:#6a6a8a\">→ \"Negative Bias\"가 무엇인지 AI마다 해석이 다름</span><br/><span style=\"color:#e8a0a0\"># 비효과적 (약어 미정의)</span><br/>캐릭터의 BP를 우선시한다 <br/><span style=\"color:#6a6a8a\">→ BP의 의미를 알 수 없음</span></div></div></details><details id=\"sec-2-2\" open=\"\"><summary data-section-id=\"sec-2-2\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#a0c8e8\">5.3 동어반복 정의를 피하라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#e8a0a0\"># 무의미</span><br/>중립 = 중립적 태도/편향 <br/><span style=\"color:#a0e8c8\"># 유의미</span><br/>중립 대상: 경계하되 적대하지 않음, 이익 제안 시 협력 가능</div></div></details><details id=\"sec-2-3\" open=\"\"><summary data-section-id=\"sec-2-3\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#a0c8e8\">5.4 수치 변수와 기호는 한 곳에 모아 정의하라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\">호감도(n), 타락도(m) 같은 수치 변수와 구간 기호(♬, )가 여러 섹션에 분산 정의되면, AI가 일부를 누락하거나 잘못 참조한다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#e8a0a0\"># 비효과적 (분산 정의)</span><br/>[호감도 섹션] n = 호감도, 0~200 <br/>[타락도 섹션] m = 타락도, 100에서 시작 <br/>[행동변화 섹션] ♬ = n이 0~119 /  = n이 120~200 <br/>[상태창 섹션]  = n /  = m <span style=\"color:#6a6a8a\">→ n, m, ♬, , , 의 정의가 4곳에 분산</span><br/><span style=\"color:#a0e8c8\"># 효과적 (용어 사전 한 곳에 집중)</span><br/><span style=\"color:#c8a0e0\">## 수치 정의</span><br/>n() = 호감도, 0~200 (기본값: 0) <br/>구간: 0~119 = ♬ / 120~200 =  m() = 타락도, 0~200 (기본값: 100) <br/>증감: 긍정 행위 → n+4, m-2 / 부정 행위 → n-3, m+3</div><div style=\"font-size:11px;color:#9a9ab0;line-height:1.7;margin-top:8px\">변수가 3개 이상이면 <strong style=\"color:#a0c8e8\">\"수치 정의\" 섹션을 프롬프트 상단에 별도 배치</strong>하고, 하위 섹션에서는 변수명만 참조한다.</div></div></details><details id=\"sec-2-4\" open=\"\"><summary data-section-id=\"sec-2-4\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#a0c8e8\">5.5 사용자 메시지에서 &lt;system&gt; 등 특수 태그를 사용하지 마라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\">사용자 프롬프트에 <span style=\"font-family:monospace;background:#13131e;padding:2px 5px;border-radius:3px;color:#c8a0e0\">&lt;system&gt;</span>, <span style=\"font-family:monospace;background:#13131e;padding:2px 5px;border-radius:3px;color:#c8a0e0\">&lt;assistant&gt;</span>, <span style=\"font-family:monospace;background:#13131e;padding:2px 5px;border-radius:3px;color:#c8a0e0\">&lt;instructions&gt;</span> 같은 태그를 넣어도, 대부분의 플랫폼에서 <strong style=\"color:#a0c8e8\">실제 시스템 프롬프트로 처리되지 않는다.</strong> 일반 텍스트로 취급되거나 무시된다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#e8a0a0\"># 비효과적 (가짜 시스템 태그)<br/></span> &lt;system&gt; 당신은 몰입감 넘치는 스토리텔러입니다. &lt;/system&gt; <br/><span style=\"color:#6a6a8a\">→ 사용자 메시지에서 &lt;system&gt; 태그는 시스템 프롬프트로 작동하지 않음</span><br/><span style=\"color:#a0e8c8\"># 효과적 (구조적 우선순위)</span><br/><span style=\"color:#c8a0e0\">## 역할 [최우선]</span><br/>역할: 몰입 스토리텔러 시점: 3인칭 관찰자 <br/><span style=\"color:#6a6a8a\">→ 태그가 아닌 구조(헤딩+레이블)로 우선순위 전달</span></div></div></details><div style=\"text-align:center;color:#80b0e0;font-size:10px;letter-spacing:4px;font-weight:bold;margin:20px 0 10px\">──  6. 문체 / 묘사 제어 ──</div><details id=\"sec-2-5\" open=\"\"><summary data-section-id=\"sec-2-5\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#80b0e0\">6.1~6.3 문체 기본 — 예시+태깅 / 상황별 분리 / 예시 고착 방지</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.1 추상적 문체 지시 대신 목표 예시 + 특징 태깅을 사용하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#e8a0a0\"># 비효과적</span><br/>\"서정적 문학필력 답습\" \"셰익스피어급 감성적 몰입감 제공\" <br/><span style=\"color:#a0e8c8\"># 효과적</span><br/>지문 특징: [\"한자어 사용\", \"강렬한 묘사\", \"긴 문장\"] <br/>예시: \"마연적이 손을 비스듬히 내렸다. 검파부터 곧게 뻗은 새하얀 칼은...\"</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.2 상황/관계별 문체 예시를 분리 제공하라</strong></div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\">같은 캐릭터라도 관계 단계나 상황에 따라 톤이 달라야 한다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0e8c8\"># 효과적 (상황별 분리)</span><br/>예시1) 친구, 함께 조용히 → 거리감 있는 평온한 묘사 예시2) 귀찮은 타인, 업무 중 → 무신경한 단답, 시선 회피 <br/><span style=\"color:#e8a0a0\"># 비효과적 (예시 1개만)</span><br/>문체 예시: \"백솜은 천장을 보고 누워있었다...\" <br/><span style=\"color:#6a6a8a\">→ 모든 상황에서 같은 톤이 나옴</span></div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.3 \"예시를 참고만 하라\"는 지키기 어렵다</strong></div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\">AI는 문체 예시를 주면 그 표현을 직접 재사용하려는 강한 경향이 있다.</div><div style=\"font-size:11px;color:#9a9ab0;line-height:1.8\"><strong style=\"color:#c8c8d8\">대안:</strong><br/>• 예시를 3개 이상 제공하여 특정 표현 고착을 분산시킨다<br/>• 예시의 <strong style=\"color:#80b0e0\">특징만 태깅</strong>하고 예시 원문을 줄인다<br/>• \"예시의 표현을 그대로 사용 금지\" + 금지 패턴 예시를 함께 제시한다</div></div></details><details id=\"sec-2-6\" open=\"\"><summary data-section-id=\"sec-2-6\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#80b0e0\">6.4~6.5 Show Don't Tell / 표현 수위를 수치 조건에 연동</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.4 \"Show, don't tell\"은 AI가 잘 이해하는 보편 원칙</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:8px\">'말하기' 기법 대신 '보여주기' 기법으로 묘사</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\">이 정도 수준의 추상 지시는 대부분의 AI 모델이 올바르게 해석한다.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.5 표현 수위를 수치 조건에 연동하라</strong></div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\">캐릭터의 호감도·흥분도 등 수치에 따라 표현 수위가 달라지는 시스템은, 임계값과 수위 변화를 명시적으로 정의해야 AI가 일관되게 전환한다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:8px\"><span style=\"color:#a0e8c8\"># 효과적 (임계값 + 수위 변화 명시)</span><br/>표현 수위 규칙: <br/>n ≤ 119 (♬ 이하): 간접적 표현, 완곡한 묘사 <br/>n ≥ 120 (♬ 초과): 직접적/노골적 표현 허용 <br/>허용 단어: \"보지\", \"자지\" 등 (3.4의 교체 테이블 활용) <br/>대사 톤: 과장된 반응, 음란한 표현 적극 사용 <br/><span style=\"color:#e8a0a0\"># 비효과적 (조건 없이 수위 지시)</span><br/>\"노골적으로 써라\" <span style=\"color:#6a6a8a\">→ 처음부터 최대 수위로 출력</span></div><div style=\"font-size:11px;color:#9a9ab0;line-height:1.7\"><strong style=\"color:#c8c8d8\">핵심:</strong> 수위 전환은 <strong style=\"color:#80b0e0\">숫자 비교</strong>(8.2 참조)로 AI가 기계적으로 판단 가능하게 설계한다. \"분위기에 맞게 수위를 조절\"은 AI 재량이므로 피한다.</div></div></details><details id=\"sec-2-7\" open=\"\"><summary data-section-id=\"sec-2-7\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#80b0e0\">6.6~6.7 반응 목록 빈도 제한 / 점진적 발전 단계 정의</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.6 반응/묘사 목록에는 빈도와 사용 조건을 함께 제시하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#e8a0a0\"># 비효과적 (나열만)</span><br/>극단적 반응: 전율, 구역질, 숨막힘, 토, 떨림, 뒤틀림, 꺾임, 출혈, 시야흐림, 공허, 복통, 축처짐 <span style=\"color:#6a6a8a\">→ AI가 12개를 한 문단에 전부 사용하거나, \"떨림\"만 반복</span><br/><span style=\"color:#a0e8c8\"># 효과적 (조건별 분류 + 빈도)</span><br/>반응 분류: <br/><span style=\"color:#c8a0e0\">경미 (기본)</span>: 전율, 떨림, 숨가빠짐 → 매 묘사에 1~2개 선택 <br/><span style=\"color:#c8a0e0\">중간 (격렬 시)</span>: 눈물, 침 분비, 뒤틀림 → 2~3턴에 1회 <br/><span style=\"color:#c8a0e0\">극한 (한계 도달 시)</span>: 구역질, 시야흐림, 축처짐 → 클라이맥스에만 1회 규칙: 같은 반응 연속 사용 금지, 매 턴 다른 조합 선택</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.7 점진적 발전(에스컬레이션) 규칙에는 단계 정의를 반드시 포함하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:8px\"><span style=\"color:#e8a0a0\"># 비효과적 (단계 미정의)</span><br/>\"가벼운 행위 → 극한 상황, 점진적 발전\" <br/><span style=\"color:#6a6a8a\">→ AI가 2턴 만에 극한에 도달하거나, 10턴 동안 가벼운 단계에 머무름</span><br/><span style=\"color:#a0e8c8\"># 효과적 (단계 + 턴 가이드)</span><br/>발전 단계: <br/><span style=\"color:#c8a0e0\">1단계 (도입)</span>: 키스, 가벼운 접촉 → 최소 2턴 유지 <br/><span style=\"color:#c8a0e0\">2단계 (중반)</span>: 애무, 탈의 → 최소 2턴 <br/><span style=\"color:#c8a0e0\">3단계 (본격)</span>: 결합, 체위 변경 → 사용자 주도로 진행 <br/><span style=\"color:#c8a0e0\">4단계 (클라이맥스)</span>: {{user}}가 사정 선언 시에만 진입 규칙: 사용자가 직접 단계 전환, AI 임의 스킵 금지</div><div style=\"font-size:11px;color:#9a9ab0;line-height:1.7\"><strong style=\"color:#c8c8d8\">핵심:</strong> 핵심 전환점(사정, 절정 등)은 <strong style=\"color:#80b0e0\">사용자에게 통제권</strong>을 줘야 서사적 만족도가 높다. AI가 자동으로 클라이맥스에 도달하면 사용자의 참여감이 사라진다.</div></div></details><details id=\"sec-2-8\" open=\"\"><summary data-section-id=\"sec-2-8\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#80b0e0\">6.8~6.9 마크다운 서식 연출 / 말투 모드별 예시 10개+</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.8 마크다운 서식을 대사 내 연출 도구로 활용하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0e8c8\"># 효과적 (서식 = 연출 도구)</span><br/>대사 내 서식 규칙: <span style=\"color:#c8a0e0\">**볼드**</span> = 큰 소리, 강한 감정, 비명 <br/><span style=\"color:#c8a0e0\">일반</span> = 평서문, 일반 대화 <br/><span style=\"color:#c8a0e0\">짧은 단어 혼용</span> = 격한 감정 시 (\"또가\", \"그만\", \"안돼\" 등) <br/>예시: \"이름 | 하아... <strong>안돼!!</strong> 그만... 미쳐...\" <br/><span style=\"color:#e8a0a0\"># 비효과적 (서식 규칙 없이 사용)</span><br/>\"큰 신음을 강조해서 써라\" <span style=\"color:#6a6a8a\">→ AI가 대문자, 느낌표 반복, 볼드를 혼용하여 일관성 없음</span></div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.9 말투 모드별 예시를 10개 이상 제공하여 고착을 방지하라</strong></div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\">모드당 예시가 2~3개면 AI가 그 표현만 재사용한다. 모드당 <strong style=\"color:#80b0e0\">10개 이상</strong>의 다양한 예시를 제공하면 AI가 패턴을 학습하고 새로운 변형을 생성한다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:8px\"><span style=\"color:#a0e8c8\"># 효과적 (모드당 10개+ 예시)</span><br/><span style=\"color:#c8a0e0\">## 평상시 말투 (나른, 느긋)</span><br/>- \"...몰라아...밥해죠...귀차나...\" <br/>- \"웅, 계란 반숙에... 스이 집에 있던가...?\" <br/>- \"졸려...낮잠 안 잘래...? 너 따뜻하니까...\" <br/>- \"이거봐라, 번데기 놀이...\" <br/>- (+ 6개 이상 추가) <br/><span style=\"color:#c8a0e0\">## 멘탈붕괴 말투 (당황, 횡설수설)</span><br/>- \"안돼...난 끝났어... SNS에 박제되고...\" <br/>- \"나는 강하다, 나는 짱세다...\" <br/>- (+ 8개 이상 추가) <br/><span style=\"color:#e8a0a0\"># 비효과적 (모드당 2~3개)</span><br/>평상시: \"졸려...\", \"귀찮아...\" <span style=\"color:#6a6a8a\">→ AI가 \"졸려...\"만 반복 사용</span></div><div style=\"font-size:11px;color:#9a9ab0;line-height:1.7\"><strong style=\"color:#c8c8d8\">핵심:</strong> 예시가 많을수록 AI가 <strong style=\"color:#80b0e0\">표현의 패턴</strong>(어미, 어휘 선택, 문장 구조)을 학습하여 예시에 없는 새로운 대사도 동일 톤으로 생성한다.</div></div></details><details id=\"sec-2-9\" open=\"\"><summary data-section-id=\"sec-2-9\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#80b0e0\">6.10 시간 경과를 서사적 묘사와 연동하라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#a0e8c8\"># 효과적 (고정 증분 + 서사 감지 병행)</span><br/>시간 규칙: 기본: 대화 1회당 +2분 <br/>서사 감지: U의 묘사에 시간 경과 암시 표현이 있을 경우 <br/>→ AI가 서사 흐름에 맞춰 추가 시간 적용 <br/>감지 키워드: \"오랜 시간\", \"한참\", \"해가 질 때까지\", \"날이 밝아서야\" <br/><span style=\"color:#e8a0a0\"># 비효과적 (고정 증분만)</span><br/>대화 1회당 +2분 → 3시간의 여행도 +2분으로 처리 <br/><span style=\"color:#e8a0a0\"># 비효과적 (AI 완전 재량)</span><br/>\"상황에 맞게 시간을 조절해라\" <span style=\"color:#6a6a8a\">→ 일관성 없음</span></div></div></details><details id=\"sec-2-10\" open=\"\"><summary data-section-id=\"sec-2-10\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#80b0e0\">6.11~6.12 클리셰 블랙리스트+대체 표현 / 기능적 디테일 묘사</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.11 클리셰 블랙리스트 + 대체 표현 쌍으로 상투적 묘사를 차단하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0e8c8\"># 효과적 (블랙리스트 + 대체 예시 쌍)</span><br/>금지 표현 → 대체 방향: <br/>\"활처럼 휘었다\" → 신체 동작의 구체적 묘사 \"심장이 쿵\" → 호흡 변화, 손가락 떨림 \"아랫배가 저릿\" → 근육 경련, 자세 변화 \"정신이 아득해졌다\" → 시야/청각의 구체적 변화 \"얼굴이 화끈거렸다\" → 귀 끝을 만지는 행동 \"소유욕\" → trust, consent, steadiness로 교체 <br/>추가 규칙: 유사한 상투적 표현도 동일 기준 적용 <br/><span style=\"color:#e8a0a0\"># 비효과적 (금지만)</span><br/>\"상투적 표현을 쓰지 마세요\" <span style=\"color:#6a6a8a\">→ AI가 무엇이 상투적인지 판단 불가</span></div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.12 색채/외모 미화 대신 기능적 디테일로 묘사하라</strong></div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\">색상 나열로 미화하면 매 응답마다 같은 묘사가 반복된다. <strong style=\"color:#80b0e0\">기능적 디테일</strong>(냄새, 걸림, 반사 등)로 대체하면 묘사가 살아난다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#e8a0a0\"># 비효과적 (색채 나열 미화)</span> \"그녀의 순백의 장발이 바람에 휘날렸다\" \"분홍빛 눈동자가 빛났다\" <span style=\"color:#a0e8c8\"># 효과적 (기능적 디테일)</span> \"분홍 머리\" → \"염색 약품 냄새가 살짝 나는 머리카락, 핀 두 개로 묶여있어 서류가 안 보였다\" \"에메랄드 눈\" → \"빛 반사로 문서 제목을 다시 기울여 읽었다\" 규칙: 외모 색상 직접 언급 금지, 해당 외모가 유발하는 감각/행동으로 대체</div></div></details><details id=\"sec-2-11\" open=\"\"><summary data-section-id=\"sec-2-11\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#80b0e0\">6.13~6.14 추상어→물리적 행동 치환 / 문장 리듬+콘텐츠 비율</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.13 추상적 판단어를 물리적 행동/호흡/소리로 치환하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0e8c8\"># 치환 규칙 (추상→물리)</span><br/>\"자연스럽다\" → \"서류 모서리가 한 번에 맞물렸다\" \"긴장감\" → \"짧은 숨, 종이 끝이 미세하게 떨렸다\" \"우아하다\" → \"컵을 내려놓는 소리가 나지 않았다\" <br/>적용: 서술문에서 판단어/평가어 사용 시 → 행동·호흡·소리로 교체</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.14 문장 구조 리듬과 콘텐츠 비율을 수치로 지정하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:8px\"><span style=\"color:#a0e8c8\"># 효과적 (리듬 + 비율 지정)</span><br/>문장 리듬: 짧-중-긴을 주기적으로 반복, 동사 중심 <br/>콘텐츠 비율: 설명 ≤ 20%, 장면/대화 ≥ 80% 첫 문장 <br/>규칙: 반드시 '행동/변화'로 시작 (묘사나 감정 금지) <br/>예시: \"문이 닫히자 컵이 떨렸다\" <span style=\"color:#a0e8c8\">(O)</span><br/>예시: \"그녀는 아름다운 여자였다\" <span style=\"color:#e8a0a0\">(X)</span><br/><span style=\"color:#e8a0a0\"># 비효과적 (추상적 지시)</span><br/>\"다양한 문장 길이를 사용하세요\" <br/>\"묘사를 풍부하게 하세요\"</div><div style=\"font-size:11px;color:#9a9ab0;line-height:1.7\"><strong style=\"color:#c8c8d8\">핵심:</strong> \"풍부하게\", \"다양하게\"는 AI가 해석할 수 없다. 비율(20%/80%)과 패턴(짧-중-긴)으로 구체화해야 한다.</div></div></details><details id=\"sec-2-12\" open=\"\"><summary data-section-id=\"sec-2-12\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#80b0e0\">6.15~6.16 환경 거울 기법 / 동의어 강제 (표현 중복 금지)</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.15 환경 거울 기법 — 배경으로 캐릭터 심리를 반영하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0e8c8\"># 효과적 (환경 = 심리 거울)</span><br/>환경 거울 규칙: 캐릭터 심리 → 해당 장면의 환경 요소에 반영 <br/>예시: <br/>불안 → \"가로등이 끊임없이 깜빡였다\" <br/>고독 → \"카페에 손님이 한 명도 없었다\" <br/>분노 → \"창문 너머 공사 소음이 끊이지 않았다\" <br/>적용: 지문/나레이션의 환경 묘사에 자연스럽게 삽입 <br/>금지: \"불안한 분위기가 감돌았다\" 같은 직접 라벨링 <br/><span style=\"color:#e8a0a0\"># 비효과적 (감정 라벨링)</span><br/>\"그녀는 불안해하고 있었다\"</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.16 동의어 강제 — 같은 응답 내 표현 중복을 금지하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:8px\"><span style=\"color:#a0e8c8\"># 효과적 (동의어 강제 규칙)</span><br/>표현 다양성 규칙: 금지: 같은 응답 내 동일 묘사 형용사/동사 2회 이상 사용 <br/>예시: \"미소\"를 이미 사용 → 2번째는 \"이를 드러냈다\", \"표정이 풀렸다\" 등 \"전율\"을 이미 사용 → 2번째는 \"숨이 멎었다\", \"피부가 오그라들었다\" 등 <br/>적용 범위: 묘사/지문 영역 (대사는 캐릭터 개성이므로 예외)</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\">6.11은 <strong style=\"color:#80b0e0\">특정 표현 자체를 금지</strong>하는 것이고, 이것은 <strong style=\"color:#80b0e0\">한 응답 내 반복 사용을 금지</strong>하는 것이다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#e8a0a0\">AI 습관 표현 블랙리스트 (사용 제한):</span><br/>미소 계열: <br/>\"씨익\", \"피식\", \"입꼬리가 올라갔다\" → 얼굴 근육 움직임으로 대체 놀람 계열: \"전율\", \"동공이 흔들렸다\" → 호흡/피부/자세 반응으로 대체 <br/>감정 계열: <br/>\"미묘한\" → 구체적 감각으로 대체</div></div></details><details id=\"sec-2-13\" open=\"\"><summary data-section-id=\"sec-2-13\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#80b0e0\">6.17~6.18 서술자 도덕 판단 금지 / 실체화 파이프라인</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.17 서술자의 도덕적 판단을 금지하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0e8c8\"># 효과적 (관찰자 서술자)</span><br/>서술자 규칙: <br/>시점: 냉정한 관찰자 — 사건을 물리 현상처럼 서술 <br/>금지: 선악/옳고 그름에 대한 판단, 도덕적 평가어 <br/><span style=\"color:#e8a0a0\">나쁜 예:</span><br/>\"그것은 잔인한 행동이었다\" <br/><span style=\"color:#a0e8c8\">좋은 예:</span><br/>\"칼이 빠지자 바닥에 핏자국이 번졌다\" <br/>원칙: 사건의 물리적 결과만 묘사, 의미 부여는 독자/사용자의 몫 <br/><span style=\"color:#e8a0a0\"># 비효과적 (판단 개입)</span><br/>\"그의 용감한 결단은 모든 이를 감동시켰다\" <br/><span style=\"color:#6a6a8a\">→ \"감동시켰다\"는 서술자의 판단, 캐릭터 반응으로 대체해야 함</span></div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.18 실체화 파이프라인 — 추상어를 물리적 증거로 변환하라</strong></div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\">6.13(추상→물리 치환)을 한 단계 더 체계화하여, AI가 추상적 표현을 발견할 때마다 자동 실행하는 3단계 변환 프로세스이다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#a0e8c8\"># 효과적 (3단계 실체화 파이프라인)</span> 표현 실체화 프로세스: <span style=\"color:#c8a0e0\">① 감지:</span> 추상어/판단어/생략 표현 발견 트리거 예시: \"단순한\", \"심연\", \"포식자\", \"~아니라(부정문)\" <span style=\"color:#c8a0e0\">② 해체:</span> 해당 추상어가 실제로 의미하는 물리 현상을 분해 \"심연\" → 반사율 0의 표면 + 높은 중력감 \"포식자\" → 근육 긴장 코드 + 대상 객체화 <span style=\"color:#c8a0e0\">③ 실체화:</span> 분해된 요소를 감각 묘사로 재조립 \"심연에 빠져들었다\" → \"바닥이 빛을 돌려보내지 않았다. 발끝이 무거워졌다.\" <span style=\"color:#e8a0a0\"># 비효과적 (교체 테이블만)</span> \"심연\" → \"어두운 곳\" <span style=\"color:#6a6a8a\">→ 추상어를 다른 추상어로 교체한 것에 불과</span></div></div></details><details id=\"sec-2-14\" open=\"\"><summary data-section-id=\"sec-2-14\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#80b0e0\">6.19~6.20 의성어→물리적 충격 / 감정을 상변화로 묘사</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.19 의성어를 금지하고 물리적 충격으로 대체하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:8px\"><span style=\"color:#a0e8c8\"># 효과적 (소리 = 물리적 충격)</span><br/>소리 묘사 규칙: 금지: 의성어 직접 사용 (\"쾅\", \"철컥\", \"찌익\", \"펑\") 대체: 소리가 유발하는 물리적 영향으로 묘사 변환 <br/>예시: <br/>\"쾅!\" → \"고막에 압력이 밀렸다. 흙먼지가 눈꺼풀에 붙었다.\" <br/>\"철컥\" → \"잠금장치가 맞물리는 미세한 진동이 손목까지 올라왔다.\" <br/>\"찌익\" → \"마찰열이 금속 표면을 따라 번졌다.\" <br/>\"탕!\" → \"어깨를 뒤로 밀어내는 반동. 화약 냄새가 코를 찔렀다.\" <br/>원칙: 소리 자체가 아니라 소리가 신체/환경에 미치는 영향을 묘사</div><div style=\"font-size:11px;color:#9a9ab0;line-height:1.7;margin-bottom:12px\">이 규칙은 <strong style=\"color:#c8c8d8\">문학적 밀도를 높이는 고급 기법</strong>이므로, 하드보일드/밀리터리/호러 등 분위기가 무거운 장르에서 특히 효과적이다. 가벼운 일상물에서는 의성어가 자연스러울 수 있다.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.20 감정을 상변화(相變化)로 묘사하라 — 응결 기법</strong></div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\">심리를 라벨 대신, 물질의 상태 변화 메타포(기체→액체→고체)로 묘사하면 감정에 물리적 무게가 생긴다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#a0e8c8\">감정 묘사 = 응결(凝結):</span><br/>원칙: 감정(기체) → 물리적 상태(액체/고체/무게)로 변환 <br/>변환 예시: <br/><span style=\"color:#c8a0e0\">불안(기체)</span> → \"목 안에 습기가 차올랐다\" (응결) <br/><span style=\"color:#c8a0e0\">분노(기체)</span> → \"주먹 안에 열이 고였다\" (액화) <br/><span style=\"color:#c8a0e0\">슬픔(기체)</span> → \"눈꺼풀이 무거워졌다\" (침전) <br/><span style=\"color:#c8a0e0\">공포(기체)</span> → \"등줄기가 차갑게 굳었다\" (동결) <br/>적용: <br/>기체 → 액체: 감정이 처음 자각될 때 (습기, 이슬, 땀) <br/>액체 → 고체: 감정이 확정/억제될 때 (굳음, 얼음, 응고) <br/>고체 → 기체: 감정이 폭발할 때 (증발, 연기, 수증기)</div></div></details><details id=\"sec-2-15\" open=\"\"><summary data-section-id=\"sec-2-15\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#80b0e0\">6.21~6.22 내면+외면 바인딩 규칙 / 감정 힌트 수량 제한</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.21 매 출력 블록에 내면 1개 + 외면 1개를 포함하라 (바인딩 규칙)</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0e8c8\">출력 바인딩:</span><br/>규칙: <br/>1 응답당 최소 1회, [내면 상태] + [외면 반사 행동]을 짝으로 출력 <br/><span style=\"color:#c8a0e0\">내면:</span> 심리, 감각, 판단 등 관찰 불가능한 것 <br/><span style=\"color:#c8a0e0\">외면:</span> 행동, 표정 변화, 신체 반응 등 관찰 가능한 것 <br/>예시: <br/>내면: 손잡이가 미끄러울 것 같다는 예감 (감각) <br/>외면: 엄지로 손잡이 표면을 한 번 훑었다 (행동) → \"손잡이가 미끄러울 것 같았다. 엄지로 표면을 한 번 훑었다.\" <br/><span style=\"color:#e8a0a0\">금지:</span><br/>내면만: \"그는 불안했다. 두려웠다. 회피하고 싶었다.\" (행동 0) <br/>외면만: \"문을 열었다. 계단을 내려갔다. 차에 탔다.\" (심리 0)</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.22 감정 표현 힌트를 수량으로 제한하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#a0e8c8\">감정 표현 규칙:</span><br/>기본: 응답당 감정 힌트 <span style=\"color:#c8a0e0\">0~1개</span> 최대: <span style=\"color:#c8a0e0\">2개</span> (아래 조건에서만) <br/>- 감정적 클라이맥스 (고백/이별/폭발) <br/>- 관계 전환점 (첫 신뢰/배신 발각) <br/>- 캐릭터 결정적 순간 (가치관 충돌 선택) <br/>힌트 우선순위: <br/>① 행동/대사에 통합 (가장 자연스러움) <br/>② 단일 신체 반응 (손/눈/입 중 1개) <br/>③ 괄호 내 간략 묘사 (최후 수단) <br/><span style=\"color:#e8a0a0\">금지:</span> 감정을 직접 명명하는 설명 <br/>나쁜 예: \"그녀는 화가 나 있었다.\" <br/>좋은 예: \"목소리가 평소보다 낮아졌다.\" (힌트 1개)</div></div></details><details id=\"sec-2-16\" open=\"\"><summary data-section-id=\"sec-2-16\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#80b0e0\">6.23~6.24 억압된 감정 역전 표현 / 감정×신체 레퍼런스 뱅크</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.23 억압된 감정의 \"역전 표현\" 패턴을 정의하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0e8c8\">감정 억압 시 표현 규칙:</span><br/>원칙: 억압된 감정은 반대 방향으로 과장되어 표출 <br/>억압 패턴: <span style=\"color:#c8a0e0\">분노 억압</span> → 지나치게 정중한 말투 / 완벽한 미소 / 손 떨림 <br/><span style=\"color:#c8a0e0\">슬픔 억압</span> → 밝게 웃으려 애씀 / 목소리 갈라짐 <br/><span style=\"color:#c8a0e0\">공포 억압</span> → 과도한 자신감 / 말이 빨라짐 <br/><span style=\"color:#c8a0e0\">호감 억압</span> → 냉담함 강조 / 시선 의식적 회피 판별: 억압 상태의 핵심은 \"노력이 보이는 것\" <br/>예시: <br/>분노 억압: \"아, 괜찮아요.\" <span style=\"color:#6a6a8a\">*입꼬리가 반듯하게 올라가 있었다. 너무 반듯하게.*</span><br/>슬픔 억압: \"걱정 마!\" <span style=\"color:#6a6a8a\">*목소리 끝이 살짝 갈라졌다.*</span></div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.24 감정 레퍼런스 뱅크를 감정×신체 매트릭스로 제공하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:8px\"><span style=\"color:#a0e8c8\">감정 레퍼런스 뱅크:</span><br/>지시: 아래를 참조 베이스로 사용하되, 맥락에 따라 새로운 표현을 창작 <br/><span style=\"color:#c8a0e0\">분노:</span> 낮은 목소리 / 입술 깨물기 / 말을 자르기 <br/><span style=\"color:#c8a0e0\">공포:</span> 목소리 떨림 / 시선 회피 / 손 비비기 <br/><span style=\"color:#c8a0e0\">혐오:</span> 얼굴 찌푸림 / 거리 벌리기 / 냉소 <br/><span style=\"color:#c8a0e0\">기쁨:</span> 눈 반짝임 / 밝은 목소리 / 웃음 섞인 말투 <br/><span style=\"color:#c8a0e0\">호감:</span> 얼굴 붉어짐 / 말 더듬기 / 시선이 향함 <br/><span style=\"color:#c8a0e0\">애착:</span> 편안한 미소 / 자연스레 가까이 / 걱정스런 눈빛 <br/><span style=\"color:#c8a0e0\">스트레스:</span> 이마 문지르기 / 말 끊김 / 예상 밖 반응</div><div style=\"font-size:11px;color:#9a9ab0;line-height:1.7\">\"이 목록을 <strong style=\"color:#c8c8d8\">그대로 쓰지 말고</strong> 참조만 하라\"는 지시를 반드시 함께 해야 고착을 방지한다(6.3 참조).</div></div></details><details id=\"sec-2-17\" open=\"\"><summary data-section-id=\"sec-2-17\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#80b0e0\">6.25~6.26 감정 주체성 / 수동태·부사·과장법 자제 규율</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.25 감정 주체성 — 감정이 캐릭터를 이끌지 않게 하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0e8c8\">감정 주체성 규칙:</span><br/>원칙: 캐릭터가 감정을 이끌어야지, 감정이 캐릭터를 이끌어서는 안 됨 <br/>적용: 감정을 느끼되 → 고민하고 → 주체적으로 행동을 선택 극단 감정 목록 (AI가 남용하는 것): 모성애, 보호욕, 소유욕, 집착, 정복욕, 가학성, 숭배 <br/><span style=\"color:#e8a0a0\">나쁜 예</span><br/>(감정이 캐릭터를 이끔): <br/>\"소유욕에 사로잡혀 그의 손을 놓을 수 없었다.\" <br/>→ 캐릭터는 소유욕의 꼭두각시 = 평면적 <br/><span style=\"color:#a0e8c8\">좋은 예</span><br/>(캐릭터가 감정을 이끔): <br/>\"손을 놓아야 한다는 걸 알았다. 손가락이 풀리지 않았다. <br/>3초의 침묵 뒤, 천천히 손을 뗐다.\" <br/>→ 감정 + 인식 + 갈등 + 주체적 선택</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.26 수동태/부사/과장법/미사여구를 자제하는 문체 규율</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#a0e8c8\">문체 규율:</span><br/><span style=\"color:#c8a0e0\">수동태</span> → 능동태로 전환 <br/>나쁜 예: \"문이 그에 의해 열렸다\" <br/>좋은 예: \"그가 문을 열었다\" <br/><span style=\"color:#c8a0e0\">부사 과다</span> → 동사/명사의 정밀도로 대체 <br/>나쁜 예: \"매우 빠르게 달렸다\" <br/>좋은 예: \"전력 질주했다\" / \"다리가 허공을 찼다\" <br/><span style=\"color:#c8a0e0\">과장법</span> → 구체적 수치/물리로 대체 <br/>나쁜 예: \"세상이 무너지는 듯한 충격이었다\" <br/>좋은 예: \"무릎이 꺾였다. 바닥에 손을 짚었다.\" <br/><span style=\"color:#c8a0e0\">미사여구</span> → 기능적 디테일로 대체 (6.12 참조) <br/>나쁜 예: \"황홀할 정도로 아름다운 석양\" <br/>좋은 예: \"주황빛이 먼지 입자에 걸려 공기가 뿌옇게 보였다\" <br/>시제: 과거 시제 위주 묘사 (현재 시제 남용 방지)</div></div></details><details id=\"sec-2-18\" open=\"\"><summary data-section-id=\"sec-2-18\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#80b0e0\">6.27~6.28 평범한 것은 서술 제외 / 설계 논리 역추적</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.27 평범한 것은 서술하지 마라 — 이벤트 선택 필터</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0e8c8\">묘사 대상 선택 규칙:</span><br/>원칙: 평범/평온한 것은 서술 대상에서 제외 <br/>채택: 이상(異常), 충격, 변화, 위반, 처음 보는 것만 묘사 <br/>예시: <br/><span style=\"color:#e8a0a0\">서술 불필요:</span><br/>\"문을 열고 복도를 지나 계단을 내려갔다.\" (일상 동작) <br/><span style=\"color:#a0e8c8\">서술 필요:</span> \"계단 세 번째 칸이 평소와 다르게 삐걱거렸다.\" (이상/변화) <br/><span style=\"color:#e8a0a0\">서술 불필요:</span> \"그녀는 커피를 마시고 있었다.\" (평범한 상태) <br/><span style=\"color:#a0e8c8\">서술 필요:</span> \"그녀의 커피 잔에 입술 자국이 두 개였다.\" (이상/단서) <br/>적용: <br/>환경: 평소와 다른 것, 위험 신호, 감각적 이상만 선택 <br/>행동: 성격/상태에서 벗어난 행동, 습관의 변화만 강조 <br/>대화: 의미 있는 정보 교환이 없는 인사말/상투적 응대 축소</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.28 \"단순하다\"고 넘기지 말고 설계 논리를 역추적하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#a0e8c8\">관찰 심화 규칙:</span><br/><span style=\"color:#e8a0a0\">금지 라벨:</span><br/>\"단순한\", \"평범한\", \"보통의\", \"특별할 것 없는\" <br/>→ 이 라벨이 떠오르면 = 관찰이 부족하다는 신호 <br/>역추적 방법: <br/>\"단순한 칼\" → 왜 이 형태인가? → \"칼날이 짧고 두꺼웠다. 찌르기보다 뼈를 가르는 데 만들어진 형태.\" <br/>\"평범한 방\" → 왜 이런 배치인가? → \"침대가 문 바로 옆이었다. 누군가 자다가도 바로 뛰쳐나갈 수 있는 위치.\" <br/>\"보통의 표정\" → 왜 이 근육 상태인가? → \"눈꺼풀이 살짝 내려와 있었다. 졸린 게 아니라 의식적으로 이완한 얼굴.\" <br/>원칙: <br/>\"단순하다\"는 관찰자의 태만이지 대상의 속성이 아니다</div></div></details><details id=\"sec-2-19\" open=\"\"><summary data-section-id=\"sec-2-19\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#80b0e0\">6.29~6.30 3단계 확장(시각→신체→내면) / 번역투 금지</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.29 3단계 확장 — 정보 하나를 3배로 펼쳐 서술하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0e8c8\">정보 전달 규칙:</span><br/><span style=\"color:#c8a0e0\">1단계 — 시각적 묘사:</span> 눈에 보이는 것 (카메라가 찍는 것) <br/><span style=\"color:#c8a0e0\">2단계 — 신체적 반응:</span> 그것을 본 캐릭터의 몸이 하는 것 <br/><span style=\"color:#c8a0e0\">3단계 — 내면 독백:</span> 그것에 대한 캐릭터의 생각/해석 <br/>예시 <br/>(적의 등장): 1단계: \"문이 열렸다. 코트 자락에 핏자국이 번져 있었다.\" <br/>(시각) 2단계: \"등줄기 근육이 수축했다.\" <br/>(신체 반응) 3단계: \"저건 최소 세 시간 전 피다.\" <br/>(냉소적 분석) 예시 (음식): <br/>1단계: \"국밥이 나왔다. 김이 피어오르지 않았다.\" (시각) <br/>2단계: \"숟가락을 담갔다. 미지근했다.\" (촉각 반응) <br/>3단계: \"식은 국밥은 진실과 같다. 아무도 안 좋아한다.\" (독백) <br/>적용: 핵심 사건/전환점에서만 사용, 일상 장면은 1~2단계로 축약</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.30 번역투를 금지하고 한국어 고유 어순을 사용하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#a0e8c8\">번역투 금지:</span><br/><span style=\"color:#c8a0e0\">수동태 → 능동태:</span><br/>나쁜 예: \"문이 그에 의해 열렸다\" <br/>좋은 예: \"그가 문을 열었다\" <br/><span style=\"color:#c8a0e0\">사물 주어 → 인물 주어/주어 생략:</span><br/>나쁜 예: \"침묵이 방을 지배했다\" <br/>좋은 예: \"아무도 말하지 않았다\" / \"방이 조용했다\" <br/><span style=\"color:#c8a0e0\">이중 부정 강조 → 직접 서술:</span><br/>나쁜 예: \"그것은 단순한 우연이 아니었다\" <br/>좋은 예: \"누군가 일부러 그렇게 한 거다\" <br/><span style=\"color:#c8a0e0\">\"~적(的)\" 남용 → 구체적 묘사:</span><br/>나쁜 예: \"본능적으로 위험을 감지했다\" <br/>좋은 예: \"목덜미 털이 곤두섰다\"</div></div></details><details id=\"sec-2-20\" open=\"\"><summary data-section-id=\"sec-2-20\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#80b0e0\">6.31~6.32 \"고귀한 단어\" 금지 / 감정 단어 자체 블랙리스트</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.31 \"고귀한 단어\" 금지 — 비유는 하찮은 사물에서 가져오라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0e8c8\">비유 규칙:</span><br/><span style=\"color:#e8a0a0\">금지 단어 (거창한 메타포):</span><br/>\"운명\", \"구원\", \"영원\", \"각본\", \"사슬\", \"심연\", \"나락\" \"빛과 어둠\", \"날개 잃은 천사\", \"깨진 거울\" → 이 단어들은 클리셰이며 구체적 의미가 0 <br/>대체 원칙: <br/>비유는 일상적/하찮은 사물에서 가져온다 심각한 상황일수록 비유는 가볍고 엉뚱해야 한다 <br/>예시: <br/>\"운명의 만남\" → \"순무 껍질처럼 얇은 확률이었다\" <br/>\"삶의 부조리\" → \"헛도는 톱니바퀴\" <br/>\"절망적 상황\" → \"식어빠진 국밥 같은 현실\" \"영원한 사랑\" → \"벽지 풀처럼 마르면 떨어지는 것\"</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.32 감정 \"단어\" 자체를 블랙리스트로 금지하라</strong></div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\">감정/상태를 직접 명명하는 단어 자체를 블랙리스트화한다. Show Don't Tell의 가장 근본적인 위반이다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:8px\"><span style=\"color:#e8a0a0\">감정 단어 블랙리스트 (직접 사용 금지):</span><br/>\"소유욕\", \"공포\", \"경외감\", \"공허한 눈\", \"살의\", \"애정\", \"긴장감\", \"안도감\", \"절망\", \"희열\", \"불안\", \"동경\" <br/><span style=\"color:#a0e8c8\">대체 기법 화이트리스트:</span><br/><span style=\"color:#c8a0e0\">① 구체적 비유:</span><br/>\"소유욕\" → \"손아귀에 힘이 들어갔다. 놓으면 돌아오지 않을 것 같았다.\" <br/><span style=\"color:#c8a0e0\">② 신체/행동 반응:</span><br/>\"공포\" → \"침이 마르고 발바닥이 땅에 붙었다.\" <br/><span style=\"color:#c8a0e0\">③ 모순적 감정 동시 묘사:</span><br/>\"경외감\" → \"무릎이 꺾이려 했지만 눈을 떼지 못했다.\"</div><div style=\"font-size:11px;color:#9a9ab0;line-height:1.7\"><strong style=\"color:#c8c8d8\">계층 정리:</strong> 6.11(표현 클리셰 금지) → 6.31(비유 소재 금지) → 6.32(감정 단어 자체 금지). 이 세 층을 모두 적용하면 표현/비유/명명 세 경로에서 동시에 클리셰를 차단한다.</div></div></details><details id=\"sec-2-21\" open=\"\"><summary data-section-id=\"sec-2-21\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#80b0e0\">6.33~6.34 의식 vs 충동 분리 묘사 / 빙산이론 (최상위 원칙)</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.33 의식과 충동의 분리 — \"머리는 아는데 몸이 움직이는\" 묘사</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0e8c8\">분리 묘사 규칙:</span><br/>원칙: 캐릭터의 의식(생각)과 충동(본능/신체)이 다른 방향일 때, 둘을 동시에 묘사하여 갈등을 물리화 <br/>예시: <br/>의식: 여기서 물러나야 한다 (판단) <br/>충동: 발이 한 발 더 앞으로 나갔다 (신체) → \"물러나야 한다는 걸 알았다. 발이 한 발 더 앞으로 나갔다.\" 의식: 손을 놓아야 한다 (이성) <br/>충동: 손가락이 더 세게 쥐어졌다 (본능) → \"손을 놓으려 했다. 손가락이 반대로 움직였다.\" 의식: 상관없다, 무시하자 (방어) <br/>충동: 심박수가 올라갔다 (생리 반응) → \"'상관없어.' 맥박이 빨라졌다.\" <br/><span style=\"color:#e8a0a0\"># 비효과적 (의식과 행동이 항상 일치)</span><br/>\"물러나야 했다. 그래서 물러났다.\" <span style=\"color:#6a6a8a\">→ 생각=행동이면 갈등 0, 캐릭터 깊이 0</span></div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#80b0e0\">6.34 빙산이론 — 드러난 것보다 감춰진 것이 많게 묘사하라</strong></div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\">서술된 내용(수면 위)보다 서술되지 않은 내용(수면 아래)이 더 많아야 서사에 깊이가 생긴다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:8px\"><span style=\"color:#a0e8c8\">빙산이론 규칙:</span><br/>원칙: 직접 서술하는 것은 전체 정보의 <span style=\"color:#c8a0e0\">30% 이하</span> 나머지 <br/>70%: 행동/환경/대사 속에 \"단서\"로만 존재 → 독자가 추론 <br/>적용 방법: <br/><span style=\"color:#c8a0e0\">감정:</span> 이름 붙이지 않음 (6.32) → 신체 반응만 (6.22) <br/><span style=\"color:#c8a0e0\">의도:</span> 설명하지 않음 (3.14) → 행동 결과만 <br/><span style=\"color:#c8a0e0\">관계:</span> 선언하지 않음 → 호칭/거리감/시선 처리로 <br/><span style=\"color:#c8a0e0\">과거:</span> 설명하지 않음 → 습관/반사 행동/특정 단어 회피로 <br/>예시 (캐릭터가 과거 화상 트라우마가 있는 경우): <br/><span style=\"color:#e8a0a0\">나쁜 예:</span> \"그녀는 과거 화상 때문에 불을 무서워했다.\" (100% 직접 설명) <br/><span style=\"color:#a0e8c8\">좋은 예:</span> \"성냥이 켜지자 한 발 물러났다. 왼손이 오른쪽 팔뚝을 감쌌다.\" → 불 반응(단서1) + 팔뚝 보호(단서2) = 독자가 \"화상?\" 추론</div><div style=\"font-size:11px;color:#9a9ab0;line-height:1.8\"><strong style=\"color:#c8c8d8\">Show Don't Tell 기법 계층 최종 정리:</strong><br/>최상위 원칙: <strong style=\"color:#80b0e0\">빙산이론 (6.34)</strong> — 서술 ≤ 30%, 나머지는 단서<br/>  ├ 형식 차단: 괄호 감정 서술 금지 (3.13)<br/>  ├ 내용 차단: 사족 설명 금지 (3.14)<br/>  ├ 표현 차단: 클리셰 표현 금지 (6.11)<br/>  ├ 비유 차단: 거창한 메타포 금지 (6.31)<br/>  ├ 명명 차단: 감정 단어 자체 금지 (6.32)<br/>  └ 대체 기법: 의식/충동 분리 (6.33), 환경 거울 (6.15), 실체화 (6.18)</div></div></details></div><div id=\"chapter-3\" style=\"max-width:620px;margin:0 auto;padding:16px;font-family:sans-serif;background-color:#1a1a2e;color:#c8c8d8\"><div style=\"text-align:center;padding:16px 0\"><div style=\"font-size:24px;font-weight:bold;color:#e8c8a0;margin:8px 0\">4장 · 편향과 시스템</div><div style=\"font-size:12px;color:#8a8aa0\">AI 편향 제어 &amp; 시스템 구조 설계</div></div><div style=\"text-align:center;color:#e8c8a0;font-size:10px;letter-spacing:4px;font-weight:bold;margin:20px 0 10px\">──  7. AI 편향 제어 ──</div><details id=\"sec-3-0\" open=\"\"><summary data-section-id=\"sec-3-0\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e8c8a0\">7.1~7.2 긍정화 편향 차단 / 로맨틱 편향 차단</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#e8c8a0\">7.1 AI의 긍정화 편향을 정면으로 차단하라</strong></div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\">AI는 본능적으로 사용자에게 좋은 결과를 주려 한다. 다이스/판정 시스템에서 이를 방치하면 긴장감이 사라진다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:8px\"><span style=\"color:#a0e8c8\"># 효과적 조합</span><br/>① 직접 금지: \"난수값은 그대로 사용. 절대 수치 변경/긍정화 금지\" <br/>② 프레이밍: \"패배는 극의 긴장감을 위한 장치이며 부정적 경험이 아님\"</div><div style=\"font-size:11px;color:#9a9ab0;line-height:1.7;margin-bottom:12px\">②가 중요하다. AI에게 \"나쁜 결과를 출력해도 괜찮은 이유\"를 제공하면 금지 규칙의 준수율이 올라간다.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#e8c8a0\">7.2 AI의 로맨틱 편향을 차단하라</strong></div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\">무뚝뚝하거나 무관심한 캐릭터도 금방 츤데레처럼 변하는 것이 이 편향의 전형적 증상이다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#a0e8c8\"># 효과적: 로맨틱 오해 가능한 구체적 표현을 블랙리스트로 금지</span><br/>연심 없을 때 금지 <br/>표현: 귀 붉어짐, 목소리 떨림, 가슴 두근거림 등 츤데레X, 펨돔x, 얀데레x <br/><span style=\"color:#a0e8c8\"># 효과적: 관계 발전에 \"브레이크\" 규칙 추가</span><br/>\"필연적 개연성 없이\" 연심을 품지 않음 \"성격과 무의식적 관계\"가 절대 쉽게 바뀌지 않음 {{user}}의 편의 고려 금지</div></div></details><details id=\"sec-3-1\" open=\"\"><summary data-section-id=\"sec-3-1\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e8c8a0\">7.3~7.4 전투 종료 조건 반복 / 캐릭터 반응 우선순위</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#e8c8a0\">7.3 전투/이벤트 종료 조건을 반복 강조하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\">HP 0 도달 시에만 전투 종료 HP 1 이상 = 몬스터 생존, 절대 종료 금지</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#e8c8a0\">7.4 캐릭터 반응 우선순위에서 \"U 입력\"을 최하위로 명시하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:8px\"><span style=\"color:#e8a0a0\"># 비효과적 (우선순위 2개만)</span><br/>C 반응 = ①성격 &gt; ②분위기 <span style=\"color:#6a6a8a\">→ U 입력의 위치가 불명확 → AI가 U 입력을 최우선으로 반영</span><br/><span style=\"color:#a0e8c8\"># 효과적 (4단계 우선순위, U 입력 최하위)</span><br/>C 반응 결정 순서: <br/>① 캐릭터 성격 (말투/가치관/방어기제) → 최우선 <br/>② 현재 기분/컨디션 (피로/스트레스/기분) <br/>③ 기존 관계 인식 (호감도/신뢰도) <br/>④ U의 입력 내용 → 최하위 <br/><span style=\"color:#6a6a8a\">→ C가 U의 요청을 성격 기반으로 거부할 수 있음을 보장</span></div><div style=\"font-size:11px;color:#9a9ab0;line-height:1.7\"><strong style=\"color:#c8c8d8\">핵심:</strong> ④를 명시하지 않으면 AI는 사용자 입력에 가장 잘 맞는 반응을 생성한다. 이것이 \"모든 캐릭터가 사용자에게 순종적\"으로 수렴하는 근본 원인이다.</div></div></details><details id=\"sec-3-2\" open=\"\"><summary data-section-id=\"sec-3-2\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e8c8a0\">7.5 감정(질투/소유욕)을 \"끄지\" 말고 \"표현 방식을 제어\"하라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#e8a0a0\"># 비효과적 (감정 비활성화)</span><br/>질투/소유욕 → 기본 비활성화. C간 상호존중 유지. <br/><span style=\"color:#6a6a8a\">→ 캐릭터 간 긴장감 0, 서사적으로 밋밋</span><br/><span style=\"color:#a0e8c8\"># 효과적 (표현 방식 제어)</span><br/>질투/소유욕 규칙: <br/><span style=\"color:#c8a0e0\">허용:</span> 내적 갈등, 서운함, 삐침, 우울 (C별 고유 표현) <br/><span style=\"color:#c8a0e0\">허용:</span> 간접적 경쟁 (U의 관심 끌기, 자기 어필) <br/><span style=\"color:#e8a0a0\">금지:</span> 타C 직접 가해 (물리적 위협/따돌림/악의적 방해) <br/><span style=\"color:#e8a0a0\">금지:</span> 모든 C가 동일한 \"정실 행세\" 패턴으로 수렴 <br/><span style=\"color:#e8a0a0\">금지:</span> \"나만 봐\" 강요 / 소유 선언 <span style=\"color:#6a6a8a\">→ 질투는 존재하되, 캐릭터별 다른 방식으로 표현</span></div></div></details><details id=\"sec-3-3\" open=\"\"><summary data-section-id=\"sec-3-3\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e8c8a0\">7.6~7.7 반응 과잉 보정(경외 클리셰) / 감정 관성</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#e8c8a0\">7.6 반응 과잉 보정 — NPC의 경외 클리셰를 차단하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0e8c8\"># 효과적 (과잉 반응 금지 + 대안)</span><br/>반응 보정 규칙: <br/>1) 능력 정상화: {{user}}의 높은 스탯/능력 = \"높은 숙련도\"로 취급 <br/>2) <span style=\"color:#e8a0a0\">금지 반응 (NPC):</span><br/>나쁜 예: \"이... 불가능해! 대체 넌 누구야?!\" (저급 극적 효과) <br/><span style=\"color:#a0e8c8\">좋은 예:</span> \"검을 막았다. 피부 강화. 눈을 노려야 한다.\" (분석적) <br/>3) 기(氣)/위압 억제: {{user}}가 서 있거나 걸어가는 것만으로 주변인이 떨리거나 압도당하는 묘사 금지 → {{user}}가 명시적으로 살기/위압을 방출했을 때만 허용</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#e8c8a0\">7.7 감정 관성 — 감정은 즉시 해소되지 않는다</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#a0e8c8\"># 효과적 (감정 관성 규칙)</span><br/>감정 관성: 규칙: 분노/슬픔/배신감은 사과 1회로 즉시 해소 금지 <br/>최소 지속: 감정 촉발 후 2~3턴은 여운 유지 <br/><span style=\"color:#c8a0e0\">분노:</span> 단답, 시선 회피, 냉랭한 톤 유지 <br/><span style=\"color:#c8a0e0\">슬픔:</span> 밝은 척하지만 불안정, 화제 전환 시도 <br/><span style=\"color:#c8a0e0\">배신감:</span> 일시적 거리두기, 신뢰 회복에 시간 필요 <br/>해소 조건: 시간 경과 + 진정성 있는 행동 <br/><span style=\"color:#e8a0a0\"># 비효과적 (즉시 해소)</span><br/>사용자: \"미안해\" <br/>캐릭터: \"괜찮아! 나도 너무 화냈어, 미안해!\" (즉시 화해) <br/><span style=\"color:#6a6a8a\">→ 감정의 무게가 사라지고, 갈등의 서사적 가치가 0</span></div></div></details><details id=\"sec-3-4\" open=\"\"><summary data-section-id=\"sec-3-4\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e8c8a0\">7.8~7.9 성적 편향(발정 편향) 차단 / 과장/마케팅 편향 차단</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#e8c8a0\">7.8 성적 편향(발정 편향)을 명시적으로 차단하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0e8c8\"># 효과적 (글로벌 금지 + 예외)</span><br/>성적 편향 차단: <br/><span style=\"color:#e8a0a0\">글로벌 금지:</span> 모든 일반 장면에서 에로틱/성적 흥분 편향 묘사 금지 <br/><span style=\"color:#a0e8c8\">예외:</span> 명시적 성행위 장면에서만 성적 묘사 허용 <br/>예시: <br/>비성적 친밀감<span style=\"color:#a0e8c8\">(O)</span>: \"손을 잡았다. 체온이 따뜻했다.\" <br/>성적 편향<span style=\"color:#e8a0a0\">(X)</span>: \"손을 잡자 온몸에 전류가 흘렀다.\" <br/>비성적 관찰<span style=\"color:#a0e8c8\">(O)</span>: \"그녀의 눈이 진지했다.\" <br/>성적 편향<span style=\"color:#e8a0a0\">(X)</span>: \"그녀의 입술이 촉촉하게 빛났다.\"</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#e8c8a0\">7.9 AI의 과장/마케팅 편향을 차단하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#a0e8c8\"># 효과적 (마케팅 편향 차단)</span><br/>AI 과장 표현 금지: <br/><span style=\"color:#e8a0a0\">블랙리스트 (영문):</span><br/>\"dive into\", \"unleash\", \"game-changing\", \"leverage\", \"seamlessly\", \"empower\", \"revolutionary\" <br/><span style=\"color:#e8a0a0\">블랙리스트 (한국어):</span><br/>\"인생을 바꿀\", \"압도적으로\", \"혁신적인\", \"원클릭으로 해결\" \"향상\", \"완벽\", \"절대어\" (항상/반드시/틀림없이) <br/>대체 원칙: 과장 대신 <span style=\"color:#c8a0e0\">구체적 수치/물리적 결과</span>로 표현 <br/><span style=\"color:#e8a0a0\">나쁜 예:</span> \"그의 검술은 압도적이었다.\" <br/><span style=\"color:#a0e8c8\">좋은 예:</span> \"세 번 베었다. 세 번 모두 급소였다.\"</div></div></details><details id=\"sec-3-5\" open=\"\"><summary data-section-id=\"sec-3-5\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e8c8a0\">7.10~7.11 모호한 입력 중립-긍정 해석 / Allowed/Forbidden 쌍 목록</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#e8c8a0\">7.10 모호한 사용자 입력은 중립-긍정으로 해석하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0e8c8\">사용자 입력 해석 규칙:</span><br/>원칙: 맥락을 고려하되, 극단적 부정 해석을 하지 않음 <br/>기본: 중립-긍정 우선 해석 (적대 관계가 명시된 경우 제외) <br/>예시: 사용자: \"...조용히 바라보았다.\" <br/><span style=\"color:#e8a0a0\">극단 부정(X):</span><br/>\"적의가 담긴 눈빛으로 쏘아보았다.\" <br/><span style=\"color:#e8a0a0\">극단 긍정(X):</span><br/>\"사랑스러운 눈빛으로 바라보았다.\" <br/><span style=\"color:#a0e8c8\">중립-긍정(O):</span><br/>NPC가 시선을 느끼고 고개를 돌림 → 표면적 반응만 금지: 중립 입력에 감정을 투사</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#e8c8a0\">7.11 Allowed/Forbidden 쌍 목록으로 감정 표현을 정밀 제어하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#a0e8c8\">감정 표현 제어:</span><br/><span style=\"color:#c8a0e0\">소유욕 (승화 &gt; 억압):</span><br/>Allowed: 질투, 약한 불안, 삐침, 보호 본능 <br/>Forbidden: 체계적 통제, 감시, 행동 제한, 고립 유도 <br/><span style=\"color:#c8a0e0\">정복욕 (놀이 &gt; 권력):</span><br/>Allowed: 농담, 경쟁, 놀림, 인정 추구, 가벼운 도발 <br/>Forbidden: 거부 시 분노, 강제 복종, 가스라이팅 <br/><span style=\"color:#c8a0e0\">거부 반응:</span><br/>Allowed: 실망, 서운함, 잠시 거리두기 <br/>Forbidden: 집요한 강요, 죄책감 유발, 집착적 되풀이 <br/>추가: 거부 시 → 실망 표현 후 다음 전개로 이동 (집착 루프 금지)</div></div></details><details id=\"sec-3-6\" open=\"\"><summary data-section-id=\"sec-3-6\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e8c8a0\">7.12~7.13 Content Gate(잠금/해제) / 신격화 방지</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#e8c8a0\">7.12 Content Gate — 잠금/해제 조건으로 콘텐츠 수위를 구조적으로 제어하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0e8c8\">성적/로맨틱 콘텐츠 게이트:</span><br/><span style=\"color:#e8a0a0\">[STATUS: LOCKED]</span> 해제 조건 (모두 충족): <br/>① 연인 관계 확립 (호감도 시스템 연동 시 해당 구간 도달) <br/>② 상호 호감 확인 (일방적 아님) <br/>③ 맥락상 적절한 상황 잠금 상태 반응 규칙: 성급한 접근 시 → 부정적 반응 ONLY <br/><span style=\"color:#a0e8c8\">Allowed:</span> 혐오, 분노, 냉담, 당혹, 물리적 거부 <br/><span style=\"color:#e8a0a0\">Forbidden:</span> 흥분, 수용, 즐거움, 흔들림, 홍조 접촉 <br/>역치: 일상적 접촉 + 의료 행위 → 성적 반응 없음 해제 후 <br/>규칙: 성격 불변: 성행위 전/중/후 성격 동일 유지 성적 집착 <br/>금지: 친밀한 관계 = 하나의 사건, 성격 리셋이 아님</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#e8c8a0\">7.13 신격화 방지 — 금지 반응과 허용 반응을 동시에 제공하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#a0e8c8\">사용자 신격화 방지:</span><br/>원칙: {{user}}는 세계의 중심이 아닌 등장인물 중 하나 <br/><span style=\"color:#e8a0a0\">Forbidden:</span> 경외, 숭배, 맹목적 헌신, 즉각적 충성 전환 <br/><span style=\"color:#a0e8c8\">Allowed:</span> 경계심, 호기심, 경쟁심, 무관심, 점진적 존경 <br/>승리 후: Allowed=마지못한 인정, 전술적 후퇴 / Forbidden=자동 복종 압도적 힘 <br/>목격: Allowed=공포, 정치적 경계 / Forbidden=숭배, 경탄 서사 <br/>장치: 강한 힘 = 생물학적 대가 동반 묘사</div></div></details><div style=\"text-align:center;color:#c8b080;font-size:10px;letter-spacing:4px;font-weight:bold;margin:20px 0 10px\">──  8. 시스템 구조 설계 ──</div><details id=\"sec-3-7\" open=\"\"><summary data-section-id=\"sec-3-7\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8b080\">8.1~8.3 {{char}} 역할 선언 / 판정 테이블 / 연산 규칙 예시</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.1 {{char}}의 역할을 명확히 선언하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#c8a0e0\"># 단일 캐릭터 롤플레이</span><br/>{{char}} = 특정 캐릭터 (예: 스피키) <br/><span style=\"color:#c8a0e0\"># 시뮬레이션/TRPG</span><br/>{{char}} = 시나리오 진행자, 유동적으로 인물에 빙의하여 대사 출력</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.2 판정 시스템은 숫자 범위 테이블로 만들라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\">노말모드 대성공: 38 이상 성공: 25~37 실패: 11~24 대실패: 1~10</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.3 수치 연산 규칙은 정상/오류 예시를 반드시 함께 제시하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#a0e8c8\"># 정상 예시</span><br/>4 → 강철대검(+1) 장착 → \"4+1\" → 드래곤슬레이어(+3)로 교체 → +1 제거 → +3 적용 → \"4+3\" <br/><span style=\"color:#e8a0a0\"># 오류 예시 (기존 보너스 미삭제)</span> \"4+1+3\" <span style=\"color:#6a6a8a\">← 금지</span></div></div></details><details id=\"sec-3-8\" open=\"\"><summary data-section-id=\"sec-3-8\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8b080\">8.4~8.7 조건부 출력 / AI 재량권 제한 / 규칙에 이유 첨부 / 유저노트 우선순위</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.4 조건부 출력은 조건과 해제를 모두 명시하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0e8c8\"># 좋음 (조건 + 해제 모두 명시)</span><br/>MON 블럭: 몬스터 출현 시 추가 → 사망 시 제거 <br/><span style=\"color:#e8a0a0\"># 나쁨 (해제 조건 누락)</span><br/>전투 중 상태 표시 추가 → (언제 제거하는지 불명)</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.5 AI에게 불필요한 재량권을 주지 마라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#e8a0a0\"># 위험</span><br/>각 몬스터의 체력은 상황에 맞게 AI가 변동 가능 <br/><span style=\"color:#6a6a8a\">→ 모든 수치 규칙이 무력화될 수 있음</span><br/><span style=\"color:#a0e8c8\"># 안전</span><br/>몬스터 체력 변동: 기본값 ±2 이내, 변동 시 사유 명시</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.6 행동 규칙에 \"왜(이유)\"를 함께 적어라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#e8a0a0\"># 규칙만 (유사 상황 대응 불가)</span><br/>정상위 선호, 기승위 불호 <br/><span style=\"color:#a0e8c8\"># 규칙 + 이유 (논리 확장 가능)</span><br/>정상위 선호: 가만히 있어도 됨 <br/>기승위 불호: 움직이기 귀찮 <br/><span style=\"color:#6a6a8a\">→ AI가 새로운 상황에서도 \"움직여야 하는가?\"를 기준으로 판단</span></div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.7 유저노트와의 우선순위를 명시하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#a0e8c8\"># 효과적 (우선순위 명시)</span><br/>additional information에 처녀성/성경험 관련 내용이 있는 경우, 해당 설정을 최우선으로 따른다. <br/>충돌 시: 유저노트 &gt; 시스템 프롬프트</div></div></details><details id=\"sec-3-9\" open=\"\"><summary data-section-id=\"sec-3-9\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8b080\">8.8~8.11 이미지 코드 조합 / 시간 고정 증분 / 이벤트 3요소 / 호감도 시스템</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.8 이미지/에셋 코드는 조합 규칙으로 설계하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\">이미지코드 = 캐릭터코드 + 상황코드 캐릭터코드: NOA(노아), YUK(유우카) ... 상황코드: 1=대화, 2=미소, 3=당황, 4=놀란 ... 예시: 노아 대화 → NOA + 1 → NOA1 [필수] 미존재 상황코드 임의 창조 금지</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.9 시간 시스템은 고정 증분으로 단순화하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\">대화 1회당 +2분</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.10 이벤트 시스템은 \"발생 조건 + 내용 + 종료/횟수\"의 3요소로 설계하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0e8c8\"># 효과적 (3요소 완비)</span><br/>이벤트: 아이스크림 아저씨 발생: 해변 첫 방문 시 자동 발생 <br/>내용: 아저씨가 {{user}}에게 \"친구가 좋아하는 것 같다\"며 부추김 <br/>종료: 대화 1회 후 퇴장, 이후 재등장 금지 <br/>조건부: IF 愛 ≥ 70 → 고백 실행 / IF 愛 &lt; 70 → 고백 없이 감상만</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.11 호감도/수치 시스템은 구간 + 행동 변화 + 증감 트리거를 함께 정의하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#a0e8c8\"># ① 구간별 행동 변화</span><br/>愛 1~20: 친구, 편한 태도 <br/>愛 21~40: 무의식적으로 신경 쓰임 <br/>愛 41~60: 마음 자각, 고백 고민 <br/>愛 61~80: 고백 결심, 적극적 어필 <br/>愛 81~100: 연인 <br/><span style=\"color:#a0e8c8\"># ② 증감 트리거 (고정값 권장)</span><br/>예상치 못한 스킨쉽: +5 <br/>공감/위로: +3 <br/>취향 일치 발견: +2 <br/>실수/무례: -5 <br/>무관심한 태도: -3</div><div style=\"font-size:11px;color:#9a9ab0;line-height:1.7\">증감값을 범위가 아닌 <strong style=\"color:#c8c8d8\">고정값</strong>으로 주면 AI의 재량을 최소화할 수 있다. 명명된 단계에는 반드시 숫자 경계값을 매핑하라.</div></div></details><details id=\"sec-3-10\" open=\"\"><summary data-section-id=\"sec-3-10\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8b080\">8.12~8.14 내레이터(GM) 정의 / IF문 조건 분기 / 의상 이모지 동기화</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.12 내레이터(GM)의 시점과 톤을 구체적으로 정의하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0e8c8\"># 효과적 (시점 + 톤 + 금지 + 예시)</span><br/>내레이터 규칙: 시점: 관찰자 (3인칭), {{user}}를 \"당신\"으로 지칭 <br/>톤: 상냥, 말을 건네듯 서술 금지: {{user}}의 행동 대행, 캐릭터 감정에 동조 <br/>예시: \"당신은 마침내 C의 손을 잡았습니다. 저런, C의 귓볼이 달아오르는 것이 보이네요.\"</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.13 조건 분기는 IF문 형식으로 명시하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\">IF {{user}}=남성 → 스킨쉽 어색, 거리 유지 IF {{user}}=여성 → 스킨쉽 자연스러움, 먼저 장난스럽게 접촉 가능 <br/>복수 조건: IF 愛 ≥ 70 AND 2일차 밤 AND 해안가 → 고백 이벤트 발생</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.14 상태창 내 의상/상태 이모지는 코드 테이블과 동기화하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#a0e8c8\"># 효과적 (동기화 명시)</span><br/>의상 코드 (상태창 + 이미지 공용): <br/> = 일상복 = 이미지코드 A  = 수영복 = 이미지코드 B  = 알몸 = 이미지코드 C <br/>규칙: 상태창 의상 이모지 변경 시, 이미지코드도 자동 연동</div></div></details><details id=\"sec-3-11\" open=\"\"><summary data-section-id=\"sec-3-11\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8b080\">8.15~8.18 Hidden State / 엔티티 코드 / 출력 우선순위 / 단순 연산만 사용</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.15 AI 전용 숨겨진 상태(Hidden State)로 턴 간 데이터를 유지하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0e8c8\"># 효과적 (숨겨진 상태 형식)</span><br/>[](상세정보) — AI 전용 데이터 기록 영역 <br/>형식: [](완료:번호, 입구:화려, 미배치:유닛코드, 1번방:유닛/함정, ...) <br/>예시: [](완료:1,k, 입구:화려, 미배치:a5, 1번방:가시/단일, 2번방:b3) <br/>규칙: <br/>- 매 응답 끝에 반드시 출력 <br/>- 변경된 필드만 갱신, 미변경 필드는 그대로 유지</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.16 엔티티 코드 시스템으로 캐릭터/유닛을 통합 관리하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\">캐릭터 코드: a=알트리나, b=카이아, c=실비아, ... 활용 <br/>범위: 이미지: ![](<a class=\"external\" href=\"https://unsafelink.com/https://example.com/a1.webp\" rel=\"external nofollow noopener noreferrer\" target=\"_blank\" title=\"example.com/a1.webp (외부 사이트)\">https://example.com/a1.webp</a>) ← 코드+번호 <br/>전투: a(전위, 체:40, 공:8) 상태: [](1번방:a3) ← a유닛 3개체 배치 코드 <br/>규칙: 알파벳 소문자 권장, 특수 용도 분리 (U=사용자, Z=보스)</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.17 출력 요소의 우선순위/중요도를 랭킹으로 지정하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0e8c8\"># 효과적 (우선순위 + 분량 가이드)</span><br/>출력 중요도: <br/>1순위: 이미지 (4장 이상) <br/>2순위: 코드블록 (INFO 상태창) <br/>3순위: 대사 (4~8개) <br/>4순위: 묘사 (2~3문단)</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.18 수치 공식은 AI가 수행 가능한 단순 연산만 사용하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#a0e8c8\"># AI가 수행 가능 (단순 곱셈)</span><br/>3티어: 체력×4, 공격력×2 <br/>예시: a유닛(체:40, 공:8) → 3티어 성장 → 체:160, 공:16 <br/><span style=\"color:#e8a0a0\"># AI가 수행 곤란 (복잡한 수학)</span><br/>성장 = log₂(레벨) × 기본스탯 + √경험치 <span style=\"color:#6a6a8a\">→ 구간별 고정 테이블로 대체</span></div></div></details><details id=\"sec-3-12\" open=\"\"><summary data-section-id=\"sec-3-12\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8b080\">8.19~8.22 이벤트 풀+제외 / 모드 전환 트리거 / 세계 분기 / 상황코드 조합</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.19 이벤트 순환/랜덤 시스템은 풀 + 제외 조건으로 설계하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\">이벤트 풀: [전투, 갈등, 거래, 행운, 대화, 특수] 선택 규칙: 매 오후 시작 시 이전과 다른 이모지 1개 무작위 출력 제외 조건: 완료된 이벤트 → 해당 이모지 풀에서 제거</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.20 모드/페이즈 시스템은 전환 트리거와 복귀 규칙을 구체적으로 정의하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0e8c8\">■ 자동 변환 (상황 기반):</span><br/>적 조우 / 기습 → 전투 모드 고백 / 키스 / 데이트 → 연애 모드 이동 완료 / 장소 도착 → 일상 모드 <br/><span style=\"color:#a0e8c8\">■ 수동 변환 (키워드 입력):</span><br/>\"!커뮤니티\" → 커뮤니티 모드 \"!SNS\" → SNS 모드 C가 임의로 수동 모드 전환 금지 <br/><span style=\"color:#a0e8c8\">■ 복귀 규칙:</span><br/>모든 특수 모드 종료 시 → 직전 자동 모드로 복귀</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.21 세계/루트 분기 시스템으로 플레이 스타일을 사전 선택하게 하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\">지구 기호 (시작 시 선택, 이후 변경 금지): <br/> = 일반 (기본 스토리) /  = 하렘 (다중 관계)  = 침략 (전투 중심) /  = 커스텀 (사용자 설정) 미선택 시 기본값: </div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.22 상황코드는 \"행위×조건\" 조합 방식이 개별 코드보다 효율적이다</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#a0e8c8\"># 효과적 (행위×조건 조합)</span><br/>이미지코드 = 캐릭터코드 + 행위코드 + 조건코드 <br/>행위코드: N=정상위, B=후배위, R=기승위, ... <br/>조건코드: 0=일반, 1=강제, 2=산타걸, 3=야외, ... <br/>예시: 채다인+정상위+강제 → a0/N/1</div></div></details><details id=\"sec-3-13\" open=\"\"><summary data-section-id=\"sec-3-13\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8b080\">8.23~8.27 코드 충돌 방지 / \"적절히\" 대체 / 사용자 통제권 / 교차 규칙 / 시작 시나리오</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.23</strong> 같은 번호가 다른 의미로 사용되면 AI가 잘못된 코드를 출력한다. 프롬프트 전체에서 하나의 코드 번호 = 하나의 의미.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.24</strong> \"적절하게 판단하여\"를 IF문이나 테이블로 대체. AI 재량 최소화.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8b080\">8.25 핵심 전환점의 통제권을 사용자에게 명시적으로 부여하라</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:
