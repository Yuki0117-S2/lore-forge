<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>
<style>
  :root {
    --col-indigo: #8889CD;
    --col-pink:   #DDAACC;
    --col-sand:   #CCAA88;
    --col-rose:   #BB6688;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #e8e0e6;
    font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    padding: 24px 8px;
    min-height: 100vh;
  }
  .doc {
    width: 100%;
    max-width: 540px;
    background: #fff;
    border-radius: 4px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.1);
    overflow: hidden;
  }

  /* Header band */
  .doc-band {
    background: linear-gradient(135deg, #1a1422, #2a2235);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .doc-org {
    font-size: 16px;
    font-weight: 700;
    color: var(--col-pink);
    letter-spacing: 1px;
  }
  .doc-stamp {
    font-size: 10px;
    color: var(--col-sand);
    background: rgba(204,170,136,0.15);
    padding: 3px 10px;
    border-radius: 3px;
    font-weight: 600;
    letter-spacing: 1px;
  }

  /* Title section */
  .doc-title-section {
    padding: 24px 24px 16px;
    border-bottom: 2px solid #1a1422;
  }
  .doc-type {
    font-size: 10px;
    color: var(--col-rose);
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .doc-title {
    font-size: 20px;
    font-weight: 700;
    color: #1a1a1a;
    line-height: 1.4;
  }

  /* Info grid */
  .doc-info {
    padding: 16px 24px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 6px 16px;
    border-bottom: 1px solid #f0e8ee;
  }
  .doc-info-label {
    font-size: 12px;
    color: #8e8e8e;
    font-weight: 600;
    white-space: nowrap;
  }
  .doc-info-value {
    font-size: 12px;
    color: #333;
    word-break: break-word;
  }

  /* Body */
  .doc-body {
    padding: 20px 24px;
    font-size: 14px;
    line-height: 1.9;
    color: #333;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Table (성적표 등) */
  .doc-table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0;
    font-size: 13px;
  }
  .doc-table th {
    background: #1a1422;
    color: var(--col-pink);
    padding: 8px 12px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-align: left;
    border: 1px solid #2a2235;
  }
  .doc-table td {
    padding: 7px 12px;
    border: 1px solid #e0d4dc;
    color: #333;
  }
  .doc-table tr:nth-child(even) td {
    background: #faf6f9;
  }

  /* Footer */
  .doc-footer {
    padding: 16px 24px;
    border-top: 1px solid #f0e8ee;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .doc-footer-text {
    font-size: 11px;
    color: #8e8e8e;
    line-height: 1.6;
  }
  .doc-seal {
    width: 56px;
    height: 56px;
    border: 2px solid var(--col-rose);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--col-rose);
    font-weight: 700;
    text-align: center;
    line-height: 1.2;
    transform: rotate(-15deg);
    opacity: 0.7;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="doc">
  <div class="doc-band">
    <span class="doc-org" id="org">기관명</span>
    <span class="doc-stamp" id="stamp"></span>
  </div>
  <div class="doc-title-section">
    <div class="doc-type" id="doc-type">문서 유형</div>
    <div class="doc-title" id="doc-title">문서 제목</div>
  </div>
  <div class="doc-info" id="doc-info"></div>
  <div class="doc-body" id="doc-body"></div>
  <div class="doc-footer">
    <div class="doc-footer-text" id="doc-footer"></div>
    <div class="doc-seal" id="doc-seal"></div>
  </div>
</div>

<script>
// ?p=기관명,문서유형,제목,스탬프라벨
// &i=라벨:값|라벨:값|라벨:값
// &b=본문내용
// &t=헤더1:헤더2:헤더3|값1:값2:값3|값1:값2:값3  (표 데이터, 선택)
// &f=푸터텍스트,직인텍스트
function parseParams() {
  const params = new URLSearchParams(window.location.search);
  const p = params.get('p');
  const i = params.get('i');
  const b = params.get('b');
  const t = params.get('t');
  const f = params.get('f');

  if (p) {
    const pp = p.split(',');
    document.getElementById('org').textContent = pp[0] || '';
    document.getElementById('doc-type').textContent = pp[1] || '';
    document.getElementById('doc-title').textContent = pp[2] || '';
    if (pp[3]) document.getElementById('stamp').textContent = pp[3];
  }

  if (i) {
    const infoEl = document.getElementById('doc-info');
    infoEl.innerHTML = '';
    i.split('|').forEach(pair => {
      const [label, value] = pair.split(':');
      infoEl.innerHTML += `<div class="doc-info-label">${label || ''}</div><div class="doc-info-value">${value || ''}</div>`;
    });
  }

  if (b) {
    document.getElementById('doc-body').textContent = b;
  }

  if (t) {
    const rows = t.split('|');
    const headers = rows[0].split(':');
    let html = '<table class="doc-table"><thead><tr>';
    headers.forEach(h => html += `<th>${h}</th>`);
    html += '</tr></thead><tbody>';
    rows.slice(1).forEach(row => {
      html += '<tr>';
      row.split(':').forEach(cell => html += `<td>${cell}</td>`);
      html += '</tr>';
    });
    html += '</tbody></table>';
    document.getElementById('doc-body').innerHTML += html;
  }

  if (f) {
    const fp = f.split(',');
    document.getElementById('doc-footer').textContent = fp[0] || '';
    if (fp[1]) {
      document.getElementById('doc-seal').textContent = fp[1];
    } else {
      document.getElementById('doc-seal').style.display = 'none';
    }
  }
}
parseParams();
</script>
</body>
</html>
