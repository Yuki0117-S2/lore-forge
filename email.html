<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email</title>
<style>
  :root {
    --col-indigo: #8889CD;
    --col-pink:   #DDAACC;
    --col-sand:   #CCAA88;
    --col-rose:   #BB6688;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f0f4;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    padding: 20px 0;
    min-height: 100vh;
  }
  .email {
    width: 100%;
    max-width: 560px;
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e0d4dc;
    overflow: hidden;
  }

  /* Header bar */
  .email-toolbar {
    background: #faf6f9;
    border-bottom: 1px solid #e0d4dc;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: #8e8e8e;
  }
  .toolbar-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 16px;
    color: var(--col-indigo);
    padding: 4px;
  }
  .toolbar-title {
    font-weight: 600;
    color: #333;
    flex: 1;
  }

  /* Email header */
  .email-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid #f0e8ee;
  }
  .email-subject {
    font-size: 20px;
    font-weight: 700;
    color: #1a1a1a;
    line-height: 1.4;
    margin-bottom: 14px;
  }
  .email-from-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .email-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--col-indigo), var(--col-rose));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }
  .email-from-info { flex: 1; }
  .email-from-name {
    font-size: 14px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 1px;
  }
  .email-from-addr {
    font-size: 12px;
    color: #8e8e8e;
  }
  .email-to {
    font-size: 12px;
    color: #8e8e8e;
    margin-top: 2px;
  }
  .email-date {
    font-size: 12px;
    color: #8e8e8e;
    text-align: right;
    white-space: nowrap;
    align-self: flex-start;
  }

  /* Body */
  .email-body {
    padding: 20px;
    font-size: 14px;
    line-height: 1.8;
    color: #333;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Footer */
  .email-footer {
    border-top: 1px solid #f0e8ee;
    padding: 12px 20px;
    display: flex;
    gap: 8px;
  }
  .reply-btn {
    padding: 8px 20px;
    border-radius: 20px;
    border: 1px solid #e0d4dc;
    background: #fff;
    font-size: 13px;
    color: var(--col-indigo);
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .reply-btn:hover {
    background: rgba(136,137,205,0.08);
    border-color: var(--col-indigo);
  }
</style>
</head>
<body>
<div class="email">
  <div class="email-toolbar">
    <button class="toolbar-btn">←</button>
    <span class="toolbar-title">받은편지함</span>
    <button class="toolbar-btn">🗑</button>
    <button class="toolbar-btn">⋯</button>
  </div>
  <div class="email-header" id="email-header"></div>
  <div class="email-body" id="email-body">이메일 내용</div>
  <div class="email-footer">
    <button class="reply-btn">↩ 답장</button>
    <button class="reply-btn">↩↩ 전체 답장</button>
    <button class="reply-btn">↪ 전달</button>
  </div>
</div>

<script>
// ?p=보낸사람이름,이메일주소,받는사람,제목,날짜,본문
function parseParams() {
  const params = new URLSearchParams(window.location.search);
  const p = params.get('p');
  if (!p) return;

  const parts = p.split(',');
  const fromName  = parts[0] || '';
  const fromEmail = parts[1] || '';
  const toAddr    = parts[2] || '';
  const subject   = parts[3] || '';
  const date      = parts[4] || '';
  const body      = parts.slice(5).join(',') || '';

  const initial = fromName.charAt(0).toUpperCase();

  document.getElementById('email-header').innerHTML = `
    <div class="email-subject">${subject}</div>
    <div class="email-from-row">
      <div class="email-avatar">${initial}</div>
      <div class="email-from-info">
        <div class="email-from-name">${fromName}</div>
        <div class="email-from-addr">&lt;${fromEmail}&gt;</div>
        <div class="email-to">받는 사람: ${toAddr}</div>
      </div>
      <div class="email-date">${date}</div>
    </div>
  `;

  document.getElementById('email-body').textContent = body;
}
parseParams();
</script>
</body>
</html>
