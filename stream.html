<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Stream</title>
<style>
  :root {
    --col-indigo: #8889CD;
    --col-pink:   #DDAACC;
    --col-sand:   #CCAA88;
    --col-rose:   #BB6688;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0e0a14;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  .stream-app {
    width: 100%;
    max-width: 820px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* Top bar */
  .top-bar {
    background: #1a1422;
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 7px;
    border-bottom: 1px solid #2a2235;
  }
  .top-logo {
    font-size: 18px;
    font-weight: 800;
    color: var(--col-indigo);
  }
  .top-search {
    flex: 1;
    background: #2a2235;
    border: none;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 13px;
    color: #71677b;
    max-width: 240px;
    margin-left: auto;
  }
  .top-user {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--col-rose);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #fff;
  }

  /* Main content */
  .main {
    flex: 1;
    display: flex;
    min-height: 0;
  }

  /* Video section */
  .video-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  /* Player */
  .player {
    width: 100%;
    aspect-ratio: 16/8;
    background: #111;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
  }
  .player svg {
    width: 48px; height: 48px;
    fill: var(--col-indigo); opacity: 0.3;
  }
  .player-desc {
    font-size: 13px; color: var(--col-pink); opacity: 0.4;
    text-align: center; padding: 0 20px;
  }
  .live-badge {
    position: absolute;
    top: 12px; left: 12px;
    background: #e91916;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    letter-spacing: 0.5px;
  }
  .viewer-count {
    position: absolute;
    top: 12px; right: 12px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .viewer-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #e91916;
  }

  /* Player controls */
  .player-controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    padding: 24px 12px 8px;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .ctrl-btn {
    background: none; border: none;
    color: #fff; font-size: 16px; cursor: pointer;
    padding: 4px;
  }
  .ctrl-spacer { flex: 1; }
  .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #e91916;
  }
  .live-text { font-size: 12px; color: #fff; font-weight: 600; }

  /* Stream info */
  .stream-info {
    padding: 8px 12px;
    display: flex;
    gap: 7px;
    border-bottom: 1px solid #2a2235;
  }
  .streamer-avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: #fff;
    flex-shrink: 0;
    border: 2px solid var(--col-rose);
  }
  .stream-details { flex: 1; min-width: 0; }
  .stream-title {
    font-size: 15px; font-weight: 700; color: #ede8f2;
    line-height: 1.3;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .streamer-name {
    font-size: 13px; color: var(--col-indigo); font-weight: 600;
    margin-top: 2px;
  }
  .stream-tags {
    display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap;
  }
  .stream-tag {
    font-size: 10px; padding: 2px 8px;
    background: rgba(136,137,205,0.12);
    color: var(--col-pink);
    border-radius: 12px; font-weight: 600;
  }
  .follow-btn {
    align-self: center;
    background: var(--col-rose);
    border: none; border-radius: 6px;
    padding: 6px 14px;
    font-size: 12px; font-weight: 700;
    color: #fff; cursor: pointer;
    flex-shrink: 0;
    font-family: inherit;
  }
  .follow-btn:hover { opacity: 0.9; }

  /* Chat sidebar */
  .chat-side {
    width: 280px;
    background: #1a1422;
    border-left: 1px solid #2a2235;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .chat-header {
    padding: 10px 12px;
    font-size: 13px;
    font-weight: 700;
    color: #ede8f2;
    border-bottom: 1px solid #2a2235;
    text-align: center;
  }
  .chat-messages {
    flex: 1;
    padding: 8px 10px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .chat-msg {
    font-size: 12px;
    line-height: 1.35;
    word-break: break-word;
  }
  .chat-nick {
    font-weight: 700;
    margin-right: 4px;
  }
  .chat-text { color: #b8b0c4; }
  .chat-system {
    font-size: 12px;
    color: #71677b;
    text-align: center;
    padding: 4px 0;
  }

  /* Chat input */
  .chat-input-area {
    padding: 8px 10px;
    border-top: 1px solid #2a2235;
  }
  .chat-input-box {
    background: #2a2235;
    border-radius: 6px;
    padding: 8px 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .chat-input-text {
    flex: 1;
    font-size: 13px;
    color: #71677b;
  }
  .chat-send {
    background: var(--col-indigo);
    border: none; border-radius: 4px;
    padding: 4px 10px;
    font-size: 12px; font-weight: 700;
    color: #fff; cursor: pointer;
    font-family: inherit;
  }

  @media (max-width: 600px) {
    .chat-side { width: 200px; }
  }
</style>
</head>
<body>
<div class="stream-app">
  <div class="top-bar">
    <span class="top-logo">LIVE</span>
    <div class="top-search">검색</div>
    <div class="top-user" id="top-user">U</div>
  </div>

  <div class="main">
    <div class="video-section">
      <div class="player">
        <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <div class="player-desc" id="player-desc">방송 화면</div>
        <div class="live-badge">LIVE</div>
        <div class="viewer-count">
          <div class="viewer-dot"></div>
          <span id="viewer-count">0</span>
        </div>
        <div class="player-controls">
          <button class="ctrl-btn">▶</button>
          <button class="ctrl-btn">🔊</button>
          <div class="ctrl-spacer"></div>
          <div class="live-dot"></div>
          <span class="live-text">LIVE</span>
          <button class="ctrl-btn">⛶</button>
        </div>
      </div>
      <div class="stream-info">
        <div class="streamer-avatar" id="streamer-avatar">S</div>
        <div class="stream-details">
          <div class="stream-title" id="stream-title">방송 제목</div>
          <div class="streamer-name" id="streamer-name">스트리머</div>
          <div class="stream-tags" id="stream-tags"></div>
        </div>
        <button class="follow-btn">팔로우</button>
      </div>
    </div>

    <div class="chat-side">
      <div class="chat-header">실시간 채팅</div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-area">
        <div class="chat-input-box">
          <span class="chat-input-text">채팅을 입력하세요</span>
          <button class="chat-send">전송</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ?p=스트리머닉,방송제목,시청자수,화면설명,[태그1 태그2 태그3]
// &c=닉:색:내용|닉:색:내용|system:시스템메시지
// 색: 인디고/핑크/샌드/로즈/빨강/초록/파랑/노랑 또는 생략

function roleColor(c) {
  const map = {
    '인디고':'#8889CD','핑크':'#DDAACC','샌드':'#CCAA88',
    '로즈':'#BB6688','빨강':'#ed4245','초록':'#57f287',
    '파랑':'#5865f2','노랑':'#fee75c','구독자':'#BB6688',
    '매니저':'#CCAA88'
  };
  return map[c] || '#DDAACC';
}

function parseParams() {
  const params = new URLSearchParams(window.location.search);
  const p = params.get('p');
  const c = params.get('c');

  if (p) {
    const pp = p.split('§');
    const streamer = pp[0] || '스트리머';
    const title    = pp[1] || '';
    const viewers  = pp[2] || '0';
    const desc     = pp[3] || '';
    const tags     = pp[4] || '';

    document.getElementById('streamer-name').textContent = streamer;
    document.getElementById('streamer-avatar').textContent = streamer.charAt(0);
    document.getElementById('streamer-avatar').style.background =
      `linear-gradient(135deg, var(--col-indigo), var(--col-rose))`;
    document.getElementById('stream-title').textContent = title;
    document.getElementById('viewer-count').textContent = Number(viewers).toLocaleString();
    if (desc) document.getElementById('player-desc').textContent = desc;

    if (tags) {
      const tagsEl = document.getElementById('stream-tags');
      tags.split(' ').forEach(t => {
        const span = document.createElement('span');
        span.className = 'stream-tag';
        span.textContent = t;
        tagsEl.appendChild(span);
      });
    }
  }

  if (c) {
    const chatEl = document.getElementById('chat-messages');
    c.split('|').forEach(raw => {
      const seg = raw.split(':');

      if (seg[0] === 'system') {
        const div = document.createElement('div');
        div.className = 'chat-system';
        div.textContent = seg.slice(1).join(':');
        chatEl.appendChild(div);
        return;
      }

      const nick  = seg[0] || '';
      const color = seg[1] || '';
      const text  = seg.slice(2).join(':') || '';

      const div = document.createElement('div');
      div.className = 'chat-msg';
      div.innerHTML = `<span class="chat-nick" style="color:${roleColor(color)}">${nick}</span><span class="chat-text">${text}</span>`;
      chatEl.appendChild(div);
    });

    chatEl.scrollTop = chatEl.scrollHeight;
  }
}
parseParams();
</script>
</body>
</html>
