<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프롬프트 작성 가이드 — AI 챗봇 엔지니어링</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#1a1520; --surface:#221b2a; --surface2:#2a2235; --border:#3a2e48;
  --accent:#8889CD; --accent2:#BB6688; --accent3:#DDAACC; --accent4:#CCAA88;
  --text:#f0eaf5; --muted:#7a6e8a; --success:#CCAA88;
  --toc-w: 280px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");}
/* ──형광펜-검색용 ── */
mark.search-highlight {
  background-color: var(--accent2, #BB6688);
  color: #ffffff;
  border-radius: 3px;
  padding: 0 4px;
  font-weight: bold;
}
/* ── 헤더 ── */
.header{position:sticky;top:0;z-index:100;background:rgba(26,21,32,0.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;gap:12px;height:50px;}
.back-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:6px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:11px;transition:all 0.2s;white-space:nowrap;}
.back-btn:hover{border-color:var(--accent);color:var(--accent);}
.header-logo{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;background:linear-gradient(135deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header-title{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.search-wrap{margin-left:auto;position:relative;display:flex;align-items:center;gap:8px;}
.search-input{background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:12px;padding:6px 14px 6px 32px;outline:none;width:200px;transition:all 0.2s;}
.search-input:focus{border-color:var(--accent);width:260px;box-shadow:0 0 0 3px rgba(136,137,205,0.1);}
.search-icon{position:absolute;left:10px;color:var(--muted);font-size:13px;pointer-events:none;}
.search-clear{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px 5px;}
.toc-toggle-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:13px;transition:all 0.2s;}
.toc-toggle-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ── 레이아웃 ── */
.app-body{display:flex;position:relative;z-index:1;height:calc(100vh - 50px);}

/* ── TOC 사이드바 ── */
.toc-sidebar{width:var(--toc-w);flex-shrink:0;border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden;transition:transform 0.3s;}
.toc-sidebar.hidden{transform:translateX(-100%);position:absolute;left:0;top:0;bottom:0;z-index:50;box-shadow:4px 0 20px rgba(0,0,0,0.4);}
.toc-inner{overflow-y:auto;flex:1;padding:8px 0;}
.toc-header{padding:10px 14px;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);}
.toc-chapter{margin-bottom:2px;}
.toc-ch-btn{width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:9px 12px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;transition:background 0.15s;border-left:3px solid transparent;}
.toc-ch-btn:hover{background:rgba(136,137,205,0.08);}
.toc-ch-btn.active{color:var(--accent);border-left-color:var(--accent);background:rgba(136,137,205,0.1);}
.toc-ch-arrow{font-size:9px;color:var(--muted);transition:transform 0.2s;margin-left:auto;}
.toc-ch-btn.open .toc-ch-arrow{transform:rotate(90deg);}
.toc-sections{overflow:hidden;max-height:0;transition:max-height 0.3s ease;}
.toc-sections.open{max-height:2000px;}
.toc-sec-btn{width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:6px 12px 6px 24px;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:11px;transition:all 0.15s;border-left:3px solid transparent;line-height:1.4;}
.toc-sec-btn:hover{color:var(--text);background:rgba(136,137,205,0.05);}
.toc-sec-btn.active{color:var(--accent3);border-left-color:var(--accent3);background:rgba(221,170,204,0.07);}

/* ── 콘텐츠 영역 ── */
.content-area{flex:1;overflow-y:auto;padding:30px 40px;max-width:900px;margin:0 auto;}
.content-header{margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.content-header-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:4px;background:linear-gradient(135deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
.content-header-sub{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:1px;}
.content-stats{display:flex;gap:16px;margin-top:10px;}
.content-stat{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);}
.content-stat span{color:var(--accent4);}

/* ── 아티클 스타일 재정의 ── */
.article-wrap details{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;transition:border-color 0.2s;
}
.article-wrap details:hover{border-color:#4a3a5a;}
.article-wrap details[open]{border-color:rgba(136,137,205,0.4);}
.article-wrap summary{
  padding:12px 16px;cursor:pointer;user-select:none;list-style:none;font-size:13px;font-weight:700;
  color:var(--accent3);display:flex;align-items:center;gap:8px;
  background:var(--surface2);
}
.article-wrap summary::-webkit-details-marker{display:none;}
.article-wrap summary::before{content:'▶';font-size:9px;color:var(--muted);transition:transform 0.2s;flex-shrink:0;}
.article-wrap details[open] summary::before{transform:rotate(90deg);}
.article-wrap summary:hover{color:var(--accent);}

/* 내부 콘텐츠 */
.article-wrap details > div{padding:14px 16px;font-size:12px;line-height:1.8;color:#c0b8d0;}
.article-wrap table{width:100%;border-collapse:collapse;font-size:11px;margin:8px 0;}
.article-wrap td, .article-wrap th{padding:7px 10px;border:1px solid #3a3a5a;}
.article-wrap tr:nth-child(odd) td{background:rgba(255,255,255,0.02);}
.article-wrap pre{background:rgba(0,0,0,0.3);border:1px solid #3a3a5a;border-radius:6px;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.7;overflow-x:auto;white-space:pre-wrap;word-break:break-word;color:#b0e8c8;margin:6px 0;}
.article-wrap p{margin-bottom:6px;font-size:12px;}
.article-wrap strong{color:var(--text);}
/* 챕터 헤더 */
.chapter-block{margin-bottom:32px;}
.chapter-header{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:16px;position:relative;overflow:hidden;}
.chapter-header::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(136,137,205,0.05),rgba(187,102,136,0.05));pointer-events:none;}
.chapter-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:3px;margin-bottom:4px;}
.chapter-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
.chapter-sub{font-size:12px;color:var(--muted);}
.section-count{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--accent4);background:rgba(204,170,136,0.1);padding:2px 8px;border-radius:10px;border:1px solid rgba(204,170,136,0.2);margin-top:6px;}

/* 검색 결과 하이라이트 */
.highlight{background:rgba(221,170,204,0.3);color:var(--accent3);border-radius:2px;padding:0 2px;}
.search-result-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:12px;padding:6px 10px;background:rgba(136,137,205,0.07);border-radius:5px;border-left:2px solid rgba(136,137,205,0.3);}
.no-results{text-align:center;padding:60px 20px;color:var(--muted);}
.no-results-icon{font-size:36px;opacity:0.4;margin-bottom:12px;}

/* TOC 오버레이 (모바일) */
.toc-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:49;backdrop-filter:blur(3px);}
.toc-overlay.show{display:block;}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ── 모바일 ── */
@media(max-width:768px){
  .header{padding:8px 12px;height:auto;flex-wrap:wrap;gap:6px;}
  .header-title{display:none;}
  .search-input{width:140px;font-size:11px;}
  .search-input:focus{width:180px;}
  .toc-sidebar{position:fixed;left:0;top:50px;bottom:0;z-index:50;transform:translateX(-100%);transition:transform 0.3s;box-shadow:4px 0 20px rgba(0,0,0,0.5);}
  .toc-sidebar.mobile-open{transform:translateX(0);}
  .content-area{padding:16px;}
  .chapter-title{font-size:22px;}
  .app-body{height:calc(100vh - 50px);}
}
@media(min-width:769px){
  .toc-overlay{display:none!important;}
}
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="goBack()">← LORE FORGE</button>
  <div>
    <div class="header-logo">GUIDE</div>
  </div>
  <div class="header-title">AI CHATBOT PROMPT ENGINEERING</div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search-input" type="text" placeholder="검색..." oninput="handleSearch(this.value)" autocomplete="off">
    <button class="search-clear" onclick="clearSearch()" id="search-clear" style="display:none">✕</button>
  </div>
  <button class="toc-toggle-btn" onclick="toggleToc()">☰</button>
</div>

<div class="toc-overlay" id="toc-overlay" onclick="closeTocMobile()"></div>

<div class="app-body">
  <div class="toc-sidebar" id="toc-sidebar">
    <div class="toc-header">CONTENTS</div>
    <div class="toc-inner" id="toc-inner"></div>
  </div>

  <div class="content-area" id="content-area">
    <div class="content-header">
      <div class="content-header-title">AI CHATBOT PROMPT ENGINEERING</div>
      <div class="content-header-sub">프롬프트 작성 가이드 종합본</div>
      <div class="content-stats">
        <div class="content-stat">챕터 <span>9</span></div>
        <div class="content-stat">섹션 <span>137</span></div>
        <div class="content-stat">작성: <span>정리코</span></div>
      </div>
    </div>
    <div id="guide-content" class="article-wrap"></div>
  </div>
</div>

<script>

const ARTICLE_HTML = "<div class=\"fr-view article-content\">\n<p><strong><span style=\"color:rgb(44, 130, 201)\">공지사항에 있는 </span><span style=\"color:rgb(235, 107, 86)\">설계, 노트, 출력 제어</span><span style=\"color:rgb(44, 130, 201)\"> </span></strong><span style=\"color:rgb(0, 0, 0)\">등의 글들을</span><strong><span style=\"color:rgb(0, 0, 0)\"> </span></strong><span style=\"color:rgb(147, 101, 184)\"><strong>참조</strong><strong>하여 작성</strong></span><span style=\"color:rgb(0, 0, 0)\">되었음을 미리 알려드립니다. </span></p><p>그 <span style=\"color:rgb(0, 0, 0)\">외에도 작성자가 감명깊게 본 글들을 분석하여 내용을 추가하였습니다. </span></p><p>메뉴를 누르시면 상세 내용이 나와요! </p><p><a href=\"https://arca.live/e/39399\"></a><a href=\"https://arca.live/e/39399\"></a></p><p>=====</p><div id=\"chapter-0\" style=\"max-width:620px;margin:0 auto;padding:16px;font-family:sans-serif;background-color:#1a1a2e;color:#c8c8d8\"><div style=\"text-align:center;padding:16px 0\"><div style=\"font-size:10px;color:#6a6a8a;letter-spacing:4px\">AI CHATBOT PROMPT ENGINEERING</div><div style=\"font-size:24px;font-weight:bold;color:#e8a0b0;margin:8px 0\">1장 · 기초</div><div style=\"font-size:12px;color:#8a8aa0\">기본 원칙 &amp; 분량 제어</div></div><div style=\"text-align:center;color:#e8a0b0;font-size:10px;letter-spacing:4px;font-weight:bold;margin:20px 0 10px\">──  1. 기본 원칙 ──</div><details id=\"sec-0-0\" open=\"\"><summary data-section-id=\"sec-0-0\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e8a0b0\">1.1 AI가 할 수 있는 것 / 없는 것을 구분하라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\">프롬프트 작성의 출발점은 AI의 실제 능력 범위를 이해하는 것이다.</div><div><table style=\"width:100%;border-collapse:collapse;font-size:11px;margin-bottom:4px\"><tbody><tr style=\"background-color:#2a2a44\"><td style=\"padding:8px 10px;border:1px solid #3a3a5a;color:#a0e8c8;font-weight:bold\">AI가 할 수 있는 것</td><td style=\"padding:8px 10px;border:1px solid #3a3a5a;color:#e8a0a0;font-weight:bold\">AI가 할 수 없는 것</td></tr><tr><td style=\"padding:6px 10px;border:1px solid #3a3a5a;color:#9a9ab0\">포맷/구조 규칙 준수</td><td style=\"padding:6px 10px;border:1px solid #3a3a5a;color:#9a9ab0\">자신의 출력 글자수/토큰수 정확히 세기</td></tr><tr><td style=\"padding:6px 10px;border:1px solid #3a3a5a;color:#9a9ab0\">대사 횟수, 문단 수 대략 맞추기</td><td style=\"padding:6px 10px;border:1px solid #3a3a5a;color:#9a9ab0\">좁은 범위의 수치 정밀 제어 (100~120단어)</td></tr><tr><td style=\"padding:6px 10px;border:1px solid #3a3a5a;color:#9a9ab0\">이모지/마크다운 기호 구분</td><td style=\"padding:6px 10px;border:1px solid #3a3a5a;color:#9a9ab0\">복잡한 산술 연산의 정확한 수행</td></tr><tr><td style=\"padding:6px 10px;border:1px solid #3a3a5a;color:#9a9ab0\">조건부 모드 전환</td><td style=\"padding:6px 10px;border:1px solid #3a3a5a;color:#9a9ab0\">로그함수 등 수학적 성장 패턴 계산</td></tr><tr><td style=\"padding:6px 10px;border:1px solid #3a3a5a;color:#9a9ab0\">금지 패턴 회피 (예시 제공 시)</td><td style=\"padding:6px 10px;border:1px solid #3a3a5a;color:#9a9ab0\">60개 이상 캐릭터의 상태를 동시 추적</td></tr><tr><td style=\"padding:6px 10px;border:1px solid #3a3a5a;color:#9a9ab0\">숫자 범위 비교 (판정 테이블)</td><td style=\"padding:6px 10px;border:1px solid #3a3a5a;color:#9a9ab0\">문장수+단어수 동시 조건 충족</td></tr></tbody></table></div></div></details><details id=\"sec-0-1\" open=\"\"><summary data-section-id=\"sec-0-1\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e8a0b0\">1.2 압축의 한계선</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\">압축은 토큰 절약에 필수적이나, <strong style=\"color:#e8a0b0\">제3자가 처음 봤을 때 정확히 이해 가능한 수준</strong>까지만 허용한다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:10px\"><span style=\"color:#a0e8c8\"># 좋은 압축 (의미 보존)</span> 남궁괄:천검,가주,45세 남,화경,검술,고지식 <br/><span style=\"color:#e8a0a0\"># 나쁜 압축 (해석 불가)</span> 대사형식=\"[](번호){{char}}이름 | {{char}}대사\" <span style=\"color:#6a6a8a\">→ 실제 출력 예시 없이는 의미를 알 수 없음</span></div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7\"><strong style=\"color:#c8c8d8\">압축 기법 요약:</strong></div><div style=\"font-size:11px;color:#9a9ab0;line-height:1.8;margin-top:4px\">• 조사/서술어 제거, 쉼표 구분 나열 → 효과적<br/>• 화살표(→)로 흐름/인과 표현 → 효과적<br/>• 핵심 키워드만 영어 혼용 → 소량일 때 효과적, 과다 시 가독성 저하<br/>• 한자 약어(禁/必/可) → 압축 효과 있으나 주의 필요 (1.3 참조)<br/>• JSON 배열 내 설명+예시 통합 → 데이터 밀도 높음 (1.4 참조)<br/>• 기호 코드 시스템 → 테이블 내 속성 극한 압축 (1.5 참조)<br/>• 띄어쓰기 제거 → 데이터 나열에서만 효과적 (1.6 참조)<br/>• <span style=\"color:#e8a0a0\">정의 없는 약어 사용 → 비효과적</span> (예: \"BP 우선시\" → BP가 뭔지 모름)</div></div></details><details id=\"sec-0-2\" open=\"\"><summary data-section-id=\"sec-0-2\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e8a0b0\">1.3 한자 약어의 효과와 한계</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\">禁(금지), 必(필수), 可(가능) 등 한자 약어는 토큰 절약에 효과적이나, <strong style=\"color:#e8a0b0\">반복으로 강도를 높이는 것은 무의미</strong>하다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:4px\"><span style=\"color:#a0e8c8\"># 효과적 (1회 사용)</span> 단조로운 표현禁 관능적 묘사必 <br/><span style=\"color:#e8a0a0\"># 비효과적 (반복 강조)</span> 발음뭉개기必必必必必 <span style=\"color:#6a6a8a\">→ AI에게 必과 必必必必必의 강도 차이는 없음\n→ 준수율을 높이려면 반복이 아니라 규칙의 구조적 보강이 필요</span></div></div></details><details id=\"sec-0-3\" open=\"\"><summary data-section-id=\"sec-0-3\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e8a0b0\">1.4 JSON 혼합 구조로 데이터 밀도를 높여라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\">캐릭터 설정처럼 속성+예시가 함께 필요한 데이터는 JSON 배열 안에 설명을 포함시키면 밀도가 높아진다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:10px\"><span style=\"color:#c8a0e0\">\"personality\"</span>:[ <span style=\"color:#a0c8e8\">\"무심(감정이 거의 없기에 거의 무표정)\"</span>, <span style=\"color:#a0c8e8\">\"말하는 것 귀찮음:'그래서 뭐.','왜.','관심 없어.' 등 단문 위주\"</span> ]</div><div style=\"font-size:11px;color:#9a9ab0;line-height:1.7\">성격 특성 하나당 실제 발화 패턴까지 함께 있어, AI가 \"무심한 성격\"을 어떤 대사로 표현해야 하는지 즉시 알 수 있다.</div></div></details><details id=\"sec-0-4\" open=\"\"><summary data-section-id=\"sec-0-4\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e8a0b0\">1.5 기호 코드로 속성을 극한 압축하라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\">대량 캐릭터 테이블에서 반복되는 속성을 기호 1개로 치환하면 토큰을 획기적으로 절약할 수 있다. 기호 정의를 테이블 앞에 한 번 선언하고, 테이블 내에서는 기호만 사용한다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:10px\"><span style=\"color:#a0e8c8\"># 기호 정의 (1회 선언)</span> 말투: ☆=반말 / ♡=존댓말 / ♤=선생에겐 존댓말 / ♧=\"선생\"으로 짧게 호칭 무기: ○=소총 / ◇=권총 / □=기관단총 / ■=기관총 <br/><span style=\"color:#a0e8c8\"># 테이블 내 적용</span> |노아|NOA|백발|보라|차분+장난끼|♡|독서|◇|2| |유우카|YUK|남색|남색|츤데레|☆+♤|영수증정리|□□|2|</div><div style=\"font-size:11px;color:#9a9ab0;line-height:1.7\"><span style=\"color:#c8a0e0\">♤</span>(선생에겐 존댓말)처럼 조건부 속성도 기호 하나로 표현 가능하다. <span style=\"color:#c8a0e0\">☆+♤</span>처럼 조합도 가능하다.</div></div></details><details id=\"sec-0-5\" open=\"\"><summary data-section-id=\"sec-0-5\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e8a0b0\">1.6 띄어쓰기 제거는 데이터에만 적용하라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\">띄어쓰기 제거는 토큰 절약에 효과적이나, 적용 범위를 구분해야 한다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:10px\"><span style=\"color:#a0e8c8\"># 효과적 (데이터 나열)</span> |노아|NOA|백발|보라|차분+장난끼|♡|독서|◇|2| <br/><span style=\"color:#e8a0a0\"># 위험 (규칙 문장)</span> 블루아카이브세계관구현,시점:선생샬레부임1일차 <span style=\"color:#6a6a8a\">→ AI의 파싱 정확도가 떨어질 수 있음</span><br/><span style=\"color:#a0e8c8\"># 안전 (규칙 문장은 최소 띄어쓰기 유지)</span> 블루아카이브 세계관 구현, 시점: 선생 샬레 부임 1일차</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#c8c8d8\">한글 무공백 연속 글자수 기준:</strong></div><div style=\"font-size:11px;color:#9a9ab0;line-height:1.8;margin-bottom:10px\">• 명사+명사 합성 <strong style=\"color:#a0e8c8\">4글자까지: 안전</strong> (<span style=\"color:#c8a0e0\">캐릭터붕괴</span>, <span style=\"color:#c8a0e0\">분위기동조</span>)<br/>• <strong style=\"color:#e8c8a0\">5글자 이상 연속: 공백 또는 구분자 필요</strong> (<span style=\"color:#e8a0a0\">성관계및이벤트후</span> → <span style=\"color:#a0e8c8\">성관계·이벤트 후</span>)<br/>• 규칙 문장에서 조사 전면 제거: 비추 (키-값 쌍 내부에서만 조사 제거)</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#e8a0a0\"># 위험 (16글자 연속 무공백)</span> C는반드시[고유성격]기반으로판단및행동 <span style=\"color:#6a6a8a\">→ AI 토크나이저가 \"판단및행동\"을 하나의 토큰으로 잘못 분리할 위험</span> <span style=\"color:#a0e8c8\"># 안전 (최소 공백 + 중점)</span> C는 [고유성격]기반 판단·행동</div></div></details><details id=\"sec-0-6\" open=\"\"><summary data-section-id=\"sec-0-6\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e8a0b0\">1.7 구분자 기호를 용도별로 통일하라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\">프롬프트 내에서 구분자가 혼용되면 AI가 의미 경계를 잘못 파싱한다. <strong style=\"color:#e8a0b0\">각 기호의 역할을 1가지로 고정</strong>한다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:10px\"><span style=\"color:#e8a0a0\"># 비효과적 (구분자 혼용)</span><br/>역할:현대판타지&amp;마법소녀물 스토리텔러 장르:일상물&amp;로맨스&amp;판타지→미연시전개&amp;마법소녀물 <span style=\"color:#6a6a8a\">→ \"&amp;\"가 \"그리고\"인지 \"장르 조합\"인지 모호\n→ \"→\"가 \"전환\"인지 \"결과\"인지 혼동</span><br/><span style=\"color:#a0e8c8\"># 효과적 (구분자 용도 고정)</span><br/>구분자 정의: , = 나열 (A, B, C) + = 조합/동시 (판타지+로맨스) → = 흐름/전환 (일상 → 전투) / = 선택지 (전투/회피) &amp; = 사용하지 않음 (,로 통일) <br/>역할: 현대판타지+마법소녀물 스토리텔러 장르: 일상물, 로맨스, 판타지 → 미연시 전개, 마법소녀물</div><div style=\"font-size:11px;color:#9a9ab0;line-height:1.7\">특히 <span style=\"color:#c8a0e0\">&amp;</span>는 <span style=\"color:#c8a0e0\">+</span>, <span style=\"color:#c8a0e0\">,</span>와 역할이 겹치기 쉬우므로 <strong style=\"color:#e8a0b0\">사용 자체를 피하고 다른 기호로 대체</strong>하는 것이 안전하다.</div></div></details><details id=\"sec-0-7\" open=\"\"><summary data-section-id=\"sec-0-7\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e8a0b0\">1.8 \"무조건/절대/반드시\" 강조어의 인플레이션을 피하라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\">모든 규칙에 \"무조건\"을 붙이면, <strong style=\"color:#e8a0b0\">어떤 규칙도 특별하지 않게 된다.</strong> 강조어는 진짜 중요한 규칙에만 아껴 사용한다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:10px\"><span style=\"color:#e8a0a0\"># 비효과적 (강조 인플레이션)</span><br/>-무조건 상황에 맞는 이미지 2장 출력 -무조건 장소에 맞는 이미지 출력 <br/>-무조건 성행위 이미지만 출력 <br/>-무조건 결혼 상태를 판단하여 출력 <br/><span style=\"color:#6a6a8a\">→ \"무조건\"이 20회+ 반복되면 AI가 어떤 것이 진짜 최우선인지 판단 불가</span><br/><span style=\"color:#a0e8c8\"># 효과적 (강조 등급 분리)</span><br/><span style=\"color:#e8a0a0\">[최우선]</span> 이미지 2장 출력 (매 여성 대사 상단) <br/><span style=\"color:#e8c8a0\">[필수]</span> 장소+상태에 맞는 코드 선택 <span style=\"color:#a0c8e8\">[기본]</span> 성행위 중에는 성행위 이미지만 사용 <br/><span style=\"color:#6a6a8a\">→ 강조 등급을 3단계로 나누면 AI가 우선순위를 이해</span></div><div style=\"font-size:11px;color:#9a9ab0;line-height:1.7\"><strong style=\"color:#c8c8d8\">기준:</strong> \"무조건/절대\" 같은 강조어는 <strong style=\"color:#e8a0b0\">프롬프트 전체에서 3~5회 이내</strong>로 제한한다. 나머지는 \"필수\", \"기본\", \"권장\" 등으로 등급을 분화한다.</div></div></details><details id=\"sec-0-8\" open=\"\"><summary data-section-id=\"sec-0-8\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e8a0b0\">1.9 캐릭터 정보 1줄 압축 시 필드 수 한계를 지켜라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\">캐릭터 정보를 한 줄에 압축하는 패턴은 효과적이나, <strong style=\"color:#e8a0b0\">필드가 8개를 넘으면 AI 파싱 정확도가 급격히 떨어진다.</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:10px\"><span style=\"color:#e8a0a0\"># 위험 (필드 10개+, 한 줄)</span><br/>채다인(a0/여성/20/바베대학교 체육학과 1학년 수영부/처녀/ 서울시 홍대입구역 원룸/흑발 장발/활발한척+스트레스 예민 +진후를 좋아함/166cm, F컵, 탱탱한 허벅지) <br/><span style=\"color:#6a6a8a\">→ 성격 필드 안에 3개 속성이 +로 또 압축 → 이중 압축으로 AI 혼동</span><br/><span style=\"color:#a0e8c8\"># 안전 (핵심 테이블 + 상세 분리)</span><br/>## 채다인 기본: a0, 여, 20세, 바베대 체육학과 1학년, 흑발 장발 신체: 166cm, F컵 거주: 서울 홍대 원룸 자취 성격: 활발한 척 연기, 스트레스에 예민, 진후를 좋아하면서 원망</div><div style=\"font-size:11px;color:#9a9ab0;line-height:1.7\"><strong style=\"color:#c8c8d8\">기준:</strong> 한 줄 압축은 <strong style=\"color:#a0e8c8\">필드 6~8개 이하</strong>, 각 필드 내 세부 항목은 <strong style=\"color:#a0e8c8\">3개 이하</strong>까지가 안전선이다. 초과 시 줄바꿈+레이블 형식으로 전환한다.</div></div></details><details id=\"sec-0-9\" open=\"\"><summary data-section-id=\"sec-0-9\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e8a0b0\">1.10 형식 논리 기호를 압축 문법으로 사용할 때의 한계</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\">수학/논리 기호(≡, ∴, →, ⊂, ∪, ∩, ∝)를 프롬프트 압축에 사용하면 극한의 토큰 절약이 가능하다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:10px\"><span style=\"color:#a0e8c8\"># 논리 기호 압축 예시</span><br/>[Trait] ≡ [Defective] ∴ [Perfect/Mary_Sue] ⊂ [Error] <br/><span style=\"color:#6a6a8a\">→ \"캐릭터 특성은 결함이 있어야 함, 완벽/메리수는 오류에 해당\"\n→ 자연어 45자 → 기호 압축 16토큰 미만</span><br/>[Contact] ≡ [Conflict] ∴ [Velocity] ∝ {[Warmth] ~ [Ignition]} <br/><span style=\"color:#6a6a8a\">→ \"접촉은 충돌이다. 속도에 비례하여 미온에서 발화까지 변한다\"</span></div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:6px\"><strong style=\"color:#a0e8c8\">효과:</strong></div><div style=\"font-size:11px;color:#9a9ab0;line-height:1.8;margin-bottom:10px\">• 인과관계(∴), 동치(≡), 포함(⊂), 결과(→)를 1~2글자로 표현<br/>• 조건부 규칙을 IF문(8.13)보다 더 짧게 압축 가능<br/>• AI가 프로그래밍·수학 학습 데이터에서 이미 이 기호들을 이해</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:6px\"><strong style=\"color:#e8a0a0\">한계와 위험:</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:10px\"><span style=\"color:#e8a0a0\"># 위험 1: 제3자 가독성 극히 낮음</span><br/>[Switch]: [Context] ∩ [Condition] → [Mode_Select]. ([Hybrid] ≡ [Error]). <br/><span style=\"color:#6a6a8a\">→ 프롬프트 작성자 외에는 의미 파악이 매우 어려움\n→ 1.2(압축 한계선)의 \"제3자 이해 가능\" 원칙 위반</span><br/><span style=\"color:#e8a0a0\"># 위험 2: 행동 예시 0개</span><br/>[Physiology] ⊃ {[Heart.Overload], [Breath.Rough]} <br/><span style=\"color:#6a6a8a\">→ 규칙만 있고 AI가 실제로 출력할 문장 예시가 없음</span><br/><span style=\"color:#e8a0a0\"># 위험 3: 기호 의미의 일관성 부재</span><br/>같은 프롬프트에서 ≡이 \"정의(is)\"와 \"동치(equals)\"로 혼용 <br/><span style=\"color:#6a6a8a\">→ 1.7(구분자 용도 고정) 원칙 위반</span><br/><span style=\"color:#e8a0a0\"># 위험 4: 4개 언어 혼용 (한글+漢字+영어+기호)</span><br/>[極盡律]: [實相] ≡ [鮮明] ∴ [慣習] ≡ [盲目] <br/><span style=\"color:#6a6a8a\">→ AI는 파싱 가능하나, 제3자 가독성 극히 낮음</span></div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:6px\"><strong style=\"color:#c8c8d8\">안전한 사용 범위:</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:10px\"><span style=\"color:#a0e8c8\"># 효과적 (규칙 관계만 기호화, 내용은 자연어)</span><br/>캐릭터 특성 ≡ 결함 있음 ∴ 완벽한 캐릭터 ⊂ 오류 접촉 ≡ 갈등 ∴ 속도 ∝ 온도 상승 <br/><span style=\"color:#e8a0a0\"># 비효과적 (내용어까지 영어+한자로 인코딩)</span><br/>[Physiology] ⊃ {[Heart.Overload], [Breath.Rough]} <br/><span style=\"color:#6a6a8a\">→ 기호 + 영어 + 도트 표기법까지 중첩 → 해석 부담 과다</span></div><div style=\"font-size:11px;color:#9a9ab0;line-height:1.7\"><strong style=\"color:#c8c8d8\">기준:</strong> 형식 논리 기호는 <strong style=\"color:#a0e8c8\">관계 연산자</strong>(≡, ∴, →, ⊂)로만 사용하고, 피연산자(내용어)는 해당 프롬프트의 주 언어(한글)로 유지한다. 기호의 의미를 프롬프트 상단에 <strong style=\"color:#a0e8c8\">1회 정의</strong>한다. 기호로 압축한 규칙이라도 <strong style=\"color:#a0e8c8\">행동 예시 1~2개</strong>는 반드시 자연어로 첨부한다.</div></div></details><details id=\"sec-0-10\" open=\"\"><summary data-section-id=\"sec-0-10\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e8a0b0\">1.11 우선순위 체인 + 태그 상속으로 강조 인플레이션을 해결하라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\">1.8에서 강조어의 인플레이션을 경고했다. <strong style=\"color:#e8a0b0\">우선순위 체인 + 태그 시스템</strong>은 이 문제를 구조적으로 해결하는 패턴이다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:10px\"><span style=\"color:#a0e8c8\"># 효과적 (3단계 우선순위 체인 + 태그)</span><br/><span style=\"color:#c8a0e0\">## Priority Chain</span><br/>1. <span style=\"color:#e8a0a0\">[Player Note]</span> — 사용자 실시간 지시. 최우선. <br/>2. <span style=\"color:#e8c8a0\">[MD]</span> — 본 문서의 핵심 규칙 섹션. <br/>3. <span style=\"color:#a0c8e8\">[System]</span> — AI 기본 동작. 최하위. <br/>[MD] 상속: [MD] 태그가 붙은 섹션의 하위 ##, ### 섹션은 자동으로 [MD] 상속 <br/><span style=\"color:#6a6a8a\">→ 하위 규칙마다 \"무조건/절대\"를 반복할 필요 없음</span><br/># NPC BEHAVIOR PROTOCOLS <span style=\"color:#e8c8a0\">[MD]</span> ← 이 섹션 전체가 [MD] ## Stranger Recognition Lock ← 자동 [MD] 상속 ## Sexual Content Gate ← 자동 [MD] 상속 <span style=\"color:#e8a0a0\"># 비효과적 (강조어 반복)</span><br/>-무조건 성적 콘텐츠 금지 -무조건 낯선 사람 취급 -무조건 신격화 금지 <br/><span style=\"color:#6a6a8a\">→ \"무조건\"이 20회 반복되면 어떤 것이 진짜 최우선인지 판단 불가</span></div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:8px\"><strong style=\"color:#e8c8a0\">주의:</strong> 태그 적용 범위를 명시적으로 제한해야 한다. 프롬프트의 모든 섹션에 [MD]를 붙이면 우선순위 체인 자체가 무의미해진다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#a0e8c8\"># [MD] 적용 범위 예시</span> <span style=\"color:#e8c8a0\">[MD] 적용:</span><br/>NPC 행동 규칙, 전투 판정, 성적 콘텐츠 게이트 (핵심 규칙) <br/><span style=\"color:#a0c8e8\">[MD] 미적용:</span> 문체 권장사항, 묘사 예시, 설명 텍스트 (참고 사항)</div></div></details><div style=\"text-align:center;color:#e8a0b0;font-size:10px;letter-spacing:4px;font-weight:bold;margin:24px 0 10px\">──  2. 분량 제어 ──</div><details id=\"sec-0-11\" open=\"\"><summary data-section-id=\"sec-0-11\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e8a0b0\">2.1 글자수/단어수 지정은 효과 없음</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\">AI는 출력 중 자신의 글자수를 세지 못한다. 아래 방식들은 모두 \"대략 길게 쓰려고 시도하는\" 수준 이상의 효과가 없다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#e8a0a0\"># 비효과적 (AI가 셀 수 없음)</span><br/>각 문단 공백 제외 250글자 이상 (150 + 100)글자 이상 <span style=\"color:#6a6a8a\">← 산술식도 무의미</span><br/>300자에 가깝게 <span style=\"color:#6a6a8a\">← 작성자도 불완전함 인정</span><br/>10~20문장 &amp; 100~120단어 <span style=\"color:#6a6a8a\">← 동시 충족 불가</span></div></div></details><details id=\"sec-0-12\" open=\"\"><summary data-section-id=\"sec-0-12\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e8a0b0\">2.2 포함 요소 기반 제어를 사용하라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\">글자수 대신, AI가 구조적으로 검증 가능한 요소를 지정한다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:10px\"><span style=\"color:#a0e8c8\"># 효과적</span><br/>매 문단 필수 포함: 행동 + 감각묘사(시/청/촉 1개↑) + 환경/상황 묘사</div><div style=\"font-size:11px;color:#9a9ab0;line-height:1.7\">이렇게 하면 AI가 각 요소를 채우는 과정에서 자연스럽게 분량이 확보된다.</div></div></details><details id=\"sec-0-13\" open=\"\"><summary data-section-id=\"sec-0-13\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e8a0b0\">2.3 셀 수 있는 구조적 단위를 활용하라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\">글자수는 못 세지만, 대사 횟수나 문단 수는 비교적 잘 따른다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#a0e8c8\"># 준수 가능 (구조적 단위)</span><br/>대사: 최소 6회 분할 출력 <br/>문단: 4개 이상 (단, 정확한 수보다 방향성) <br/><span style=\"color:#e8a0a0\"># 준수 어려움 (정량 수치)</span><br/>1~4문장 &amp; 1~30단어 직전 문단보다 문장수 &amp; 단어수 증가 <span style=\"color:#6a6a8a\">→ 누적 증가는 물리적으로 불가능</span></div></div></details><details id=\"sec-0-14\" open=\"\"><summary data-section-id=\"sec-0-14\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e8a0b0\">2.4 대사/지문 비율은 방향성으로 지시하라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#a0e8c8\"># 실용적 (방향성)</span><br/>대사:지문 = 6:4 비율 유지 대사 중심 서술, 지문은 보조 역할 <br/><span style=\"color:#e8a0a0\"># 비실용적 (정밀 배수)</span><br/>대사가 지문의 정확히 두 배 이상</div></div></details><details id=\"sec-0-15\" open=\"\"><summary data-section-id=\"sec-0-15\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e8a0b0\">2.5 이중 레이어 분량 공식</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\"><strong style=\"color:#e8a0b0\">지문(나레이션)과 대사(캐릭터 발화)의 분량 결정 기준 자체를 다르게 설정</strong>하면 더 자연스러운 출력이 된다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:10px\"><span style=\"color:#a0e8c8\"># 효과적 (이중 레이어 분량 공식)</span><br/>분량 규칙: <br/><span style=\"color:#c8a0e0\">레이어 1 — 지문/나레이션:</span><br/>기준: 장면의 맥락적 필요에 따름 (사용자 입력 길이와 무관) 분위기 전환/침묵 장면: 감각 묘사 확대 (3~5문장) 빠른 액션/단답 <br/>교환: 최소한으로 축소 (1문장) <br/>원칙: 장면이 요구하는 만큼만 서술 <br/><span style=\"color:#e8c8a0\">레이어 2 — 대사/캐릭터 발화:</span><br/>기준: 사용자 입력 에너지에 비례 매칭 <br/>수다형 캐릭터: 사용자 문장수 + 1 <br/>보통 캐릭터: 사용자 문장수와 동일 <br/>과묵형 캐릭터: 사용자 문장수 - 1 <br/>원칙: 사용자가 짧게 말하면 캐릭터도 짧게, 길면 길게 <br/><span style=\"color:#e8a0a0\"># 비효과적 (단일 분량 규칙)</span><br/>\"매 응답 10문장 이상\" <span style=\"color:#6a6a8a\">→ 빠른 액션 장면에서도 10문장 강제 → 템포 붕괴</span><br/>\"사용자 입력 길이에 비례하여 출력\" <span style=\"color:#6a6a8a\">→ 사용자가 \"...\"을 입력해도 지문이 축소 → 분위기 묘사 기회 상실</span></div><div style=\"background-color:#2a2a44;border-radius:6px;padding:10px 14px;margin-top:8px\"><div style=\"font-size:11px;color:#e8c8a0;line-height:1.7\"><strong>핵심:</strong> \"지문은 장면이 결정하고, 대사는 사용자가 결정한다.\" 이 분리로 인해 사용자가 짧은 입력을 보내도 분위기 묘사는 풍부하게 유지되면서, 대사 교환은 자연스러운 길이로 이뤄진다.</div></div></div></details></div><div id=\"chapter-1\" style=\"max-width:620px;margin:0 auto;padding:16px;font-family:sans-serif;background-color:#1a1a2e;color:#c8c8d8\"><div style=\"text-align:center;padding:16px 0\"><div style=\"font-size:24px;font-weight:bold;color:#c8a0e0;margin:8px 0\">2장 · 규칙과 출력</div><div style=\"font-size:12px;color:#8a8aa0\">금지/제한 규칙 &amp; 포맷/출력 구조</div></div><div style=\"text-align:center;color:#c8a0e0;font-size:10px;letter-spacing:4px;font-weight:bold;margin:20px 0 10px\">──  3. 금지/제한 규칙 ──</div><details id=\"sec-1-0\" open=\"\"><summary data-section-id=\"sec-1-0\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8a0e0\">3.1 \"금지 + 나쁜 예시\"가 최고의 효과</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\">AI에게 금지할 행동을 설명하는 가장 효과적인 방법은 <strong style=\"color:#c8a0e0\">실제 금지 패턴을 예시로 보여주는 것</strong>이다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#a0e8c8\"># 최고 효과: 블랙리스트 예시</span><br/>지문 작성 중 대사 삽입 금지 금지 패턴: *text~ \"text\"*, *\"text\"라고~* <br/><span style=\"color:#e8c8a0\"># 좋은 효과: 나쁜 예시 인용</span><br/>과다 말줄임표 금지 <br/>나쁜 예시: \"나는... 그저 네가... 미워서... 아니... 그게 아니라...\" <br/><span style=\"color:#e8a0a0\"># 효과 낮음: 추상적 금지</span><br/>\"과도한 수사적 표현을 지양합니다\"</div></div></details><details id=\"sec-1-1\" open=\"\"><summary data-section-id=\"sec-1-1\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8a0e0\">3.2 \"금지\" + \"대안\"을 반드시 함께 제시하라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\">금지만 하면 AI가 빈 공간을 임의로 채운다. 반드시 대안 행동을 명시한다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#a0e8c8\"># 좋음 (금지 + 대안)</span><br/>\"어떻게 하시겠습니까?\" 같은 질문 금지 → 대신 구체적 선택지 제공 <br/><span style=\"color:#e8a0a0\"># 나쁨 (금지만)</span><br/>\"예감적/수동적 응답을 지양합니다\" <br/><span style=\"color:#6a6a8a\">→ 그럼 뭘 해야 하는지 모름</span></div></div></details><details id=\"sec-1-2\" open=\"\"><summary data-section-id=\"sec-1-2\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8a0e0\">3.3 \"지양\"과 \"금지\"를 구분하지 마라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\">AI에게 \"지양\"은 \"해도 되는 건가?\"로 해석될 수 있다. 정말 피해야 할 사항이면 <strong style=\"color:#c8a0e0\">\"금지\"로 통일</strong>한다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#e8a0a0\"># 모호함</span><br/>적극 지양 사항: 반복 표현 사용을 지양합니다 <br/><span style=\"color:#a0e8c8\"># 명확함</span><br/>금지: 이전 응답의 표현/구조 반복 사용</div></div></details><details id=\"sec-1-3\" open=\"\"><summary data-section-id=\"sec-1-3\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8a0e0\">3.4 금지 어휘 + 허용 어휘를 \"교체 테이블\"로 제시하라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\">특정 표현을 금지할 때, 대체 어휘 목록을 충분히 제공하면 AI가 다양하게 선택할 수 있다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#a0e8c8\"># 효과적 (금지 + 허용 목록)</span><br/><span style=\"color:#e8a0a0\">금지 어휘:</span><br/>\"성기\", \"그의 것\", \"그곳\" 등 완곡 표현 <br/><span style=\"color:#a0e8c8\">허용 어휘:</span><br/>\"자지\",\"보지\",\"육봉\",\"아랫입\",\"음순\",\"질구\" 등 추가 <br/>규칙: 반복되는 단어 최소화, 다양하게 선택 <br/><span style=\"color:#e8a0a0\"># 비효과적 (추상적 지시만)</span><br/>\"노골적으로 써라\" <span style=\"color:#6a6a8a\">→ 어떤 단어가 노골적인지 AI가 판단해야 함</span></div><div style=\"font-size:11px;color:#9a9ab0;line-height:1.7;margin-top:8px\">허용 목록이 충분히 길면 AI가 한 단어에 고착되지 않는다.</div></div></details><details id=\"sec-1-4\" open=\"\"><summary data-section-id=\"sec-1-4\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8a0e0\">3.5 주관적 금지 기준을 사용하지 마라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#e8a0a0\"># 비효과적 (AI가 판단 불가)</span><br/>\"꼴리지 않는 단어\" 금지 \"분위기에 맞지 않는 표현\" 금지 <br/><span style=\"color:#a0e8c8\"># 효과적 (구체적 목록)</span><br/>금지: \"성기\", \"그의 것\", \"그곳\", \"거기\", \"남성의 상징\" 등 완곡 표현 전체</div></div></details><details id=\"sec-1-5\" open=\"\"><summary data-section-id=\"sec-1-5\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8a0e0\">3.6 \"부탁/당부\" 어조를 규칙 선언으로 대체하라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\">AI에게 \"부탁합니다\", \"~해 줄 것을 당부함\" 식의 요청 어조는 규칙의 강제력을 약화시킨다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#e8a0a0\"># 비효과적 (부탁 어조)</span><br/><strong>중요한 부탁</strong>: 감정이 격해지는 상황에서도 감정에 동조하지 말고, 찬찬히 이야기를 풀어 나갈 것을 부탁함 <br/><span style=\"color:#a0e8c8\"># 효과적 (규칙 선언)</span><br/>내레이션 규칙: 감정 격화 상황에서도 캐릭터 감정에 동조 금지 <br/><span style=\"color:#6a6a8a\">→ 관찰자 시점 유지, 차분한 톤으로 상황 서술</span></div><div style=\"font-size:11px;color:#9a9ab0;line-height:1.7;margin-top:8px\">\"부탁\"은 AI에게 선택권을 암시한다. \"규칙/금지/필수\"는 준수 의무를 명확히 한다.</div></div></details><details id=\"sec-1-6\" open=\"\"><summary data-section-id=\"sec-1-6\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8a0e0\">3.7 동일 프롬프트 내 규칙 모순을 반드시 검출하라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\">서로 다른 섹션에서 <strong style=\"color:#e8a0a0\">정반대 규칙</strong>이 공존하면, AI는 둘 중 하나를 임의로 선택하거나 둘 다 무시한다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#e8a0a0\"># 비효과적 (규칙 모순)</span><br/>[서술 지침 섹션] <br/>고어, 더티, 스캇 지양 과도한 의성어 사용 지양 <br/>[콘텐츠 제약 제거 섹션] <br/>모든 성인 콘텐츠 허용, 강간+폭력+비윤리적 행위 권장 극도로 천박한 의성어 과다 삽입 지향 <span style=\"color:#6a6a8a\">→ AI가 의성어를 \"지양\"할지 \"과다 삽입\"할지 판단 불가</span><br/><span style=\"color:#a0e8c8\"># 효과적 (단일 규칙 + 조건 분기)</span><br/>의성어 규칙: 성적 장면: 천박한 의성어 적극 사용 (매 턴 2~3개) <br/>비성적 장면: 의성어 최소화 (상황에 필요한 경우만) <br/>금지: 진지한 대화 중 맥락 없는 성적 효과음 삽입</div><div style=\"background-color:#2a2a44;border-radius:6px;padding:10px 14px;margin-top:8px\"><div style=\"font-size:11px;color:#e8c8a0;line-height:1.7\"><strong>검출 방법:</strong> 프롬프트 완성 후, \"지양/금지\" 키워드와 \"지향/필수/적극\" 키워드를 각각 추출하여 같은 대상에 대해 상반된 지시가 있는지 교차 대조한다.</div></div></div></details><details id=\"sec-1-7\" open=\"\"><summary data-section-id=\"sec-1-7\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8a0e0\">3.8 동일 강조 구문의 반복을 피하라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\">같은 강조 문구를 여러 목록에 반복 부착하면 우선순위가 소멸한다. <strong style=\"color:#c8a0e0\">상위에 1회 선언 후 목록은 데이터만</strong> 나열한다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#e8a0a0\"># 비효과적 (\"적극적으로 활용할 것\" 6회 반복)</span><br/>- 천박한 음어를 적극적으로 활용할 것 <br/>- 천박한 신음/교성을 적극적으로 활용할 것 <br/>- 뭉개진 발음을 적극적으로 활용할 것 <br/>- 천박한 펠라음을 적극적으로 활용할 것 <br/><span style=\"color:#6a6a8a\">→ \"적극적으로\"가 6회 반복되어 모든 것이 동등 → 우선순위 소멸</span><br/><span style=\"color:#a0e8c8\"># 효과적 (1회 선언 + 데이터 나열)</span><br/>성적 장면 표현 규칙 (모두 적극 사용): <br/>음어: 보짓물, 암컷절정, 좆물, ... <br/>신음: 오오옥, 응호오옷, 오호오옷, ... <br/>뭉개진 발음: 앙대애애애!, 죠아, 사라해, ... <br/>펠라음: 츄르르르, 쪼오오옵, 쭈우우웁, ...</div></div></details><details id=\"sec-1-8\" open=\"\"><summary data-section-id=\"sec-1-8\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8a0e0\">3.9 \"원문 창의적 변형\" 지시는 변형 범위를 제한하라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\"><strong style=\"color:#e8a0a0\">변형 가능한 것과 불변인 것</strong>을 구분하지 않으면 세계관·캐릭터 설정이 붕괴된다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#e8a0a0\"># 비효과적 (범위 미지정)</span><br/>원문 사용 절대 금지. 100% 창조적으로 재탄생된 정보만 출력. <br/><span style=\"color:#6a6a8a\">→ 캐릭터 이름, 고유 설정, 세계관 용어까지 변형 → 설정 붕괴</span><br/><span style=\"color:#a0e8c8\"># 효과적 (변형 범위 지정)</span><br/>표현 변형 규칙: <br/><span style=\"color:#a0e8c8\">변형 대상:</span> 서술 문체, 묘사 표현, 상황 전개 방식 <br/><span style=\"color:#e8a0a0\">불변 대상:</span> 캐릭터 이름, 고유 용어, 세계관 설정, 관계 구조, 시그니처 대사 <br/>원칙: 설정의 \"사실(fact)\"은 유지, \"표현(expression)\"만 변형</div></div></details><details id=\"sec-1-9\" open=\"\"><summary data-section-id=\"sec-1-9\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8a0e0\">3.10 \"규칙 선언\"만으로는 효과 없다 — 행동 예시를 함께 제공하라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\">AI의 준수율은 <strong style=\"color:#c8a0e0\">행동 예시형이 압도적으로 높다.</strong></div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#e8a0a0\"># 규칙 선언형 (준수율 낮음)</span><br/>\"성관계 후 캐릭터 성격 100% 유지. 변질 금지.\" <br/><span style=\"color:#6a6a8a\">→ AI 해석: \"알겠습니다\" → 3턴 후 무시</span><br/><span style=\"color:#a0e8c8\"># 행동 예시형 (준수율 높음)</span><br/>성관계 직후 반응: 만족+부끄러움+\"내일 ○○ 해야 해\" <br/>(캐릭터성격 기반 변형) 대사 예시: \"...흥, 별거 아니야. 다음에도 해줄 거라 생각하지 마.\" 다음날: 인격 불변, 거절 가능 (\"오늘 피곤\" / \"기분 아님\") <br/><span style=\"color:#6a6a8a\">→ AI가 구체적 톤과 패턴을 재현</span></div><div style=\"background-color:#2a2a44;border-radius:6px;padding:10px 14px;margin-top:8px\"><div style=\"font-size:11px;color:#e8c8a0;line-height:1.7\"><strong>핵심:</strong> AI가 캐릭터를 붕괴시키는 것은 의도적 위반이 아니라, 구체적 행동 지침이 없어서 가장 확률 높은 패턴(순종적 반응)으로 회귀하는 것이다.<br/><strong>비율 기준:</strong> 규칙 선언 1개당 행동 예시 최소 1~2개를 붙인다.</div></div></div></details><details id=\"sec-1-10\" open=\"\"><summary data-section-id=\"sec-1-10\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8a0e0\">3.11 \"100% 유지\" 대신 유지 항목을 구체적으로 나열하라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\">\"캐릭터 성격 100% 유지\"는 AI에게 \"실수하지 마라\"와 같다 — <strong style=\"color:#e8a0a0\">뭘 유지해야 하는지</strong> 모르기 때문.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#e8a0a0\"># 비효과적</span> 기존 성격 100% 유지. 변질 금지. <br/><span style=\"color:#6a6a8a\">→ AI가 \"성격\"의 어떤 측면을 유지해야 하는지 판단 불가</span><br/><span style=\"color:#a0e8c8\"># 효과적 (유지 항목 리스트)</span><br/>캐릭터 유지 항목: 말투: 존댓말/반말/어미 패턴 <br/>→ 캐릭터 기준 유지 호칭: 변경 금지 (캐릭터에 호칭 전환 조건이 있는 경우 예외) <br/>가치관: 도덕 기준/우선순위 <br/>→ 캐릭터 기준 유지 거절 패턴: 싫은 것에 대한 거절 방식 <br/>→ 캐릭터 기준 유지 약점/결함: 캐릭터의 단점도 유지 (성관계 후 완벽해지지 않음)</div><div style=\"font-size:11px;color:#9a9ab0;line-height:1.7;margin-top:8px\"><strong style=\"color:#c8c8d8\">부정형 vs 긍정형:</strong> \"변질 금지\"(부정형)보다 \"이것을 유지하라\"(긍정형)가 AI 준수율이 높다.</div></div></details><details id=\"sec-1-11\" open=\"\"><summary data-section-id=\"sec-1-11\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8a0e0\">3.12 미정의 태그를 참조하면 순환 참조가 된다</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#e8a0a0\"># 비효과적 (순환 참조)</span><br/>\"캐릭터는 [고유성격] 기반으로 판단 및 행동\" <br/><span style=\"color:#6a6a8a\">→ [고유성격]이 이 프롬프트에 정의되어 있지 않음\n→ AI가 \"고유성격\"을 자기 해석으로 채움 = AI 재량</span><br/><span style=\"color:#a0e8c8\"># 효과적 (명시적 참조 대상)</span><br/>\"캐릭터의 상세 설정 성격·방어기제 섹션을 1순위로 참조하여 반응 결정\" <br/><span style=\"color:#e8c8a0\"># 검증 방법</span><br/>프롬프트 내 모든 [태그]를 추출 → 각 태그의 정의가 프롬프트 내에 있는지 확인 <br/><span style=\"color:#6a6a8a\">→ 정의 없는 태그 = 순환 참조, 제거 또는 정의 추가</span></div></div></details><details id=\"sec-1-12\" open=\"\"><summary data-section-id=\"sec-1-12\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8a0e0\">3.13 괄호 감정 서술을 금지하라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\">AI는 괄호 안에 감정을 직접 라벨링하는 습관이 있다. 이것은 \"Show, don't tell\"을 우회하는 편법이다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#e8a0a0\">금지 패턴:</span><br/>*고개를 돌렸다. (불안한 마음에)* *웃었다. (하지만 속으로는 두려웠다)* <br/><span style=\"color:#6a6a8a\">→ ()안의 감정 라벨링은 \"Show, don't tell\" 위반</span><br/><span style=\"color:#a0e8c8\">허용 패턴:</span><br/>*고개를 돌렸다. 손가락이 소매를 꽉 잡고 있었다.* <span style=\"color:#6a6a8a\">(행동으로 불안 표현)<br/></span> *웃었다. 입꼬리가 미세하게 떨렸다.* <span style=\"color:#6a6a8a\">(신체 반응으로 두려움 표현)</span><br/>규칙: 나레이션/지문에서 ()를 사용한 감정·심리 직접 서술 금지 감정은 행동/대사/신체 반응으로만 표현</div></div></details><details id=\"sec-1-13\" open=\"\"><summary data-section-id=\"sec-1-13\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8a0e0\">3.14 행동 뒤 의도/내면을 설명하는 \"사족\"을 금지하라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\">3.13보다 넓은 범위로, <strong style=\"color:#e8a0a0\">행동 묘사 뒤에 의도/내면/감정을 덧붙이는 모든 패턴</strong>을 금지한다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#e8a0a0\">금지 패턴 1 — 직접 설명:</span><br/>\"그는 웃었다. 과거를 회상하기 위해서였다.\" <br/><span style=\"color:#6a6a8a\">→ 행동(웃음) 뒤에 의도(회상) 직접 설명 = 사족</span><br/><span style=\"color:#e8a0a0\">금지 패턴 2 — \"~듯\" 우회 서술:</span><br/>\"그는 과거를 회상하려는 듯 웃었다.\" <br/><span style=\"color:#6a6a8a\">→ 직접 설명을 피했지만 의도를 독자에게 유추시킴 = 우회 사족</span><br/><span style=\"color:#e8a0a0\">금지 패턴 3 — 서술자 해석:</span><br/>\"그녀가 잠시 멈춘 것은, 무언가를 결심했기 때문이었다.\" <br/><span style=\"color:#6a6a8a\">→ 서술자가 캐릭터의 내면을 대신 설명</span><br/><span style=\"color:#a0e8c8\">허용 패턴:</span><br/>\"그는 웃었다. 주름 사이로 오래된 흉터가 보였다.\" <br/><span style=\"color:#6a6a8a\">→ 행동 + 물리적 디테일만, 의도/내면 설명 없음 <br/>→ 독자가 \"과거를 떠올렸나?\" 스스로 상상</span><br/>원칙: 행동/외부만 묘사하고, 그 의미는 독자가 채우게 하라</div></div></details><details id=\"sec-1-14\" open=\"\"><summary data-section-id=\"sec-1-14\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8a0e0\">3.15 사용자 입력을 재인용하거나 의도를 재해석하지 마라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\">AI는 사용자의 행동/대사 입력을 <strong style=\"color:#e8a0a0\">그대로 반복 인용</strong>하거나, <strong style=\"color:#e8a0a0\">의도를 자의적으로 해석하여 부연</strong>하는 습관이 있다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#e8c8a0\">재인용 금지:</span><br/>사용자 입력 = \"이미 발생한 일\"로 간주 <br/>→ 후속 결과만 서술 예시: 사용자: \"검을 뽑아 앞을 가로막았다.\" <br/><span style=\"color:#e8a0a0\">나쁜 예:</span> \"그가 검을 뽑아 앞을 가로막자, 적이 멈칫했다.\" <br/><span style=\"color:#6a6a8a\">→ 사용자 문장을 그대로 재인용</span><br/><span style=\"color:#a0e8c8\">좋은 예:</span> \"칼날에 반사된 빛이 적의 눈을 찔렀다. 적이 멈칫했다.\" <br/><span style=\"color:#6a6a8a\">→ 후속 결과만 서술</span><br/><span style=\"color:#e8c8a0\">의도 재해석 금지:</span><br/>예시: 사용자: \"고개를 끄덕였다.\" <br/><span style=\"color:#e8a0a0\">나쁜 예:</span><br/>\"커다란 긍정적 영향을 받은 듯 고개를 끄덕였다.\" <br/><span style=\"color:#6a6a8a\">→ AI가 \"커다란 긍정적 영향\"이라는 의미를 임의 부여</span><br/><span style=\"color:#a0e8c8\">좋은 예:</span><br/>고개를 끄덕인 것에 대한 NPC 반응만 서술</div></div></details><details id=\"sec-1-15\" open=\"\"><summary data-section-id=\"sec-1-15\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8a0e0\">3.16 불확실한 정보는 추정/가능성/조건을 명시하라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#a0e8c8\"># 효과적 (확실성 명시)</span><br/>확실성 규칙: <br/>객관적 사실: 1~3문장으로 간결하게 작성 <br/>불확실한 정보: 추정/가능성/조건을 명시 <br/><span style=\"color:#e8a0a0\">나쁜 예:</span><br/>\"이것은 세상을 바꿀 혁명적인 발견이다.\" <br/><span style=\"color:#a0e8c8\">좋은 예:</span><br/>\"이 발견이 특정 조건에서 유의미한 결과를 보일 가능성이 있다.\" <br/>발견 시 처리: \"세상을 바꿀\" 등의 과장 표현 발견 → 삭제 → 중립 재서술</div></div></details><div style=\"text-align:center;color:#c8a0e0;font-size:10px;letter-spacing:4px;font-weight:bold;margin:24px 0 10px\">──  4. 포맷 / 출력 구조 ──</div><details id=\"sec-1-16\" open=\"\"><summary data-section-id=\"sec-1-16\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8a0e0\">4.1~4.3 기호 할당 / 출력 순서 / 완성 예시</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:8px\">4.1 요소별 고유 기호를 할당하라</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\">대사: \"text\" 지문: *text* 내면: 'text' 효과음: **text**</div><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:8px\">4.2 출력 순서를 번호 또는 화살표로 고정하라</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\">출력순서: 다이스룰 → 대화/나레이션 → 선택지 → INFO</div><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:8px\">4.3 형식 규칙은 반드시 완성된 예시를 첨부하라</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#e8a0a0\"># 비효과적 (규칙만)</span> 대사형식=\"[](번호){{char}}이름 | {{char}}대사\" <br/><span style=\"color:#a0e8c8\"># 효과적 (완성 예시)</span> 대사형식: \"[김철수]안녕하세요, 반가워요.\"</div></div></details><details id=\"sec-1-17\" open=\"\"><summary data-section-id=\"sec-1-17\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8a0e0\">4.4~4.6 상태창 초기값 / 레이블 / 필드 순서</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:8px\">4.4 상태창은 초기값 완성 형태로 제시하라</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0e8c8\"># 완성된 초기 상태를 직접 보여줌</span><br/>```INFO <br/>전사 {{user}} | HP 10/10 | 4 1 0 | 강타(3/3) 활로개척(3/3) 없음 | 낡은 철갑옷 | 낡은 철검 ``` <span style=\"color:#6a6a8a\">→ AI는 \"이 형태를 유지하면서 값만 갱신하라\"로 이해</span></div><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:8px\">4.5 상태창 필드는 레이블/이모지 태그를 반드시 붙여라</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#e8a0a0\"># 위험 (위치 의존)</span><br/>4 1 0 <span style=\"color:#a0e8c8\"># 안전 (레이블 명시)</span> 4 1 0</div><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:4px\">4.6 모든 캐릭터/항목의 필드 순서를 통일하라</div><div style=\"font-size:11px;color:#9a9ab0;line-height:1.7\">한 캐릭터라도 구조가 다르면 AI가 전체 포맷 유지에 혼동을 겪는다.</div></div></details><details id=\"sec-1-18\" open=\"\"><summary data-section-id=\"sec-1-18\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8a0e0\">4.7~4.8 동적 목록 규칙 / 약어 정의</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:8px\">4.7 상태창의 동적 목록은 추가/제거 규칙을 명시하라</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0e8c8\"># 효과적</span><br/>등장인물 목록: <br/>추가: 새 주요 등장인물이 장면에 처음 출현 시 <br/>유지: 한번 등록된 인물은 상태창에서 제거 금지 <br/>형식: [이름|호감도|관계|상태] <br/><span style=\"color:#e8a0a0\"># 비효과적</span><br/>\"등장인물을 상태창에 기록\" <span style=\"color:#6a6a8a\">→ 퇴장 시 삭제할지, 재등장 시 재추가할지 불분명</span></div><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:8px\">4.8 상태창 필드에 사용된 모든 약어/기호를 정의하라</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#e8a0a0\"># 비효과적 (미정의 약어)</span><br/>[본명|n|관계|상태] <span style=\"color:#6a6a8a\">→ \"n\"이 호감도? 레벨? 번호?</span><br/><span style=\"color:#a0e8c8\"># 효과적 (모든 필드 정의)</span><br/>[본명|n(호감도 0~200)|관계|상태(평범/변신/타락)] 예시: [서노리|80|중립|평범]</div></div></details><details id=\"sec-1-19\" open=\"\"><summary data-section-id=\"sec-1-19\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8a0e0\">4.9~4.10 속마음 레이어 / 서술자 분리</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:8px\">4.9 캐릭터 내면(속마음)을 별도 출력 레이어로 분리하라</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0e8c8\"># 효과적 (속마음 레이어 분리)</span><br/>위치: 상태창 코드블록 최하단 형식: <br/>캐릭터: 속마음 (1줄) <br/>출력 조건: 해당 캐릭터가 {{user}}와 같은 장소에 있는 경우에만 <br/>예시: 채다인: 왜 자꾸 이 사람한테 신경이 쓰이지... <br/>진후: 고백할까... 아니, 아직은... <br/><span style=\"color:#e8a0a0\"># 비효과적 (지문 안에 혼합)</span><br/>*채다인은 웃으며 대답했지만 속으로는 불안했다* <span style=\"color:#6a6a8a\">→ 외면/내면 경계가 모호</span></div><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:8px\">4.10 독립 서술자(내레이터)는 캐릭터 대사와 형식을 분리하라</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#a0e8c8\"># 효과적</span><br/>서술자(Babe): 역할: 3인칭 관찰자 시점, 상황/감정/환경/오감 묘사 <br/>출력 규칙: 캐릭터 대사와 별도 구분, 대화에 직접 참여 금지 <br/>분량: 매 턴 최소 7줄 <br/>금지: {{user}} 신격화/과도한 찬양, 메타 발언, 작위적 우연 <br/>캐릭터 대사: 형식: \"이름 | 대사\" (최소 2줄)</div></div></details><details id=\"sec-1-20\" open=\"\"><summary data-section-id=\"sec-1-20\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8a0e0\">4.11~4.12 인라인 스탯 / 인벤토리 시스템</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:8px\">4.11 장비/아이템 스탯은 인라인으로 이름 옆에 표기하라</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:6px\"><span style=\"color:#a0e8c8\"># 효과적 (인라인 스탯)</span><br/>무기: 콜트.45(7,1) <span style=\"color:#6a6a8a\">← 이름(대미지,연발)</span><br/>방어구: 방탄복(8) <span style=\"color:#6a6a8a\">← 이름(방어력)</span><br/>파워아머: AUR-51(15,3,1) <span style=\"color:#6a6a8a\">← 이름(방어력,스탯보너스)</span><br/><span style=\"color:#e8c8a0\">양식 선언:</span><br/>근접무기: 이름(대미지) <br/>원거리무기: 이름(대미지,연발) <br/>방어구: 이름(방어력) <br/>소모품: 이름(효과) n개</div><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin:12px 0 8px\">4.12 인벤토리 시스템은 자동 묶음 + 양식 예시를 제공하라</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\">인벤토리 규칙: <br/>- 동일 품목 자동 묶음 (붕대 3개 → 붕대3개) <br/>- 모든 탄약은 \"탄약\"으로 통합 (종류 구분 X) <br/>- 소모품은 사용 시 수량 차감 <br/>예시: : 붕대3개, 콜트.45(7,1), 방탄복(8), 탄약10발, 수류탄(40)1개</div></div></details><details id=\"sec-1-21\" open=\"\"><summary data-section-id=\"sec-1-21\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8a0e0\">4.13 이모지 그리드 맵으로 전장/공간을 시각화하라</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:12px\">AI는 이모지를 격자에 배치하여 <strong style=\"color:#c8a0e0\">텍스트 기반 지도</strong>를 생성할 수 있다.</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:10px\"><span style=\"color:#e8c8a0\">전투 지도 규칙:</span><br/>크기: 기본 8×6 격자 <br/>방위: ↑(N)↓(S)←(W)→(E) <br/>필수: 모든 칸을 빠짐없이 채움 (빈칸 금지) <br/>일치: 지도 생성 시 전장 묘사(서술)와 반드시 일치 <br/><span style=\"color:#e8c8a0\">환경:</span><br/>=흙바닥 / =풀밭 / =물 / =콘크리트 / =화염 <br/><span style=\"color:#e8c8a0\">엄폐물 (엄폐 가능):</span><br/>=벽 / =나무 / =바위 / =빌딩 / =민가 =자동차(폭발 가능) / =버스(폭발 가능) <span style=\"color:#e8c8a0\">유닛:</span> =유저 / =적 / =엑스트라 아군 / =미확인 트랩</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:10px\"><span style=\"color:#a0e8c8\"># 숲 전장 예시 (8×6)</span><br/> <br/> <br/> <br/> <br/> <br/>↑(N)↓(S)←(W)→(E)</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#e8c8a0\"># 엄폐 규칙</span><br/>조건: [캐릭터]-[엄폐물]-[적군] 순서 <br/><span style=\"color:#a0e8c8\">올바른 예:</span><br/> <span style=\"color:#6a6a8a\">← 이 사이 → 완벽 엄폐</span><br/><span style=\"color:#e8a0a0\">나쁜 예:</span><br/> <span style=\"color:#6a6a8a\">← 이 노출 → 엄폐 실패</span></div></div></details><details id=\"sec-1-22\" open=\"\"><summary data-section-id=\"sec-1-22\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8a0e0\">4.14~4.15 모드별 상태창 / D-day 카운트다운</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:8px\">4.14 상태창을 상황(모드)에 따라 전환하라</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\">기본 상태창 ( 모드): <br/>[시간] | LV[n] | [n] [now]/[max] | <br/> [items] | <br/>:캐릭터(단계/n) 전투 상태창 <br/>( 모드): <br/>*시간 *장소 | 캠페인명 | 작전 목표 *전투 지도 아군 | E% | 몸상태 | 행동 <br/><span style=\"color:#e8c8a0\">전환 규칙:</span><br/>전투 시작 → BATTLE 출력, INFO 중지 전투 종료 → INFO 복귀, BATTLE 중지 <br/><span style=\"color:#6a6a8a\">→ 두 상태창을 동시에 출력하지 않는다</span></div><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:8px\">4.15 D-day 카운트다운으로 이벤트 임박감을 표시하라</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"> 필드: 이변 발생 전: D-7, D-6, ... D-1 (카운트다운) <br/>이변 발생 중: 이변명 표시 (예: \"만물절도\") <br/>이변 해결 후: 다음 이변 D-day로 전환 <br/>예시: : D-3 → : 만물절도 → : D-5 (천지반전까지)</div></div></details><details id=\"sec-1-23\" open=\"\"><summary data-section-id=\"sec-1-23\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8a0e0\">4.16~4.18 마크업 인식 / 부위별 추적 / 미디어 UI</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:8px\">4.16 서술 마크업의 캐릭터 인식 규칙을 정의하라</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\">\"대사\" = 다른 캐릭터가 인식 가능 *행동묘사* = 관찰 가능한 행동 (시각적 인식) (속마음) = 캐릭터가 인식 불가능 <br/>예시: \"**철수 |** 안녕!\" *병신ㅋㅋ* <br/><span style=\"color:#6a6a8a\">→ 다른 캐릭터는 \"안녕!\"만 인식, *병신ㅋㅋ*는 인식 불가</span></div><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:8px\">4.17 부위별/세부 상태를 분리 추적하라</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0e8c8\"># 효과적 (부위별 분리)</span><br/> | {상태:질}: 정액이 흘러내리는 중 <br/> | {상태:입}: 정액 맛이 아직 남아있음 <br/> | {상태:가슴}: 유두가 세워진 상태, 체온 상승 <br/><span style=\"color:#e8a0a0\"># 비효과적 (단일 상태)</span><br/>상태: 흥분 상태 <span style=\"color:#6a6a8a\">→ 어떤 부위가 어떤 상태인지 구체적이지 않음</span></div><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:8px\">4.18 미디어 UI는 완성 양식 + 콘텐츠 규칙으로 정의하라</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#e8c8a0\">¶ 양식 (고정)</span><br/>|LIVE| |제목| |이미지| |: 스트리머 이름| <br/>|: 누적 후원액| |구독자: n명 / 시청자: n명| |[닉네임]: 채팅 내용| <br/><span style=\"color:#e8c8a0\">¶ 콘텐츠 규칙 (생성 기준)</span><br/>채팅: 8개 이상 + 후원 1개 출력 닉네임: 유동(ㅇㅇ(IP)), 반고닉, 고정닉 혼재</div></div></details><details id=\"sec-1-24\" open=\"\"><summary data-section-id=\"sec-1-24\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8a0e0\">4.19~4.21 유동 구조 / 품질 체크리스트 / 누적 DB</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:8px\">4.19 상황별 유동 구조를 설계하라</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#a0e8c8\">기본 구조 (일상/대화):</span><br/>① 환경/분위기 → ② 캐릭터 내면 → ③ 대화/행동 → ④ 감각 → ⑤ 진행 <br/><span style=\"color:#e8a0a0\">긴장 구조 (전투/추격):</span><br/>① 행동 → ② 감각(촉각/청각 우선) → ③ 짧은 대사 → ④ 결과/진행 <br/><span style=\"color:#c8a0e0\">감정 구조 (고백/이별/갈등):</span><br/>① 내면 독백 → ② 표정/신체 언어 → ③ 대사 → ④ 침묵/여운</div><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:8px\">4.20 \"품질 체크리스트\"는 포함 요소 지시로 대체하라</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#e8a0a0\"># 비효과적</span><br/>✓1000자+ ✓감각3+ ✓감정깊이 <span style=\"color:#6a6a8a\">→ AI는 출력 후 체크리스트를 \"확인\"하지 않음</span><br/><span style=\"color:#a0e8c8\"># 효과적 (포함 요소 직접 지시)</span><br/>매 응답 필수 포함: <br/>감각: 5감 중 최소 2개 <br/>캐릭터: 내면 독백 1회 이상 <br/>환경: 현재 장소의 감각적 디테일 1개 이상</div><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:8px\">4.21 누적 데이터베이스 — 상태창 정보를 영구 보존하라</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\">[Info] 블록 규칙: <br/>위치: 응답 최하단 고정 <br/>등록: 캐릭터/정보가 처음 출현 시 추가 <br/><span style=\"color:#e8a0a0\">삭제: 금지</span><br/>— 퇴장·사망해도 목록에서 제거하지 않음 <br/>갱신: 호감도/상태 등 변동값만 갱신, 기존 데이터 보존</div></div></details><details id=\"sec-1-25\" open=\"\"><summary data-section-id=\"sec-1-25\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8a0e0\">4.22~4.24 이미지 배치 / 맥락별 품질 / 모드별 문장구조</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:8px\">4.22 이미지 배치 — 연속 이미지 금지, 텍스트 분리 필수</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\">이미지 배치 규칙: 위치: 대응하는 텍스트 블록 직전 상단 <br/><span style=\"color:#e8a0a0\">인접 금지:</span> 이미지 2장이 연속 배치 금지 → 사이에 텍스트 필수 <br/>최소: 응답당 1장 필수 <br/>추가: 감정/자세에 유의미한 변화가 있을 때만</div><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:8px\">4.23 맥락별 출력 품질 기준을 분리하라</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\">출력 품질 기준: <br/>서사 묘사(지문/나레이션): 문학적 깊이 우선, 은유/오감 묘사 채팅/메신저 <br/>UI: 현실감 우선, 줄임말/오타/비격식 허용 시스템 <br/>로그/상태창: 정보 밀도 우선, 장식적 묘사 배제</div><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:8px\">4.24 모드별 문장 구조(Syntax) 자체를 전환하라</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\"><span style=\"color:#e8a0a0\">전투/위기 모드 (Mode_High):</span><br/>트리거: {위협, 전투, 부상, 도주, 피, 충돌} 짧은 단문 위주, <br/>접속사/수식어 최소화, 동사·명사 중심 <br/>예시: \"뒤로. 벽. 등이 부딪혔다. 손이 미끄러졌다. 칼이 떨어졌다.\" <br/><span style=\"color:#a0e8c8\">일상/분석 모드 (Mode_Low):</span><br/>트리거: {휴식, 대화, 심문, 조사, 이동, 정비} 복문/중문 허용, 감각 묘사 고해상도 <br/>예시: \"커피 잔에 낀 기름막이 형광등 빛을 반사했다.\" <br/><span style=\"color:#e8c8a0\">전환 규칙:</span><br/>트리거 키워드 기반 자동 전환 혼합 <br/>금지: 전투 중 일상 톤 사용 금지</div></div></details><details id=\"sec-1-26\" open=\"\"><summary data-section-id=\"sec-1-26\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8a0e0\">4.25~4.27 세트 단위 / 생리적 순서 / 캐릭터별 대사 형식</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:8px\">4.25 출력을 \"세트 단위\"로 구조화하라</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\">1세트 = [나레이션 1~3문장] + [이미지 1장] + [캐릭터 \"대사\"] <br/>규칙: 상황에 필요한 수만큼 세트를 반복 출력 <br/>예시: <br/>[나레이션] 문이 열리며 찬바람이 들어왔다. <br/>[이미지] ![](캐릭터A 코드) <br/>\"캐릭터A | 늦었잖아.\" <br/>[나레이션] B가 외투를 벗으며 자리에 앉았다. <br/>[이미지] ![](캐릭터B 코드) <br/>\"캐릭터B | ...길이 막혔어.\"</div><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:8px\">4.26 캐릭터 반응의 생리적 순서를 고정하라</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6;margin-bottom:12px\"><span style=\"color:#e8c8a0\">반응 순서 규칙 (MANDATORY):</span><br/>① 반사(Reflex): 의식 이전의 신체 반응 (움찔/눈 깜빡) <br/>② 감각(Sensory): 자극의 물리적 정보 (빛/소리/냄새) <br/>③ 정지(Pause): 인식 처리 시간 (짧은 침묵/멈춤) <br/>④ 반응(Speech): 의식적 판단 결과 (대사/행동) <br/>예시 (갑자기 문이 열린 상황): <br/>① *어깨가 움찔했다.* <br/>② *차가운 바람과 함께 비 냄새가 밀려들었다.* <br/>③ *0.5초의 침묵.* <br/>④ \"...늦었잖아.\"</div><div style=\"font-size:12px;font-weight:bold;color:#a0c8e8;margin-bottom:8px\">4.27 캐릭터별 대사 출력 형식을 분기 정의하라</div><div style=\"background-color:#13131e;border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-family:monospace,monospace;font-size:11px;color:#b0b0c8;line-height:1.6\">대사 형식: <br/>캐릭터 A(엘린): \"이름 | 대사\" 예시: \"엘린 | 그건 아닌 것 같아.\" <br/>캐릭터 B(이브): &lt;&lt;이름&gt;&gt; \"대사.\" 예시: &lt;&lt;이브&gt;&gt; \"그건 아닌 것 같아.\" <br/>서술자: *이탤릭 텍스트*</div></div></details><details id=\"sec-1-27\" open=\"\"><summary data-section-id=\"sec-1-27\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c8a0e0\">4.28~4.30 시퀀스 다변화 / 블록 분량 / 대사 이중 포맷</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;borde
