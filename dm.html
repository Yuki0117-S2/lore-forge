<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram DM</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --col-indigo: #8889CD;
    --col-pink:   #DDAACC;
    --col-sand:   #CCAA88;
    --col-rose:   #BB6688;
  }

  body {
    background: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 900px;
  }

  .chat-wrap {
    width: 100%;
    max-width: 420px;
    min-height: 900px;
    background: #fff;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .chat-header {
    background: #fff;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #efefef;
  }

  .back-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #262626;
    font-size: 22px;
    line-height: 1;
    padding: 4px;
  }

  .header-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #ccc;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
  }

  .header-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .header-username {
    font-size: 14px;
    font-weight: 600;
    color: #262626;
    line-height: 1.2;
  }

  .header-status {
    font-size: 12px;
    color: #8e8e8e;
    line-height: 1.2;
  }

  .header-actions {
    display: flex;
    gap: 14px;
    color: #262626;
  }

  .header-actions svg {
    width: 24px; height: 24px;
    fill: none; stroke: #262626;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    cursor: pointer;
  }

  /* Messages */
  .messages {
    flex: 1;
    padding: 14px 14px 70px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow-y: auto;
  }

  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    max-width: 100%;
  }

  /* 상대방 메시지 */
  .msg-row.other { flex-direction: row; }

  .msg-row.other .bubble {
    background: #efefef;
    color: #262626;
    border-radius: 18px;
  }

  /* 내 메시지 */
  .msg-row.me {
    flex-direction: row-reverse;
  }

  .msg-row.me .bubble {
    background: var(--col-indigo);
    color: #fff;
    border-radius: 18px;
  }

  .msg-row.me .meta {
    align-items: flex-end;
  }

  /* 아바타 — DM에서는 1:1이므로 숨김 처리 */
  .msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #ccc;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    align-self: flex-start;
  }

  /* 이름 + 말풍선 묶음 */
  .msg-content {
    display: flex;
    flex-direction: column;
    gap: 2px;
    max-width: 72%;
  }

  .msg-name {
    font-size: 12px;
    color: #8e8e8e;
    margin-bottom: 1px;
    padding-left: 4px;
    display: none;
  }

  .bubble {
    padding: 8px 14px;
    font-size: 14px;
    line-height: 1.4;
    word-break: break-word;
    max-width: 100%;
    display: inline-block;
  }

  .meta {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding-bottom: 2px;
    min-width: 32px;
  }

  .msg-time {
    font-size: 11px;
    color: #8e8e8e;
    white-space: nowrap;
  }

  /* 발신자 변경 시 간격 */
  .msg-row:not(.cont) { margin-top: 10px; }
  .msg-row:not(.cont):first-child { margin-top: 0; }

  /* 연속 메시지 */
  .msg-row.cont { margin-top: 3px; }
  .msg-row.cont .msg-avatar { opacity: 0; }

  /* 읽음 표시 */
  .seen-label {
    text-align: right;
    font-size: 11px;
    color: #8e8e8e;
    padding: 2px 4px 0;
  }

  /* Input bar */
  .input-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 420px;
    background: #fff;
    border-top: 1px solid #efefef;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .input-btn {
    background: none; border: none;
    cursor: pointer; color: #262626;
    padding: 4px;
    display: flex; align-items: center; justify-content: center;
  }

  .input-btn svg {
    width: 24px; height: 24px;
    fill: none; stroke: #262626;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .input-field {
    flex: 1;
    background: transparent;
    border: 1px solid #dbdbdb;
    border-radius: 22px;
    padding: 8px 14px;
    font-size: 14px;
    color: #262626;
    font-family: inherit;
    outline: none;
  }

  .input-right {
    display: flex;
    gap: 10px;
  }
</style>
</head>
<body>
<div class="chat-wrap">
  <div class="chat-header">
    <button class="back-btn">‹</button>
    <div class="header-avatar" id="header-avatar">U</div>
    <div class="header-info">
      <div class="header-username" id="header-username">username</div>
      <div class="header-status" id="header-status"></div>
    </div>
    <div class="header-actions">
      <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.86 19.86 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.86 19.86 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.13.81.37 1.61.7 2.36a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.75.33 1.55.57 2.36.7a2 2 0 011.72 2.01z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M15.1 1.81a2 2 0 012.28-.47l4.5 2A2 2 0 0123 5.18v13.64a2 2 0 01-1.12 1.8l-4.5 2a2 2 0 01-2.28-.47L12 18.5V5.5l3.1-3.69z"/><rect x="1" y="5" width="11" height="14" rx="2"/></svg>
    </div>
  </div>

  <div class="messages" id="messages">
  </div>

  <div class="input-bar">
    <button class="input-btn">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
    </button>
    <input class="input-field" placeholder="메시지 보내기..." readonly="readonly"/>
    <div class="input-right">
      <button class="input-btn">
        <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
      </button>
      <button class="input-btn">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </button>
    </div>
  </div>
</div>
</body>
</html>
