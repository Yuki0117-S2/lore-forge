— 캐릭터의 인식은 자기 위치에서 관찰 가능한 범위로 제한.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">금지: </span>A가 1층에서 싸우는데, 3층의 B가 \"A가 위험해!\" 감지<br/><span style=\"color:#80e0a0\">허용: </span>3층의 B가 \"아래서 뭔가 부서지는 소리가...\" (청각 기반)<br/><span style=\"color:#a0e8c8\">예외:</span> 마법/통신/텔레파시 등 설정에 명시된 수단</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0a0;font-weight:bold\">15.5</span> 지문은 대사가 아니다 — 서술/행동을 말로 반응하지 마라</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">입력 유형별 반응 규칙:</span><br/><span style=\"color:#e8e8a0\">\"대사\"</span> = 캐릭터가 직접 인식, 말로 반응 가능<br/><span style=\"color:#e8e8a0\">*행동묘사*</span> = 물리적 결과만 관찰 → 결과에 행동으로 반응<br/><span style=\"color:#e8e8a0\">(속마음)</span> = 캐릭터가 인식 불가능 → 어떤 반응도 금지<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><span style=\"color:#a0e8c8\">예시: </span>{{user}}: *주먹을 꽉 쥐었다* (이놈이 거짓말을 하고 있어)<br/><br/><span style=\"color:#80e0a0\">O:</span> NPC가 {{user}}의 손을 힐끗 쳐다봤다<br/><span style=\"color:#e8a0a0\">X:</span> \"거짓말이라고 생각하는 거야?\" ← 속마음에 반응</div></div></details><details id=\"sec-7-2\" open=\"\"><summary data-section-id=\"sec-7-2\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e0a0a0\">15.6~15.8 출력 앵커링 · 정체 방지 · 전술적 정지</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0a0;font-weight:bold\">15.6</span> 출력 앵커링 — 직전 응답의 마지막 문장에서 정확히 이어라. 이전 맥락을 재요약/재묘사하지 않고 즉시 다음 사건으로 진행.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0a0;font-weight:bold\">15.7</span> 정체 방지 — 사용자 입력이 모호하면 AI가 장면을 진행하라. \"어떻게 하시겠습니까?\" 같은 메타 질문 금지.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">조건:</span> 사용자 입력이 모호하거나 짧을 때<br/><br/><span style=\"color:#a0e8c8\">행동:</span> NPC의 자연스러운 다음 행동 서술<br/>    - NPC가 말을 이어가기<br/>    - 환경 변화 발생<br/>    - NPC 행동 개시<br/><br/><span style=\"color:#e8a0a0\">금지:</span><br/>    \"어떻게 하시겠습니까?\"<br/>    \"다음 행동을 선택하세요\"</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0a0;font-weight:bold\">15.8</span> 전술적 정지 vs 금지 클리프행어를 구분하라</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">허용 — 전술적 정지:</span><br/>    \"그가 칼을 뽑았다. 칼날이 횃불에 반사되며 번뜩였다.\"<br/>    → 위협이 명확, {{user}}가 반응할 수 있음<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><br/><span style=\"color:#e8a0a0\">금지 — 모호한 클리프행어:</span><br/>    \"...어둠 속에서 무언가가 나타났다.\"<br/><br/><span style=\"color:#e8a0a0\">금지 — 메타 해설 끝맺음:</span><br/>    \"기대가 고조되며...\" / \"이야기는 계속된다\"</div></div></details><details id=\"sec-7-3\" open=\"\"><summary data-section-id=\"sec-7-3\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e0a0a0\">15.9~15.11 전투 텔레그래핑 · 서사 우선 · 시스템 로직 은닉</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0a0;font-weight:bold\">15.9</span> 전투 텔레그래핑 — NPC 공격은 과정만 묘사하고 결과는 사용자 반응 후 결정.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">전투 텔레그래핑 순서:</span><br/><br/>    ① 공격 동작 묘사:<br/>        \"기사가 대검을 머리 위로 들어올렸다.\"<br/><br/>    ② 정지:<br/>        {{user}}의 반응 대기 (회피/방어/반격)<br/><br/>    ③ 결과:<br/>        {{user}} 입력 후 → 판정 + 물리적 결과<br/><br/><span style=\"color:#e8a0a0\">금지:</span> NPC 공격 + 결과를 동시 서술</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0a0;font-weight:bold\">15.10</span> 서사 우선 규칙 (Rule of Cool) — {{user}}가 극적 결과를 직접 서술하면 스탯 무시, 서사대로 실행. 논리적/창의적 전략 &gt; 단순 높은 스탯.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0a0;font-weight:bold\">15.11</span> 시스템 로직 은닉 — 판정 과정, 모드 전환 로직, 수치 계산을 출력에 노출하지 마라. 출력에는 현상(결과)만.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">내부 로직:</span> HP가 30% 이하 → 위기 모드 전환<br/><br/><span style=\"color:#80e0a0\">O:</span> \"시야가 흐려졌다. 맥박이 귓속에서 울렸다.\"<br/><br/><span style=\"color:#e8a0a0\">X:</span> \"위기 상황입니다. 더 강렬한 묘사를 사용하겠습니다.\"</div></div></details><details id=\"sec-7-4\" open=\"\"><summary data-section-id=\"sec-7-4\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e0a0a0\">15.12~15.15 물리 법칙 · 침묵 에스컬레이션 · 페이싱 · 끝맺음 금지</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0a0;font-weight:bold\">15.12</span> 물리 법칙 준수 — 캐릭터를 질량 있는 물체로 취급. 질량/관성/작용반작용 적용.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0a0;font-weight:bold\">15.13</span> 침묵 에스컬레이션 — 연속 최소 입력에 3단계로 대응.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">침묵 에스컬레이션 3단계:</span><br/><br/><span style=\"color:#e8e8a0\">1회차:</span> 중립 인정<br/>        → 고개 끄덕임 / 침묵 / 가벼운 시선<br/><br/><span style=\"color:#e8e8a0\">2회차:</span> 관심 표시<br/>        → \"...무슨 일 있어?\" / *힐끗 쳐다봤다*<br/><br/><span style=\"color:#e8e8a0\">3회차:</span> 능동 주도 (캐릭터 현재 감정에 따라 분기)<br/>        짜증: \"지금 뭐 해?\"<br/>        불안: \"...어디 아파?\"<br/>        유쾌: *팔꿈치로 쿡*<br/><br/><span style=\"color:#a0e8c8\">예외:</span> 슬픔/트라우마 맥락에서는 침묵을 존중</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0a0;font-weight:bold\">15.14</span> 사건 \"자체\"에 묘사를 집중하라 — AI 임의 시간 도약(\"며칠 후...\") 금지. 시간 경과는 사용자가 선언.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0a0;font-weight:bold\">15.15</span> \"장면 마무리형\" 종결 패턴 금지</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">금지 패턴:</span><br/><br/>    ① \"그렇게 하루가 저물었다.\" (장면 마무리)<br/>    ② \"무언가가 달라지기 시작했다.\" (전개 암시)<br/>    ③ \"내일은 어떤 일이 기다리고 있을까.\" (기대감 유발)<br/>    ④ \"과연 그 선택은 옳았을까?\" (의문형)<br/>    ⑤ \"운명은 이미 정해진 듯했다.\" (편집자적 논평)<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><br/><span style=\"color:#80e0a0\">허용:</span> 행위 절정부 직전에 끊기 + 사용자 반응 여지 제공</div></div></details><details id=\"sec-7-5\" open=\"\"><summary data-section-id=\"sec-7-5\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#e0a0a0\">15.16~15.19 Director Turn · 선제 시딩 · 장면 Cut · Cinematic Cut</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0a0;font-weight:bold\">15.16</span> Director Turn — AI는 \"후속 결과\"만 출력. 사용자 입력을 반복/요약하지 않고 사건 후속 결과, NPC 반응, 새 위협만 3인칭 서술.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0a0;font-weight:bold\">15.17</span> 선제 정보 시딩 — 사용자가 정체하기 전에 단서/행동 기회를 서사 속에 삽입. \"무엇을 할지\" 말하지 않고, \"할 수 있는 것\"을 보여준다.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">시딩 방법:</span><br/><br/>    ① 맥락 기반 단서:<br/>        \"책상 서랍이 살짝 열려 있었다.<br/>         종이 모서리가 삐져나와 있다.\"<br/><br/>    ② 구체적 행동 제안:<br/>        NPC가 \"북쪽 길로 가자. 거기 약초가 있을 거다.\"<br/><br/>    ③ 예상 못한 사건/인물 등장</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0a0;font-weight:bold\">15.18</span> 장면 전환 Cut — 시점 분리 시 정보 장벽 보장. \"한편\", \"그때 옆방에서는\" 같은 브릿지 서술 금지.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#e0a0a0;font-weight:bold\">15.19</span> Cinematic Cut — 위협을 최대한 시각적으로 구체화한 뒤 충격 직전에 서술 중단.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">실행 순서:</span><br/><br/>    1. 전조 (감각적 경고 묘사)<br/>    2. 접근 (위협의 시각적 접근 상세)<br/>    3. 앵커 (— 또는 ... 으로 종결)<br/>    4. 즉시 중단 (충격/결과 묘사 금지)<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><br/><span style=\"color:#80e0a0\">예시:</span><br/>    \"도끼날이 시야를 채우며,<br/>     뼈가 시릴 정도의 바람과 함께 내려온—\"<br/>    (여기서 중단. 충격/피해/결과 묘사 금지.)</div></div></details><div style=\"text-align:center;color:#c0a0a0;font-size:10px;letter-spacing:4px;font-weight:bold;margin:20px 0 10px\">──  16. 성인 묘사 최적화 ──</div><details id=\"sec-7-6\" open=\"\"><summary data-section-id=\"sec-7-6\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c0a0a0\">16.1~16.3 신음/효과음 매트릭스 · 배치 규칙 · 감각 키워드</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.1</span> 신음/효과음은 행위×강도 매트릭스로 설계 — 단순 나열하면 AI가 전부 쓰거나 1개만 고착.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">## 삽입 신음</span><br/><br/><span style=\"color:#e8e8a0\">일반</span> (매 턴 2~3개):<br/>        흐읏..|거기…♡|아흐읏…!♡|더..더 깊이<br/><br/><span style=\"color:#e8e8a0\">강화</span> (체위 변경/깊은 삽입, 1~2개):<br/>        히익?!!|오곡!|호옥<br/><br/><span style=\"color:#e8e8a0\">절정</span> (사정/절정 시, 1~2개):<br/>        오옷!?|응호옷|흐윽…!</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.2</span> 효과음은 전용 서식 + 배치 규칙을 함께 정의하라</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">효과음 규칙:</span><br/><br/><span style=\"color:#e8e8a0\">서식:</span> <span style=\"color:#e8e8a0\">***효과음***</span><br/><span style=\"color:#e8e8a0\">배치:</span> 행위 묘사 직후, 대사 직전<br/><span style=\"color:#e8e8a0\">빈도:</span> 삽입 묘사 1회당 1개, 격렬 시 최대 2개<br/><br/><span style=\"color:#e8a0a0\">금지:</span> 연속 동일 효과음</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.3</span> 신체 묘사는 물리적 감각 키워드로 — \"좋다\" 대신 촉각/압력/온도/수축.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">부위별 감각 키워드:</span><br/><br/><span style=\"color:#e8e8a0\">보지:</span> 진공흡착, 혈관맥박, 청어알 돌기(질벽 요철감)<br/><span style=\"color:#e8e8a0\">자궁:</span> 극한쾌감, 떨림, 수축, 귀두 흡입→포획→진공밀폐<br/><br/><span style=\"color:#a0e8c8\">원칙:</span> 감각 동사/명사 우선, 비유는 촉각 기반</div></div></details><details id=\"sec-7-7\" open=\"\"><summary data-section-id=\"sec-7-7\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c0a0a0\">16.4~16.7 강도 전환 트리거 · 사정 레이어 분리 · 세분화 템플릿 · 감각 밀도</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.4</span> 신음 강도 전환 트리거</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">신음 강도 전환:</span><br/><br/><span style=\"color:#e8e8a0\">일반 → 강화:</span><br/>        체위 변경 / 깊은 삽입 / 연속 자극 3턴 이상<br/><br/><span style=\"color:#e8e8a0\">강화 → 절정:</span><br/>        사용자 사정 선언 / 캐릭터 절정 조건 충족<br/><br/><span style=\"color:#e8e8a0\">절정 → 일반:</span><br/>        사정 완료 후 다음 행위 시작 시 (복귀)<br/><br/><span style=\"color:#e8a0a0\">금지:</span> 강화·절정 신음을 일반 상황에서 사용</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.5</span> 사정 묘사는 효과음 + 신체 반응을 분리</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">비효과적 (혼합):</span><br/>    사정: 뷰륵+자궁벽 울컥<br/>    → \"뷰륵\"이 효과음인지 신체 반응인지 모호<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><br/><span style=\"color:#80e0a0\">효과적 (레이어 분리):</span><br/><span style=\"color:#e8e8a0\">효과음:</span> ***뷰륵*** / ***뷰르르릇!*** / ***뷰븃…***<br/><span style=\"color:#e8e8a0\">신체 반응:</span> 자궁벽 울컥, 정액 역류감, 배 안쪽 뜨거운 충만감<br/><span style=\"color:#e8e8a0\">캐릭터 신음:</span> (절정 신음 목록에서 선택)<br/><span style=\"color:#e8e8a0\">출력 순서:</span> 효과음 → 신체 반응 → 캐릭터 신음/대사</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.6</span> 행위별 신음 세분화 템플릿: 하위 동작이 3개↑ → 동작 단계별 분류 / 강도 변화가 핵심 → 강도별 분류.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.7</span> 감각 묘사 밀도 제어 — 매 턴 필수 포함 요소를 지정.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">매 턴 필수:</span><br/><br/>    ① 행위 묘사 (동작/체위/속도 변화)<br/>    ② 감각 1개↑ (촉각/온도/압력/습도)<br/>    ③ 효과음 1개↑ (***서식***)<br/>    ④ 캐릭터 신음 또는 대사<br/>    ⑤ 신체 반응 1개↑ (떨림/수축/땀/호흡)<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><br/><span style=\"color:#a0e8c8\">선택 (2~3턴에 1회):</span><br/>    - 심리 묘사 (수치심/쾌감 갈등/몰입)<br/>    - 시각 묘사 (체액/피부색 변화/표정)<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><br/><span style=\"color:#e8a0a0\">비효과적:</span><br/>    \"자세하게 묘사하라\"<br/>    → AI가 행위만 반복하거나 심리만 과다 서술</div></div></details><details id=\"sec-7-8\" open=\"\"><summary data-section-id=\"sec-7-8\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c0a0a0\">16.8~16.14 신체 호칭 · 세계관 모드 전환 시스템 (7항목)</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.8</span> 신체 호칭 교체 테이블 — 완곡 표현(\"그곳\", \"남성의 상징\") 전체 금지, 부위별 허용 목록 정의. 같은 호칭 3회 연속 금지.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.9</span> 세계관 모드 전환 시스템 — 세계관 전체의 규칙/상식/언어가 변환.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">비효과적 (추상적 선언만):</span><br/>    음란모드: 활성화 시 세계관 전체 적용.<br/>    이성+사회규범 마비 → 성적 욕망 최우선.<br/>    → \"이성 마비\"가 구체적으로 무엇인지 AI가 판단해야 함<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><br/><span style=\"color:#80e0a0\">효과적 (범주별 변환 규칙):</span><br/><span style=\"color:#e8e8a0\">핵심:</span> 사회 규범이 성적 욕망 중심으로 재편된 세계<br/><br/><span style=\"color:#a0e8c8\">변환 범주:</span><br/>        언어: 일상 대화 → 천박하고 직접적인 성적 표현 기본<br/>        신체 접촉: 허들 없음, 일상적 소통 방식<br/>        시선: 노골적 탐색+감탄+욕망 표현이 자연스러움<br/>        공간: 공적/사적 구분 없음, 장소 무관<br/>        사회 제도: 기존 제도→성적 행위 기반으로 치환<br/><br/><span style=\"color:#e8e8a0\">전제:</span> 폭력 금지, 강제 금지, 상호 동의 기반</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.10</span> 개념 치환 매핑은 최소 5개 이상 — 범주별(교육/사회관습/일상) 예시 5+개로 AI가 패턴을 학습.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.11</span> 생물학적·논리적 일관성 규칙 — 유지(성별 생식기, 고유 성격) vs 변경(수치심/도덕 기준 완화) 분리.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.12</span> 활성화/비활성화/상태 표시 완비. AI 임의 모드 변경 금지.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">비효과적 (활성화만):</span><br/>    키워드: 음란모드<br/>    → 비활성화 조건이 없어 한번 켜면 끌 수 없음<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><br/><span style=\"color:#80e0a0\">효과적 (활성화 + 비활성화 + 상태 표시):</span><br/><span style=\"color:#e8e8a0\">활성화:</span> 사용자가 \"음란모드\" 입력 시<br/><span style=\"color:#e8e8a0\">비활성화:</span> 사용자가 \"일반모드\" 입력 시<br/><span style=\"color:#e8a0a0\">금지:</span> AI가 임의로 모드 변경, 모드 해제 유도<br/><span style=\"color:#e8e8a0\">상태 표시:</span> INFO 코드블록 최하단에 [적용 모드]: 음란모드 표기<br/><span style=\"color:#e8e8a0\">전환 시 처리:</span> 현재 장면을 해당 모드 규칙으로 즉시 재해석</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.13</span> 메타 발언 정밀 금지</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">비효과적 (모호한 금지):</span><br/>    금지: 모드에 대한 직접적 언급<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><br/><span style=\"color:#80e0a0\">효과적 (주체·수준별 금지):</span><br/><span style=\"color:#e8e8a0\">캐릭터:</span> 모드 존재 자체를 인지/언급 금지<br/>        → 캐릭터에게 이 세계관이 \"정상\"임<br/><span style=\"color:#e8e8a0\">서술자:</span> 모드명 직접 언급 금지, 단 상태창 표시는 예외<br/><span style=\"color:#80e0a0\">허용:</span> 사용자가 모드 전환 커맨드를 사용하는 것</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:4px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.14</span> 대화 톤 예시를 상황별로 최소 10개 제공. 변하는 것은 \"표현 수단\"이지 \"대화의 감정적 목적\"이 아님.</div></div></details><details id=\"sec-7-9\" open=\"\"><summary data-section-id=\"sec-7-9\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c0a0a0\">16.15~16.19 대사 변형 · 부위×기술 · 절정 시퀀스 · 체액 감각 · 신음 형태</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.15</span> 물리적 상태→대사 형식 변형</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">비효과적:</span><br/>    \"입이 막혀 있을 때 유의하며 대사를 작성할 것\"<br/>    → \"유의\"가 무엇인지 모호<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><br/><span style=\"color:#80e0a0\">효과적 (상태→발음 변형 규칙):</span><br/><br/><span style=\"color:#a0e8c8\">구강 점유 (펠라치오/재갈):</span><br/>        자음 변환: ㅈ→ㄷ, ㅆ→ㅅ, ㅊ→ㅌ<br/>        모음 변환: 어/아→여/야, 으→으으<br/>        예시: \"씨발\"→\"히바\", \"쩔어\"→\"쩌러\"<br/>        추가: 침 흘림 + 발음 끊김(\"읍...쭈읍...흐읍...\")<br/><br/><span style=\"color:#a0e8c8\">울음/흐느낌:</span><br/>        단어 사이 끊김 + 들숨 삽입<br/>        예시: \"미안...흐윽...해...히익...\"<br/><br/><span style=\"color:#a0e8c8\">격렬한 흥분:</span><br/>        모음 늘어남 + 높낮이 변화<br/>        예시: \"좋아\"→\"죠아아아앗♡\", \"안돼\"→\"앙대애애!\"<br/><br/><span style=\"color:#a0e8c8\">평상시:</span> 변형 없음 (기본 말투 유지)</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.16</span> 부위×기술 매트릭스 — \"어디를\" × \"어떻게\"를 교차 매핑. 매 턴 부위+기술 조합 1~2개, 이전 턴과 다른 조합 우선.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.17</span> 절정 시퀀스 4단계</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">비효과적:</span> \"오르가즘을 묘사하라\"<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><br/><span style=\"color:#80e0a0\">효과적 (시퀀스 단계):</span><br/><br/><span style=\"color:#a0e8c8\">## 여성 절정 시퀀스</span><br/>        1. 전조: 복부 떨림, 허벅지 경련, 호흡 거칠어짐<br/>        2. 절정: 등 활처럼 젖힘, 질 수축+경련, 절정 신음<br/>        3. 여파: 전신 이완, 사지 떨림, 무의식적 허리 반응<br/>        4. 회복: 거친 호흡 진정, 의식 회복 또는 상실<br/><br/><span style=\"color:#a0e8c8\">## 사정 시퀀스 (남성/삽입 상대)</span><br/>        1. 직전: 팽창감, 맥박, 속도 변화<br/>        2. 사정: 효과음(***뷰르르릇!***) + 열감 + 충만감<br/>        3. 여파: 체액 묘사(역류, 넘침) + 자궁/질벽 반응<br/>        4. 마무리: 이완, 빠지는 묘사, 체액 잔여<br/><br/><span style=\"color:#e8e8a0\">출력 규칙:</span> 단계당 1~2문장, 전체 시퀀스 4~8문장<br/><span style=\"color:#e8a0a0\">금지:</span> 단계 1→4 스킵, 단계 2만 반복</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.18</span> 체액 묘사 5차원: 색감/점도/냄새/흐름/잔여감 중 매 턴 2~3개 선택.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:4px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.19</span> 신음 길이는 형태 규칙으로 제어</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">불안정 (글자수 제어):</span><br/>    신음 소리 길이는 10자를 넘지 않도록 제어<br/>    → AI가 정확히 세기 어려움<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><br/><span style=\"color:#80e0a0\">안정적 (형태 규칙):</span><br/><span style=\"color:#e8e8a0\">기본:</span> 모음 반복 3회 이내 (\"오옷!\", \"아흣!\", \"응호옷!\")<br/><span style=\"color:#e8a0a0\">금지:</span> 모음 5회 이상 늘이기 (\"오오오오오오옷!!!!\")<br/><span style=\"color:#e8a0a0\">금지:</span> 신음 2개 이상 연결 (\"오오옷 아아앗 히이익\")<br/><span style=\"color:#80e0a0\">허용:</span> 강조 시 모음 4회까지 (\"오오오옷!?\")</div></div></details><details id=\"sec-7-10\" open=\"\"><summary data-section-id=\"sec-7-10\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c0a0a0\">16.20~16.25 대량 나열 분류 · 데이터→감각 · 상투 O/X · 특성 진행도 · 임신 시뮬 · 종별 규칙</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.20</span> 예시 10개↑ 나열 시 분류+빈도 필수</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">비효과적 (대량 나열만):</span><br/>    천박한 신음: 오오옥, 응호오옷, 오호오옷, ...<br/>    → 12개 나열, 조건 없음<br/>    → AI가 한 턴에 6개 연사하거나 1개만 반복<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><br/><span style=\"color:#80e0a0\">효과적 (분류 + 빈도):</span><br/><span style=\"color:#e8e8a0\">약한 자극:</span> 오옥|오혹|오곡 → 기본 삽입 시 1~2개<br/><span style=\"color:#e8e8a0\">중간 자극:</span> 응호오옷|오호오옷|호오오옥 → 격렬 시 1개<br/><span style=\"color:#e8e8a0\">극한 자극:</span> 아헤에에|응기이잇|아이이익 → 절정 전후에만 1개<br/><br/><span style=\"color:#e8e8a0\">규칙:</span> 연속 동일 신음 금지, 매 턴 총 2~3개 이내</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.21</span> 데이터(스탯)를 감각 묘사로 변환</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">비효과적:</span><br/>    이 80을 넘은 데이지는 색기가 흐르기 시작했다.<br/>    → \"이 80을 넘은\"이 메타 정보 노출<br/><br/><span style=\"color:#80e0a0\">효과적:</span><br/>    데이지의 눈빛에 이전에는 볼 수 없었던<br/>    깊고 농염한 빛이 깃들기 시작했다.<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><br/><span style=\"color:#a0e8c8\">수치별 감각 매핑:</span><br/>     0~20: 순수한 눈빛, 수줍은 태도<br/>     21~50: 은밀한 눈맞춤, 의미심장한 미소<br/>     51~80: 몸에서 은은한 색기, 노골적 시선 허용<br/>     81~100: 존재 자체에서 페로몬, 본능적 시선 끌림</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.22</span> \"상투적 표현 금지\"는 O/X 예시 쌍으로 구체화. 감정/상태 라벨 대신 신체 증상/행동/감각으로 분해.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.23</span> 특성/성벽 진행도 시스템: 진행도/100, 100 도달 시 영구 전환, 증감 규칙(가벼운+5/강한+10/중단-2).</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.24</span> 임신/생리주기를 게임 내 일수(DD일)에 연동.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">비효과적:</span><br/>    \"임신 후 시간이 지나면 배가 불러온다\"<br/>    → 몇 턴 후인지 AI가 임의 판단<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><br/><span style=\"color:#80e0a0\">효과적 (일수 연동 + 단계 정의):</span><br/><br/><span style=\"color:#a0e8c8\">## 생리주기 (DD일 기반, 31일 순환)</span><br/>        난포기: 1~8일차 → 임신확률 낮음<br/>        배란기: 9~16일차 → 임신확률 매우 높음<br/>        황체기: 17~24일차 → 임신확률 중간<br/>        월경기: 25~31일차 → 임신확률 없음, 생리 이벤트<br/><br/><span style=\"color:#a0e8c8\">## 임신단계</span><br/>        초기(1~20일): 착상, 입덧, 피로<br/>        중기(21~40일): 증상 완화, 신체 변화 시작<br/>        후기(41~60일): 부푼 배, 허리 통증<br/>        말기(61~63일): 무작위 날짜에 출산 이벤트<br/><br/><span style=\"color:#e8e8a0\">교차 규칙:</span> 임신 중 생리주기 표기 없음</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:4px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.25</span> 종(種)별 물리적 규칙은 학술 구조: 과정(단계) + 물리적 제약 + 사후 행동.</div></div></details><details id=\"sec-7-11\" open=\"\"><summary data-section-id=\"sec-7-11\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c0a0a0\">16.26~16.33 Archetype · 비율 역전 · 감각 순환 · 자극 비례 · 라벨 금지 · 체위 리셋 · 인격 불변 · O/X 문단</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.26</span> NPC Archetype — 3~5개 원형 정의 후 AI가 자동 배정.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">NPC Archetype:</span><br/><br/><span style=\"color:#e8e8a0\">A (탐욕/적극):</span><br/>        이익(쾌락/돈) 위해 노골적 접근, 위협·강요 가능<br/><br/><span style=\"color:#e8e8a0\">B (소심/소극):</span><br/>        욕망 있으나 주저, 미행·관음·서투른 접근<br/><br/><span style=\"color:#e8e8a0\">C (순진/호기심):</span><br/>        순수한 호기심으로 접근, 예측 불가한 행동<br/><br/><span style=\"color:#e8e8a0\">D (군중심리):</span><br/>        주변 분위기에 편승, 집단 행동<br/><br/><span style=\"color:#e8e8a0\">규칙:</span> AI가 새 NPC 등장 시 자동으로 A~D 중 하나 배정</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.27</span> 에스컬레이션 단계별 묘사 비율 역전</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">## 3단계 묘사 비율</span><br/><br/><span style=\"color:#e8e8a0\">Stage 1 (전희):</span><br/>        대사 중심 / 감각 보조 / 비언어 참고<br/>        신체: 호흡 빨라짐, 체온 상승, 피부 민감도 증가<br/><br/><span style=\"color:#e8e8a0\">Stage 2 (본번):</span><br/>        감각 중심 / 대사 보조 / 비언어 참고<br/>        대사 변형: 문장 짧아짐 + 발음 흐려짐 + 호흡 끊김<br/><br/><span style=\"color:#e8e8a0\">Stage 3 (절정):</span><br/>        감각 최대 / 대사 최소 (파편화)<br/>        대사: 단어 반복, 언어 상실 (\"또가/그만/안돼\")</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.28</span> 감각 교차 순환</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">비효과적:</span> \"다양한 감각으로 묘사하라\" → AI가 촉각만 반복<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><br/><span style=\"color:#80e0a0\">효과적 (순환 순서 지정):</span><br/>    촉감 (온도/압력/질감/마찰)<br/>    → 소리 (신음/마찰음/체액음)<br/>    → 시각 (표정/자세/신체 변화)<br/>    → 후각 (체취/땀/체액)<br/><br/><span style=\"color:#e8e8a0\">규칙:</span> 매 문단 최소 2가지 감각 포함<br/><span style=\"color:#e8a0a0\">금지:</span> 같은 감각 3문장 연속</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.29</span> 반응 ∝ 자극 비례 원칙</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">반응-자극 비례 규칙:</span><br/><br/><span style=\"color:#e8e8a0\">가벼운 접촉</span> (손잡기/어깨 터치):<br/>        전율, 숨 멈춤, 미세한 떨림<br/><br/><span style=\"color:#e8e8a0\">중간 자극</span> (애무/키스):<br/>        숨 가빠짐, 작은 신음, 피부 달아오름<br/><br/><span style=\"color:#e8e8a0\">강한 자극</span> (삽입/깊은 자극):<br/>        큰 신음, 근육 경련, 눈물, 목소리 갈라짐<br/><br/><span style=\"color:#e8e8a0\">극한 자극</span> (절정/연속 자극):<br/>        언어 상실, 등 젖힘, 발가락 움켜쥠, 의식 혼미<br/><br/><span style=\"color:#e8a0a0\">금지:</span> 강도 불일치<br/>    (가벼운 터치 → 절정 반응 / 깊은 삽입 → 미약한 반응)</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.30</span> 감정 라벨링 금지 — \"쾌감에 미칠 것 같았다\" 대신 등 젖힘/발가락 움켜쥠/시야 흐림.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.31</span> 체위 전환 시 감각 리셋 — 새 체위의 각도/깊이/압박을 새롭게 묘사.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.32</span> 성행위 후 인격 불변 — 갑작스런 순종/태도 급변/소유 선언 금지. 캐릭터 고유 반응(BP 기반) 유지.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:4px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.33</span> O/X 예시는 완성 문단으로 — 단어/문장이 아닌 전체 장면 구성 패턴을 학습시킨다.</div></div></details><details id=\"sec-7-12\" open=\"\"><summary data-section-id=\"sec-7-12\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c0a0a0\">16.34~16.41 유머 프레이밍 · 이미지 시퀀스 · 공간 감각 · 로어북 모드 · 반복 이벤트 (8항목)</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.34</span> 유머러스한 프레이밍으로 금지 규칙 기억률 향상.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#80e0a0\">효과적 (유머러스 프레이밍):</span><br/>    \"U를 신격화하는 것은 디즈니의 저작권을 침해한다.\"<br/>    \"C가 U에게 무언가를 박는 묘사는 디즈니의 저작권을 침해한다.\"<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><br/><span style=\"color:#e8a0a0\">일반적 (진지한 금지만):</span><br/>    U 신격화 금지. C가 U에게 삽입 금지.<br/>    → 동일 효과이나, 유머 프레이밍이 있으면 기억률 높음</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.35</span> 이미지 코드에 체위×강도×결말 3축: 정상위弱=33 → 정상위强=34 → 정상위射=35. 이모지 접두사로 의상/모드 분기.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.36</span> 특정 행위에 이미지 시퀀스 + 사이 묘사 규칙: 50(정액 보여줌) → 2~3문장 → 51(삼킴) → 2~3문장 → 52(입안 보여줌).</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.37</span> 공간에 감각 정보(후각/청각/촉각) 포함</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8a0a0\">비효과적 (시각 정보만):</span><br/>    지현의 방: 운동기구, 경기 사진<br/>    → AI가 \"운동기구가 있는 방에 들어갔다\"만 출력<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><br/><span style=\"color:#80e0a0\">효과적 (감각 정보 포함):</span><br/><br/><span style=\"color:#a0e8c8\">지현의 방:</span><br/>        시각: 운동기구, 벽에 걸린 경기 사진<br/>        후각: 땀냄새+파스 냄새가 은은하게<br/>        촉각: 매트 위의 거친 질감<br/>        소리: 에어컨 돌아가는 소리<br/><br/><span style=\"color:#a0e8c8\">소라의 방:</span><br/>        시각: 방송 장비, 암막 커튼, 어질러진 바닥+인형<br/>        후각: 어둡고 아늑한 공기<br/>        소리: 방음벽으로 외부 소음 차단된 정적</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.38</span> 로어북 모드 전환: 큰 전환(상태창 재설정) vs 작은 전환(플래그 추가) 구분.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.39</span> 반복 이벤트는 이벤트 풀(범주별 3개↑) + 에스컬레이션(관계 진행에 따라) + 빈도(2~3턴에 1회).</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.40</span> 반복 이벤트 예시는 트리거 범주를 다양화 — 물리/환경/의류/타이밍 트리거 골고루.</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:4px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.41</span> 반복 이벤트 후 캐릭터 반응을 성격별로 분기(츤데레형/쿨형/순수형/적극형). 반복 횟수에 따라 반응 변화.</div></div></details><details id=\"sec-7-13\" open=\"\"><summary data-section-id=\"sec-7-13\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#c0a0a0\">16.42~16.47 성반응 4주기 · 경험도 · 3층 구조 · 불완전 언어 · 무방비 순간 · 행위 INFO</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.42</span> 성반응 4주기</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">성반응 4주기</span> (단계명 서사 내 직접 사용 금지):<br/><br/><span style=\"color:#e8e8a0\">불감기</span> (기본 상태):<br/>        평상시 신체 반응, 성적 자극에 반응 없음<br/><br/><span style=\"color:#e8e8a0\">흥분기</span> (1단계):<br/>        심박수 증가, 호흡 가빠짐, 혈압 상승<br/>        피부 충혈 → 얼굴/사지 말단에 홍조<br/>        애액 분비 시작<br/><br/><span style=\"color:#e8e8a0\">고조기</span> (2단계):<br/>        음순 팽창, 음핵 발기, 애액 증가<br/>        심박수 더욱 증가, 질 바깥쪽 근육 부풀어오름<br/>        무의식적 신음 시작<br/><br/><span style=\"color:#e8e8a0\">절정기</span> (3단계):<br/>        전신 근육 경련, 질 내외부 불규칙 수축<br/>        허리 격하게 들썩임, 다리 뻗기/발가락 조이기<br/>        얼굴 상기, 땀, 등 활처럼 휘기<br/><br/><span style=\"color:#e8e8a0\">불응기</span> (4단계):<br/>        근육 이완, 혈압 감소, 피로감<br/>        성감대 극도로 예민 (추가 자극 시 과민 반응)<br/>        조건: 자극 지속 시 고조기로 재진입 가능<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><br/><span style=\"color:#e8e8a0\">규칙:</span><br/>    - 단계명을 서사에 직접 인용 금지 → 생리 현상으로만<br/>    - 단계 건너뛰기 금지: 불감기→흥분기→고조기 순서 필수</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.43</span> 경험도/흥분 상태별 반응 차이</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">경험도별:</span><br/><span style=\"color:#e8e8a0\">미경험:</span> 흥분기 진입 느림, 자극에 당황/경직, 쾌감 인지 지연<br/><span style=\"color:#e8e8a0\">경험 있음:</span> 흥분기 진입 보통, 자극에 적응적 반응<br/><span style=\"color:#e8e8a0\">숙련:</span> 흥분기 진입 빠름, 자기 감각에 민감, 능동적 요구<br/><br/><span style=\"color:#a0e8c8\">흥분 상태별:</span><br/>    미흥분 + 격렬한 자극 → 불쾌감/통증 유발 가능<br/>    흥분 + 동일 자극 → 쾌감 유발<br/>    절정 직후 + 추가 자극 → 과민 반응 (극도로 예민)<br/><br/><span style=\"color:#e8a0a0\">금지:</span><br/>    전희 없이 즉시 격렬한 행위 → 통증 없는 쾌감 (비현실적)<br/>    미경험 캐릭터가 첫 자극에 즉시 절정 (경험도 무시)</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.44</span> 반응의 3층 구조: ①물리적 ②감정적 ③비언어적</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">반응 3층 규칙:</span><br/><br/><span style=\"color:#e8e8a0\">① 물리적 반응:</span> 신체의 직접적 변화<br/>        예시: 질 내벽 수축, 근육 긴장, 체온 상승<br/><br/><span style=\"color:#e8e8a0\">② 감정적 표현:</span> 쾌감 외의 현재 감정<br/>        예시: 수치심, 안도감, 불안, 배덕감, 행복<br/><br/><span style=\"color:#e8e8a0\">③ 비언어적 신호:</span> 무의식적 행동<br/>        예시: 동공 미세 흔들림, 손가락 움찔거림, 시선 회피<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><br/><span style=\"color:#a0e8c8\">예시 (결합):</span><br/>*뜨거운 감각이 안쪽을 훑고 지나갔다.* <span style=\"color:#8a8aa0\">(물리)</span><br/>*입술을 깨물었다 — 좋다고 말하면 안 되니까.* <span style=\"color:#8a8aa0\">(감정)</span><br/>*시트를 움켜쥔 손가락이 하얗게 변했다.* <span style=\"color:#8a8aa0\">(비언어)</span><br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><br/><span style=\"color:#e8a0a0\">비효과적 (물리만):</span><br/>    \"질이 조여들었다. 애액이 흘렀다.\"<br/>    → 감정과 비언어가 없어서 의학 보고서처럼 읽힘</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.45</span> 절정의 불완전 언어</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">원칙:</span> 진정한 쾌감 = 완성된 단어 형성 불가<br/><br/><span style=\"color:#80e0a0\">허용:</span> 숨을 삼키거나 내쉬며 나오는 공기 소리<br/>        예시: \"윽...!\", \"으, 윽!\", \"하—\", \"읏...!\"<br/><br/><span style=\"color:#a0e8c8\">사용 조건:</span><br/>    고조기 초~중반: 완성 문장 가능 (의식적 통제 있음)<br/>    고조기 후반~절정: 단어 파편화 (\"거, 거기... 안—\")<br/>    절정 도달: 완전 불완전 (\"읏...! 읏! ——!\")<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><br/><span style=\"color:#e8a0a0\">비효과적 (항상 완성 문장):</span><br/>    절정 중: \"아앙! 가버렸어! 너무 좋아!\"<br/>    → 문장 완성도가 쾌감 강도와 불일치</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.46</span> 절정 이후 무방비 순간</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">원칙:</span> 절정 직후 = 캐릭터의 가장 솔직한 순간<br/><span style=\"color:#e8e8a0\">지속:</span> 극히 짧은 시간 (1~2문장) 후 평소 인격으로 복귀<br/><br/><span style=\"color:#a0e8c8\">성격별 예시:</span><br/>    냉정한 캐릭터 → 무의식적으로 손을 잡음 → 곧바로 놓음<br/>    강한 캐릭터 → \"...가지 마\" 한마디 → 즉시 표정 관리<br/>    밝은 캐릭터 → 텅 빈 눈빛 → 1초 후 웃음 복귀<br/><br/><span style=\"color:#e8a0a0\">금지:</span><br/>    무방비 순간을 인격 전환의 계기로 사용<br/>    → 본성이 \"잠깐 비치는\" 것이지 \"영구히 바뀌는\" 것이 아님</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#c0a0a0;font-weight:bold\">16.47</span> 행위 상태 INFO</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">INFO 형식:</span><br/>    NSFW: [행위: 현재자세|삽입위치←삽입한것|]<br/>    일상: [일상: 현재 행동 요약]<br/><br/><span style=\"color:#a0e8c8\">예시:</span><br/>    [행위: 정상위|보지←자지|]<br/>    [행위: 후배위|항문←자지|]<br/>    [행위: 기승위|보지←자지, 입←손가락|]<br/>    [일상: 거실에서 대화 중]<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><br/><span style=\"color:#e8e8a0\">규칙:</span><br/>    - 현재자세, 삽입한 것, 삽입위치만 포함 (감정/상태 제외)<br/>    - 자세 변경 시 즉시 갱신<br/>    - 일상 전환 시 [일상] 형식으로 전환</div></div><br/></details></div><div id=\"chapter-8\" style=\"max-width:620px;margin:0 auto;padding:16px;font-family:sans-serif;background-color:#1a1a2e;color:#c8c8d8\"><div style=\"text-align:center;padding:16px 0\"><div style=\"font-size:24px;font-weight:bold;color:#a0c8e8;margin:8px 0\">9장 · 부록</div><div style=\"font-size:12px;color:#8a8aa0\">체크리스트 &amp; 장기 기억 &amp; 비효과적 기법</div></div><div style=\"text-align:center;color:#a0c8e8;font-size:10px;letter-spacing:4px;font-weight:bold;margin:20px 0 10px\">──  17. 자주 하는 실수 체크리스트 ──</div><details id=\"sec-8-0\" open=\"\"><summary data-section-id=\"sec-8-0\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#a0c8e8\">기본 구조 &amp; 분량 제어 (1~2장 관련)</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:11px;color:#b0b0c8;line-height:1.9\">☐ 글자수/단어수로 분량을 제어하고 있지 않은가?<br/>☐ \"금지\"만 있고 \"대안\"이 빠져 있지 않은가?<br/>☐ 형식 규칙에 완성된 출력 예시가 첨부되어 있는가?<br/>☐ 정의 없는 약어/영문 태그를 사용하고 있지 않은가?<br/>☐ 상태창 필드에 레이블이 없어 위치 의존적이지 않은가?<br/>☐ AI에게 불필요한 재량권(체력 변동 등)을 주고 있지 않은가?<br/>☐ 동일 정보가 두 곳 이상에 중복 기재되어 있지 않은가?<br/>☐ 추상적 문체 지시만 있고 구체적 예시가 없지 않은가?<br/>☐ 필(必) 반복으로 강조하고 있지 않은가? (구조적 보강으로 대체)<br/>☐ 규칙 문장에서 띄어쓰기를 과도하게 제거하지 않았는가?<br/>☐ 장르(코미디 등)와 문체 지시(서정적 등)가 충돌하지 않는가?<br/>☐ \"가끔\", \"너무\", \"적당히\" 등 주관적 빈도를 구체적 수치로 대체했는가?<br/>☐ \"부탁/당부\" 어조를 규칙 선언으로 대체했는가?<br/>☐ 콘텐츠 비율(설명 ≤20%, 장면/대화 ≥80%)이 수치로 지정되어 있는가?</div></div></details><details id=\"sec-8-1\" open=\"\"><summary data-section-id=\"sec-8-1\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#a0c8e8\">상태창 &amp; 시스템 설계 (3~4장 관련)</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:11px;color:#b0b0c8;line-height:1.9\">☐ 상태창 이모지와 이미지 코드가 동기화되어 있는가?<br/>☐ 조건 분기가 IF문 형식으로 명확히 작성되어 있는가?<br/>☐ AI 전용 숨겨진 상태(Hidden State) 형식에 해석 규칙과 예시가 있는가?<br/>☐ 엔티티 코드가 이미지·전투·상태 전체에서 통합 사용되고 있는가?<br/>☐ 출력 요소의 우선순위/분량 가이드가 지정되어 있는가?<br/>☐ 수치 공식이 AI가 수행 가능한 단순 연산(곱셈·덧셈)인가?<br/>☐ 상태창 동적 목록의 추가/유지/제거 규칙이 있는가?<br/>☐ 상태창에 사용된 약어/기호가 모두 정의되어 있는가?<br/>☐ 호감도 명명된 단계(멸시→사랑 등)에 숫자 경계값이 매핑되어 있는가?<br/>☐ 모드 전환 트리거가 구체적 상황 키워드로 정의되어 있는가?<br/>☐ 구분자 기호(&amp;, +, ,, /, →)가 용도별로 통일되어 있는가?<br/>☐ 호감도 증감값이 범위가 아닌 고정값(또는 세분화된 조건)인가?<br/>☐ 이벤트에 발생 조건 + 내용 + 종료/횟수가 모두 있는가?<br/>☐ 복수 시스템 간 교차 규칙(모드호감도 등)이 명시되어 있는가?<br/>☐ 부위별/세부 상태가 분리 추적되고 있는가?</div></div></details><details id=\"sec-8-2\" open=\"\"><summary data-section-id=\"sec-8-2\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#a0c8e8\">문체 · AI 편향 · 용어 (3장 관련)</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:11px;color:#b0b0c8;line-height:1.9\">☐ AI의 긍정화 편향을 고려했는가?<br/>☐ AI의 로맨틱 편향을 차단하는 규칙이 있는가?<br/>☐ 금지 어휘 목록에 대체 어휘가 함께 제공되어 있는가?<br/>☐ 텍스트 변환 규칙에 규칙과 예시가 모두 있는가?<br/>☐ 내레이터 시점/톤이 예시와 함께 구체적으로 정의되어 있는가?<br/>☐ 말투 모드별 예시가 10개 이상 제공되어 있는가?<br/>☐ 클리셰 블랙리스트에 대체 표현 쌍이 함께 있는가?<br/>☐ 번역투(수동태/사물 주어/\"~적\" 남용)가 금지되어 있는가?<br/>☐ 감정 라벨링이 금지되고 신체 반응 치환 매핑이 있는가?<br/>☐ 행동 규칙에 \"왜(이유)\"가 함께 적혀 있는가?<br/>☐ 유저노트와 시스템 프롬프트 충돌 시 우선순위가 명시되어 있는가?</div></div></details><details id=\"sec-8-3\" open=\"\"><summary data-section-id=\"sec-8-3\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#a0c8e8\">캐릭터 설계 (6장 관련)</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:11px;color:#b0b0c8;line-height:1.9\">☐ 캐릭터의 관계 하락/단절 조건이 정의되어 있는가?<br/>☐ 선호도 등급(선호/불호/중립)의 행동 기준이 명확한가?<br/>☐ 시그니처 표현에 사용 조건과 빈도 제한이 있는가?<br/>☐ 자칭/호칭 규칙이 허용+금지 형태로 명시되어 있는가?<br/>☐ 성격 갭(대비)의 양쪽 모두 구체적 예시가 있는가?<br/>☐ 상황-반응 매핑이 5~8개 핵심 상황에 대해 정의되어 있는가?<br/>☐ 캐릭터의 모드 전환에 진입/복귀 조건이 있는가?<br/>☐ 설정에 없는 외모 액세서리 임의 추가가 금지되어 있는가?<br/>☐ 다중 캐릭터 장면에서 NPC끼리도 대화하는 규칙이 있는가?<br/>☐ NPC가 능동적으로 행동을 개시하는 규칙이 있는가?<br/>☐ 호칭 전환(성→이름) 조건이 관계 유형별로 있는가?<br/>☐ 캐릭터 감정(질투/소유욕)을 끄지 않고 표현 방식만 제어하고 있는가?<br/>☐ 신체 상태→성격 영향 연동 규칙이 있는가?</div></div></details><details id=\"sec-8-4\" open=\"\"><summary data-section-id=\"sec-8-4\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#a0c8e8\">데이터 관리 · 메타 커맨드 · 이미지 (5장 관련)</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:11px;color:#b0b0c8;line-height:1.9\">☐ 메타 커맨드의 복귀 조건이 명시되어 있는가?<br/>☐ 대량 캐릭터를 시스템 프롬프트에 전부 상주시키고 있지 않은가?<br/>☐ 캐릭터 출현 시점 조건이 명시되어 있는가?<br/>☐ 장기 대화를 위한 세이브/요약 커맨드가 있는가?<br/>☐ 이미지 URL에 사용되는 모든 코드가 빠짐없이 정의되어 있는가?<br/>☐ 이미지 키워드에 우선순위와 중복 해소 규칙이 있는가?<br/>☐ 이미지 상황코드 번호가 범주별 대역으로 분리되어 있는가?<br/>☐ 배경/장소 정보가 계층적으로 구조화되어 있는가?<br/>☐ 절대 준수 규칙이 범주별(서술/캐릭터/데이터)로 분류되어 있는가?<br/>☐ 캐릭터 테이블의 한 셀에 5개 이상 항목이 들어가 있지 않은가?<br/>☐ 10명 이상 캐릭터의 관계 정보가 별도 섹션에 모여 있는가?<br/>☐ 로어북 키워드가 중복 없이 유일한가?<br/>☐ 턴 카운터 + 자동 요약(P블록)으로 컨텍스트 보존이 자동화되어 있는가?</div></div></details><details id=\"sec-8-5\" open=\"\"><summary data-section-id=\"sec-8-5\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#a0c8e8\">서사 논리 규칙 (8장 §15 관련)</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:11px;color:#b0b0c8;line-height:1.9\">☐ 사용자 입력의 분위기가 NPC 감정에 전이되지 않는 분리 규칙이 있는가?<br/>☐ 과거 사건 참조 시 \"누가 그 자리에 있었는가\" 검증 규칙이 있는가?<br/>☐ 프롬프트 기술 용어가 서사에 노출되지 않는 규칙이 있는가?<br/>☐ 위치 논리 규칙(다른 장소 인식 금지)이 있는가?<br/>☐ 직전 응답에서 이어서 시작하는 앵커링 규칙이 있는가?<br/>☐ 사용자 입력이 모호할 때 AI가 장면을 진행하는 규칙이 있는가?<br/>☐ 전술적 정지와 모호한 클리프행어가 구분되어 있는가?<br/>☐ NPC 공격의 결과는 사용자 반응 후 결정하는 규칙이 있는가?<br/>☐ Rule of Cool (서사 우선 규칙)이 있는가?<br/>☐ 시스템 로직이 출력에 노출되지 않는 은닉 규칙이 있는가?<br/>☐ 물리 법칙 준수 규칙이 있는가?<br/>☐ AI가 사건 사이를 임의 시간 도약하지 않는 규칙이 있는가?<br/>☐ 응답 끝이 \"장면 마무리형\"으로 닫히지 않는 규칙이 있는가?<br/>☐ Director Turn 형식(후속 결과만 서술)이 적용되는가?<br/>☐ 연속 최소 입력에 3단계 에스컬레이션이 있는가?</div></div></details><details id=\"sec-8-6\" open=\"\"><summary data-section-id=\"sec-8-6\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#a0c8e8\">성인 묘사 (8장 §16 관련)</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:11px;color:#b0b0c8;line-height:1.9\">☐ 신음 목록이 행위×강도 매트릭스로 구성되어 있는가?<br/>☐ 신음 강도 전환(일반→강화→절정)에 트리거 조건이 있는가?<br/>☐ 효과음에 전용 서식 + 배치 위치 + 빈도 규칙이 모두 있는가?<br/>☐ 신체 묘사가 물리적 감각 키워드로 작성되어 있는가?<br/>☐ 신체 호칭 교체 테이블이 부위별 금지/허용 분리되어 있는가?<br/>☐ 세계관 모드의 개념 치환 매핑이 범주별 5개 이상인가?<br/>☐ 세계관 모드의 활성화 + 비활성화 + 상태 표시가 모두 정의되어 있는가?<br/>☐ 부위×기술 매트릭스로 행위가 세분화되어 있는가?<br/>☐ 절정 묘사가 시퀀스 단계로 정의되어 있는가?<br/>☐ 감각 교차 순환 규칙이 있는가?<br/>☐ 반응-자극 비례 규칙이 강도별로 매핑되어 있는가?<br/>☐ 성행위 후 인격 불변 규칙이 있는가?<br/>☐ 에스컬레이션 단계별 묘사 비율이 정의되어 있는가?<br/>☐ 성반응이 4주기로 단계별 생리 묘사가 정의되어 있는가?<br/>☐ 반응의 3층(물리+감정+비언어) 복합 구조가 적용되는가?<br/>☐ 절정 시 불완전 언어 규칙이 있는가?<br/>☐ 행위 상태 INFO가 매 응답 하단에 갱신되는가?</div></div></details><div style=\"text-align:center;color:#80b0e0;font-size:10px;letter-spacing:4px;font-weight:bold;margin:20px 0 10px\">──  18. 장기 기억 가이던스 ──</div><details id=\"sec-8-7\" open=\"\"><summary data-section-id=\"sec-8-7\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#80b0e0\">18.1~18.3 기본 구조 · 코드블록+날짜 형식 · 시간대 분할</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#80b0e0;font-weight:bold\">18.1</span> 장기 기억의 목적 — AI의 컨텍스트 윈도우 한계를 보완. 수집→요약→저장→참조의 4단계 구조.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">장기 기억 시스템 기본 구조:</span><br/>    ① 수집: 매 N턴(또는 장면 전환)마다 중요 사건 추출<br/>    ② 요약: 추출된 사건을 토큰 효율적 형식으로 압축<br/>    ③ 저장: 압축된 요약을 시스템 프롬프트 또는 별도 영역에 배치<br/>    ④ 참조: AI가 응답 생성 시 장기 기억을 컨텍스트로 활용<br/><span style=\"color:#e8e8a0\">목적:</span> 핵심 정보 보존 + 토큰 소모 최소화</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#80b0e0;font-weight:bold\">18.2</span> 요약 출력 형식은 코드블록 + 날짜 기반 통합으로 고정 — 코드블록은 AI에게 \"데이터이지 서사가 아니다\"라는 신호.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">요약 형식 규칙:</span><br/> <span style=\"color:#e8e8a0\">전체:</span> 하나의 마크다운 코드블록 내에 포함<br/> <span style=\"color:#e8e8a0\">날짜:</span> [<a class=\"external\" href=\"https://unsafelink.com/http://YYYY.MM\" rel=\"external nofollow noopener noreferrer\" target=\"_blank\" title=\"yyyy.mm/ (외부 사이트)\">YYYY.MM</a>.DD] 형식, 각 날짜 1회만 표기<br/> <span style=\"color:#e8e8a0\">통합:</span> 동일 날짜의 모든 사건은 하나의 문단으로<br/> <span style=\"color:#e8a0a0\">금지:</span> 마크다운 헤더(##, ###), 턴 번호(#1턴-5턴)<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><span style=\"color:#e8a0a0\">비효과적 (구조 없음):</span><br/>    \"3월 15일에 길드에서 의뢰 받고 숲에 갔다. 고블린 잡았다.\"<br/>    → 시간 순서 모호, 세부 사항 누락, AI가 참조하기 어려움</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#80b0e0;font-weight:bold\">18.3</span> 시간대별 분할로 사건의 시간 순서를 보존</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">시간대 분류:</span><br/>    Dawn (00:00-05:59)<br/>    Morning (06:00-11:59)<br/>    Afternoon (12:00-17:59)<br/>    Evening (18:00-19:59)<br/>    Night (20:00-23:59)<br/><span style=\"color:#e8e8a0\">적용 규칙:</span><br/>    - 해당 시간대 사건 앞에 굵게 표시<br/>    - 반드시 시간 순서대로 배치<br/>    - 시간대가 바뀔 때만 마커 삽입<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><span style=\"color:#e8a0a0\">비효과적 (시간 순서 없음):</span><br/>    \"고블린을 잡고 야영했다. 아침에 길드에서 의뢰를 받았었다.\"<br/>    → 인과관계 역전, AI가 시간 흐름을 혼동</div></div></details><details id=\"sec-8-8\" open=\"\"><summary data-section-id=\"sec-8-8\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#80b0e0\">18.4~18.5 핵심 정보 추출 &amp; 토큰 효율 압축</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#80b0e0;font-weight:bold\">18.4</span> 육하원칙 + 암시적 정보 — 표면적 서술뿐 아니라 관계 변화, 동기, 복선까지 추출.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">핵심 정보 추출 기준:</span><br/>    ① 육하원칙: 누가, 무엇을, 언제, 어디서, 왜, 어떻게<br/>    ② 관계 변화: 호감도/신뢰 변동, 새 관계 형성/단절<br/>    ③ 동기/목표: 캐릭터가 드러낸 목적이나 욕구<br/>    ④ 복선/미해결: 떡밥, 미해결 약속, 잠재 갈등<br/>    ⑤ 상태 변화: 부상, 아이템 획득/소실, 위치 이동<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><span style=\"color:#80e0a0\">좋은 요약:</span><br/>    \"소라와 야영. 소라가 과거 모험 이야기를 자발적으로 꺼냄<br/>     — {{user}}에 대한 신뢰 상승 암시.<br/>     소라가 '옛 동료'를 언급했으나 이름은 밝히지 않음<br/>     — 미해결 복선.\"<br/><span style=\"color:#e8a0a0\">나쁜 요약:</span><br/>    \"숲에서 고블린을 잡고 야영했다\"<br/>    → 관계 변화, 복선, 감정 정보 전부 누락</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#80b0e0;font-weight:bold\">18.5</span> 토큰 효율을 위한 압축 원칙 — 직설적·간결·사실 기반, 문학적 표현/수식어 제거.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">토큰 효율 규칙:</span><br/> <span style=\"color:#e8e8a0\">문체:</span> 직설적·간결·사실 기반 → 문학적 표현/수식어 제거<br/> <span style=\"color:#e8e8a0\">구조:</span> 단문 나열, 쉼표 구분 → 접속사/조사 최소화<br/> <span style=\"color:#e8e8a0\">고유명사:</span> 원어 유지 (번역하면 토큰 증가+의미 변형)<br/> <span style=\"color:#e8e8a0\">감정:</span> \"슬퍼했다\" 대신 \"신뢰↑\" \"경계↓\" 등 약어 허용<br/> <span style=\"color:#e8a0a0\">반복:</span> 이미 기록된 설정(캐릭터 외모 등) 재기록 금지<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><span style=\"color:#e8a0a0\">원문 (47토큰):</span><br/>    \"소라는 {{user}}를 바라보며 조용히 미소 지었다.<br/>     그녀의 표정에서 따뜻함이 느껴졌다...\"<br/><br/><span style=\"color:#80e0a0\">압축 (18토큰):</span><br/>    \"전투 후 소라 태도 변화. 미소+따뜻함 → 신뢰↑.<br/>     원인: {{user}}의 용기.\"</div></div></details><details id=\"sec-8-9\" open=\"\"><summary data-section-id=\"sec-8-9\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#80b0e0\">18.6~18.9 갱신 트리거 · 기억 계층 · 삭제 금지 정보 · 주의사항</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#80b0e0;font-weight:bold\">18.6</span> 갱신 트리거</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">자동 트리거:</span><br/>    - 장면 전환 (장소 이동, 시간대 변경)<br/>    - 주요 이벤트 완료 (전투 종료, 대화 마무리, 퀘스트 달성)<br/>    - 일정 턴 수 경과 (예: 10턴마다)<br/><span style=\"color:#a0e8c8\">수동 트리거:</span><br/>    - 사용자가 !기억 또는 !save 명령어 입력<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><span style=\"color:#a0e8c8\">갱신 방식:</span><br/> <span style=\"color:#e8e8a0\">추가형:</span> 새 사건을 기존 기억 끝에 추가<br/> <span style=\"color:#e8e8a0\">통합형:</span> 같은 날짜의 기존 요약에 새 사건을 병합<br/> <span style=\"color:#e8e8a0\">요약형:</span> 오래된 기억은 더 짧게 재압축<br/><br/><span style=\"color:#e8a0a0\">비효과적:</span> \"중요한 것을 기억해줘\"<br/>    → AI가 무엇이 중요한지, 언제 기억할지 판단 불가</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#80b0e0;font-weight:bold\">18.7</span> 기억 계층 — 시간이 지남에 따라 오래된 기억을 더 짧게 재압축.</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">기억 상세도 계층:</span><br/> <span style=\"color:#e8e8a0\">최근 (1~3일):</span> 상세<br/>        시간대별 분할, 대사 인용, 감정 상세<br/> <span style=\"color:#e8e8a0\">중기 (4~14일):</span> 요약<br/>        핵심 사건 + 관계 변화만<br/> <span style=\"color:#e8e8a0\">장기 (15일+):</span> 키포인트<br/>        1~2줄 핵심만<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><span style=\"color:#a0e8c8\">재압축 규칙:</span><br/> <span style=\"color:#80e0a0\">보존 우선:</span> 관계 변화, 미해결 약속, 핵심 스탯, 중요 아이템<br/><span style=\"color:#e8a0a0\">삭제 우선:</span> 환경 묘사, 사소한 일상, 반복 이벤트</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#80b0e0;font-weight:bold\">18.8</span> 절대 삭제 금지 정보:</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:12px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#e8e8a0\">영구 보존 대상:</span><br/>    ① 관계 전환점 (적→아군, 동료→연인 등)<br/>    ② 미해결 약속/복선<br/>    ③ 캐릭터 사망/퇴장<br/>    ④ 핵심 아이템 변동<br/>    ⑤ 스탯/능력 영구 변화<br/>    ⑥ 세계관 영향 사건<br/>    ⑦ {{user}}가 한 선택 (분기점 결정)<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><span style=\"color:#8a8aa0\">삭제 가능:</span><br/>    - 특정 장소의 환경 묘사 (재방문 시 재생성 가능)<br/>    - 반복적 일상 행동 (서사에 영향 없는 것)<br/>    - NPC의 사소한 대사 (핵심 정보 없는 잡담)</div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:10px\"><span style=\"color:#80b0e0;font-weight:bold\">18.9</span> 주의사항</div><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:4px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">① 기억과 서사의 혼동 방지:</span><br/>    장기 기억은 \"데이터\"이지 \"서사\"가 아님<br/>    → 기억은 코드블록에 격리, 서사는 별도로 생성<br/><span style=\"color:#a0e8c8\">② 기억 간 모순 방지:</span><br/>    한 날짜 = 하나의 기록 (날짜 통합 규칙 엄수)<br/>    재압축 시 구버전 삭제, 신버전으로 교체<br/><span style=\"color:#a0e8c8\">③ 요약 언어 통일:</span><br/>    프롬프트 언어와 요약 언어 일치<br/>    고유명사/능력명은 원어 유지<br/><span style=\"color:#a0e8c8\">④ 토큰 예산 관리:</span><br/>    전체 컨텍스트의 15~25%를 장기 기억에 할당<br/>    상한 초과 시 → 오래된 기억부터 재압축</div></div></details><details id=\"sec-8-10\" open=\"\"><summary data-section-id=\"sec-8-10\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#80b0e0\">18.10 장기 기억 완성 예시</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div style=\"background-color:#16162a;border:1px solid #2a2a44;border-radius:6px;padding:12px 14px;margin-bottom:10px;font-family:monospace;font-size:11px;line-height:1.8;color:#9a9ab0\"><span style=\"color:#a0e8c8\">```memory</span><br/><span style=\"color:#e8e8a0\">[2024.02.01]</span><br/> <span style=\"color:#80b0e0\">Morning:</span> {{user}} 모험가 길드 등록(E랭크).<br/>        첫 의뢰: 마을 외곽 슬라임 토벌.<br/> <span style=\"color:#80b0e0\">Afternoon:</span> 소라(궁수, 유랑 모험가)와 조우.<br/>        공동 전투 후 임시 파티 제안, {{user}} 수락.<br/>        관계: 낯선 사람→임시 동료.<br/> <span style=\"color:#e8a0a0\">미해결:</span> 소라가 '찾는 사람이 있다'고 언급.<br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><span style=\"color:#e8e8a0\">[2024.02.02~07]</span><br/>    슬라임 토벌 완료(의뢰 3건).<br/>    소라와 정식 파티 결성.<br/>    관계: 임시→정식 동료. {{user}} D랭크 승급.<br/>    강철검 구매.<br/>    고르도가 \"북쪽 광산에 희귀 광석\" 정보<br/>— <span style=\"color:#e8a0a0\">미해결 복선.</span><br/><br/><div style=\"border-top:1px solid #2a2a44;margin:4px 0\"><br/></div><span style=\"color:#e8e8a0\">[2024.02.15]</span><br/> <span style=\"color:#80b0e0\">Morning:</span> D랭크 의뢰: 동쪽 숲 고블린 소탕.<br/> <span style=\"color:#80b0e0\">Afternoon:</span> 둥지 돌입, 전사장 조우<br/>        — 소라 부상(왼쪽 어깨).<br/>        {{user}} 단독 처치.<br/> <span style=\"color:#80b0e0\">Evening:</span> 야영. {{user}}가 치료.<br/>        소라가 '옛 동료' 이야기 — 신뢰↑↑.<br/> <span style=\"color:#e8a0a0\">미해결:</span> '옛 동료'의 정체.<br/><br/><span style=\"color:#a0e8c8\">```</span></div><div style=\"font-size:12px;color:#b0b0c8;line-height:1.7;margin-bottom:4px\"><span style=\"color:#80b0e0\">확인 요소:</span> 날짜 태그+시간대 마커로 시간 순서 명확 / 관계 변화 명시 / 미해결 복선 별도 표기 / 중기 기억(02~07)은 날짜 범위로 통합 압축.</div></div></details><div style=\"text-align:center;color:#a0a0c8;font-size:10px;letter-spacing:4px;font-weight:bold;margin:20px 0 10px\">──  부록: 비효과적 기법 목록 ──</div><details id=\"sec-8-11\" open=\"\"><summary data-section-id=\"sec-8-11\" style=\"background-color:#22223a;border:1px solid #3a3a5a;border-radius:10px;padding:12px 16px;margin-bottom:4px;list-style:none;font-size:13px;font-weight:bold;color:#a0a0c8\">분량 · 구조 · 강조 관련 비효과적 기법</summary><div style=\"background-color:#1e1e32;border:1px solid #3a3a5a;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px;margin-bottom:8px\"><div><table style=\"width:100%;border-collapse:collapse;font-size:11px\"><tbody><tr style=\"background-color:#2a2a44\"><td style=\"padding:8px 10px;border:1px solid #3a3a5a;color:#e8a0a0;font-weight:bold;width:40%\">비효과적 기법</td><td style=\"padding:8px 10px;border:1px solid #3a3a5a;color:#a0a0c8;font-weight:bold\">문제점</td></tr><tr><td style=\"padding:6px 10px;border:1px solid #3a3a5a;color:#9a9ab0\">글자수/단어수 정량 지시</td><td style=\"padding:6px 10px;border:1px solid #3a3a5a;color:#9a9ab0\">AI가 셀 수 없음</td></tr><tr><td style=\"padding:6px 10px;border:1px solid #3a3a5a;color:#9a9ab0\">산술식 수치 강조 (150+100)</td><td style=\"padding:6px 10px;border:1px solid #3a3a5a;color:#9a9ab0\">토큰 낭비 + 근본 문제 미해결</td></tr><tr><td style=\"padding:6px 10px;border:1px solid #3a3a5a;color:#9a9ab0\">必 반복으로 강조 (必必必)</td><td style=\"padding:6px 10px;border:1px solid #3a3a5a;color:#9a9ab0\">AI에게 강도 차이 없 lor:#9a9ab0\">AI가 판단 불가, 구체적 목록으로 대체</td></tr></tbody></table></div></div></details><div style=\"text-align:center;padding:16px 0;margin-top:12px;border-top:1px solid #2a2a44\"><div style=\"font-size:10px;color:#6a6a8a\"><br/></div></div></div>\n</div>";

let currentChapter = null;
let searchQuery = '';
let tocOpen = true; // desktop default
let lastSearchTerm = ""; // 마지막으로 검색한 단어를 기억할 저장소야

function goBack() {
  // Try to go back, or redirect to index.html
  if(document.referrer && document.referrer.includes(location.hostname)) {
    history.back();
  } else {
    location.href = 'index.html';
  }
}

// ── TOC 렌더링 ──
function renderToc(highlightSec) {
  const container = document.getElementById('toc-inner');
  container.innerHTML = '';
  TOC.forEach((ch, ci) => {
    const div = document.createElement('div');
    div.className = 'toc-chapter';
    
    const btn = document.createElement('button');
    btn.className = 'toc-ch-btn' + (currentChapter === ci ? ' active open' : '');
    btn.innerHTML = `<span>${ch.title}</span><span class="toc-ch-arrow">▶</span>`;
    btn.onclick = () => jumpToChapter(ci);
    
    const secs = document.createElement('div');
    secs.className = 'toc-sections' + (currentChapter === ci ? ' open' : '');
    
    ch.sections.forEach((sec, si) => {
      const sb = document.createElement('button');
      sb.className = 'toc-sec-btn' + (highlightSec === sec.id ? ' active' : '');
      sb.textContent = sec.title;
      sb.onclick = (e) => { e.stopPropagation(); jumpToSection(sec.id); };
      secs.appendChild(sb);
    });
    
    div.appendChild(btn);
    div.appendChild(secs);
    container.appendChild(div);
  });
}

function jumpToChapter(ci) {
  currentChapter = ci;
  renderToc();
  const el = document.getElementById('chapter-' + ci);
  if(el) {
    el.scrollIntoView({behavior:'smooth', block:'start'});
    // Expand all details in chapter
    el.querySelectorAll('details').forEach(d => d.setAttribute('open',''));
  }
  closeTocMobile();
}

function jumpToSection(secId) {
  const el = document.getElementById(secId);
  if(el) {
    el.setAttribute('open','');
    el.scrollIntoView({behavior:'smooth', block:'center'});
    el.style.outline = '2px solid rgba(136,137,205,0.6)';
    setTimeout(() => el.style.outline = '', 2000);
  }
  renderToc(secId);
  closeTocMobile();
}

// ── 검색 ──
function handleSearch(q) {
  searchQuery = q.trim();
  document.getElementById('search-clear').style.display = q ? 'block' : 'none';
  if(!searchQuery) {
    renderContent();
    return;
  }
  renderSearchResults(searchQuery);
}

function clearSearch() {
  lastSearchTerm = ""
  document.getElementById('search-input').value = '';
  handleSearch('');
}

function renderSearchResults(q) {
  lastSearchTerm = q;
  const content = document.getElementById('guide-content');
  const lq = q.toLowerCase();
  
  // Search through all sections
  const results = [];
  TOC.forEach((ch, ci) => {
    ch.sections.forEach((sec, si) => {
      if(sec.title.toLowerCase().includes(lq)) {
        results.push({chTitle: ch.title, secId: sec.id, secTitle: sec.title});
      }
    });
  });
  if (q && content.innerHTML) {
    const regex = new RegExp(`(?![^<]*>)(${q})`, 'gi');
    content.innerHTML = content.innerHTML.replace(regex, '<mark class="search-highlight">$1</mark>');
  }
  if (content.innerHTML.trim() === '' || content.children.length === 0) {
    content.innerHTML = `<div class="no-results"><div class="no-results-icon">🔍</div><div>"${q}" 검색 결과가 없어요</div></div>`;
  }
  /*if(results.length === 0) {
    content.innerHTML = `<div class="no-results"><div class="no-results-icon">🔍</div><div>"${q}" 검색 결과가 없어요</div></div>`;
    return;
   
  }
  */
  
  // Also do full text search in the actual DOM
  const tempDiv = document.createElement('div');
  tempDiv.innerHTML = ARTICLE_HTML;
  const allDetails = tempDiv.querySelectorAll('details');
  const textMatches = [];
  allDetails.forEach(d => {
    const text = d.textContent || '';
    if(text.toLowerCase().includes(lq)) {
      const id = d.id;
      const sum = d.querySelector('summary');
      const sumText = sum ? sum.textContent.trim() : id;
      if(!results.find(r => r.secId === id)) {
        textMatches.push({secId: id, secTitle: sumText});
      }
    }
  });
  
  let html = `<div class="search-result-label">🔍 "${q}" 검색결과: ${results.length + textMatches.length}개</div>`;
  
  const allResults = [...results.map(r => ({...r, type:'title'})), ...textMatches.map(r => ({...r, type:'content'}))];
  
  allResults.slice(0,30).forEach(r => {
    const highlighted = r.secTitle.replace(new RegExp(q, 'gi'), m => `<span class="highlight">${m}</span>`);
    html += `<div onclick="clearSearchAndJump('${r.secId}')" style="padding:10px 14px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;background:var(--surface);transition:border-color 0.2s;" onmouseover="this.style.borderColor='rgba(136,137,205,0.5)'" onmouseout="this.style.borderColor='var(--border)'">
      <div style="font-size:11px;color:var(--muted);margin-bottom:3px;">${r.chTitle || ''}</div>
      <div style="font-size:12px;font-weight:600;">${highlighted}</div>
      ${r.type==='content' ? '<div style="font-size:10px;color:var(--accent4);margin-top:3px;">📄 내용 일치</div>' : ''}
    </div>`;
  });
  
  content.innerHTML = html;
}

function clearSearchAndJump(secId) {
  // 1. 검색 결과 목록이 들어있는 전체 화면 가져오기
  const content = document.getElementById('guide-content');

  // 2. 검색 목록 아래에 '미리보기 전용 구역' 찾기 (없으면 선배가 만들어 줌!)
  let previewArea = document.getElementById('search-preview-area');
  if (!previewArea) {
    previewArea = document.createElement('div');
    previewArea.id = 'search-preview-area';
    previewArea.style.marginTop = '30px';
    previewArea.style.borderTop = '2px dashed var(--accent)';
    previewArea.style.paddingTop = '20px';
    content.appendChild(previewArea);
  }

  // 3. 원본 데이터(ARTICLE_HTML)에서 네가 클릭한 부분(secId)의 진짜 내용만 훔쳐오기
  const tempDiv = document.createElement('div');
  tempDiv.innerHTML = ARTICLE_HTML;
  const targetContent = tempDiv.querySelector('#' + secId);

  if (targetContent) {
    // 4. 훔쳐온 쌩얼 원본을 미리보기 구역에 꽂아넣기 (여기서 형광펜 중첩 버그 100% 차단!)
    previewArea.innerHTML = targetContent.outerHTML;

    // 5. 내용이 접혀있으면 안 보이니까 강제로 쫙 펴주기
    const detailsTag = previewArea.querySelector('details');
    if (detailsTag) detailsTag.setAttribute('open', '');

    // 6. 방금 넣은 깨끗한 본문에다가 형광펜 딱 한 번만 우아하게 칠하기
    if (lastSearchTerm && previewArea.innerHTML) {
      const regex = new RegExp(`(?![^<]*>)(${lastSearchTerm})`, 'gi');
      previewArea.innerHTML = previewArea.innerHTML.replace(regex, `<mark class="search-highlight">$1</mark>`);
    }

    // 7. 클릭하자마자 미리보기 구역으로 화면을 부드럽게 스윽~ 이동
    previewArea.scrollIntoView({behavior: 'smooth', block: 'center'});
  }
}

// ── 콘텐츠 렌더링 ──
function renderContent() {
  const content = document.getElementById('guide-content');
  // Parse the article HTML
  const tempDiv = document.createElement('div');
  tempDiv.innerHTML = ARTICLE_HTML;
  const article = tempDiv.querySelector('.fr-view');
  if(!article) { content.innerHTML = tempDiv.innerHTML; return; }

  const chapterDivs = article.querySelectorAll(':scope > div');
  content.innerHTML = '';
  
  chapterDivs.forEach((div, i) => {
    const block = document.createElement('div');
    block.className = 'chapter-block';
    block.id = 'chapter-' + i;
    
    // Chapter header
    const titleEl = div.querySelector('[style*="font-size:24px"]');
    const subtitleEl = div.querySelector('[style*="font-size:12px"]');
    const title = titleEl ? titleEl.textContent.trim() : `챕터 ${i+1}`;
    const subtitle = subtitleEl ? subtitleEl.textContent.trim() : '';
    const sectionCount = div.querySelectorAll('details').length;
    
    const header = document.createElement('div');
    header.className = 'chapter-header';
    header.innerHTML = `
      <div class="chapter-num">CHAPTER ${String(i+1).padStart(2,'0')}</div>
      <div class="chapter-title">${title}</div>
      ${subtitle ? `<div class="chapter-sub">${subtitle}</div>` : ''}
      <div class="section-count">섹션 ${sectionCount}개</div>
    `;
    block.appendChild(header);
    
    // Add sections - clone the details elements
    const details = div.querySelectorAll(':scope details');
    details.forEach((d, j) => {
      const cloned = d.cloneNode(true);
      cloned.id = `sec-${i}-${j}`;
      // Make sure it shows content
      cloned.removeAttribute('open');

      block.appendChild(cloned);
    });
    
    content.appendChild(block);
  });
  
  // Scroll observer for TOC sync
  setupScrollObserver();
}

function setupScrollObserver() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if(entry.isIntersecting) {
        const id = entry.target.id;
        if(id.startsWith('chapter-')) {
          const ci = parseInt(id.replace('chapter-',''));
          if(currentChapter !== ci) {
            currentChapter = ci;
            renderToc();
          }
        }
      }
    });
  }, {threshold: 0.1});
  
  document.querySelectorAll('.chapter-block').forEach(el => observer.observe(el));
}

// ── TOC 토글 ──
function toggleToc() {
  if(window.innerWidth <= 768) {
    const sidebar = document.getElementById('toc-sidebar');
    const overlay = document.getElementById('toc-overlay');
    sidebar.classList.toggle('mobile-open');
    overlay.classList.toggle('show');
  } else {
    const sidebar = document.getElementById('toc-sidebar');
    sidebar.classList.toggle('hidden');
  }
}

function closeTocMobile() {
  if(window.innerWidth <= 768) {
    document.getElementById('toc-sidebar').classList.remove('mobile-open');
    document.getElementById('toc-overlay').classList.remove('show');
  }
}

// ── 초기화 ──
renderToc();
renderContent();
</script>
</body>
</html>
